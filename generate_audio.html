s own safety. Other sheep not of this fold. Jesus also said: I have other sheep that are not of this sheep pen. I must bring them also. They too will listen to my voice. And there shall be one flock and one shepherd. He was looking at the whole world. He was saying: there are people I love who have not yet heard my voice. They are mine too. My flock is bigger than you think. And I am going to find every one of them. One flock one shepherd. Jesus also said: I have other sheep that are not of this sheep pen. I must bring them also. They too will listen to my voice. And there shall be one flock and one shepherd. He was looking at the whole world. There are people He loves who have not yet heard His voice. They are His too. His flock is bigger than we think. And He is going to find every one of them. The Good Shepherd never stops searching.`,prayer:`Dear Jesus, thank You that You are my Good Shepherd - that You know my name, that You lead me, that You laid down Your life for me. Help me to listen to Your voice and follow You. In Jesus Name. Amen.`},
  {id:85,title:'The Vine and the Branches',narration:`I am the true vine. On the last night before His crucifixion, Jesus walked with His disciples and said: I am the true vine, and my Father is the gardener. He cuts off every branch in me that bears no fruit, while every branch that does bear fruit He prunes so that it will be even more fruitful. A branch is not useful on its own. A branch only produces fruit when it is connected to the vine. Remain in me. Remain in me, Jesus said, as I also remain in you. No branch can bear fruit by itself. It must remain in the vine. Neither can you bear fruit unless you remain in me. The word remain means stay, abide, dwell. Not visit occasionally. Not check in when you need something. Stay connected. Keep the relationship alive every day. The fruit comes from the connection, not from effort. Apart from me you can do nothing. Jesus said: I am the vine. You are the branches. If you remain in me and I in you, you will bear much fruit. Apart from me you can do nothing. Not less. Nothing. A branch separated from the vine looks fine for a while. But the life is already leaving it. Everything that looks like fruitfulness in a life disconnected from Jesus is temporary. Everything connected to Him lasts. Ask whatever you wish. Jesus said: If you remain in me and my words remain in you, ask whatever you wish and it will be done for you. This is a bold promise. But notice the condition - if you remain in me and my words remain in you. When we stay close to Jesus, when His words shape our thinking and our desires, our prayers align with His will. We end up asking for what He wants to give. Love one another as I have loved you. Jesus said: My command is this. Love each other as I have loved you. Greater love has no one than this: to lay down one life for one friends. You are my friends if you do what I command. He did not call them servants. He called them friends. I have told you everything I learned from my Father. Friends know each other. Friends share what matters. He opened everything to them. You did not choose me. Jesus said: You did not choose me, but I chose you and appointed you so that you might go and bear fruit - fruit that will last. He chose us first. Before we knew about Him, before we sought Him, before we could offer Him anything - He chose us. The relationship begins with His initiative. It continues by our remaining. And the result is fruit - love, joy, peace, acts of kindness - that lasts beyond us. You did not choose me - I chose you. Jesus said: You did not choose me, but I chose you and appointed you so that you might go and bear fruit - fruit that will last. He chose us first. Before we knew about Him, before we sought Him, before we could offer Him anything - He chose us. The relationship begins with His initiative. It continues by our remaining. And the result is fruit that lasts beyond us, forever.`,prayer:`Dear Jesus, help me to remain in You every day - not just when I need something, but always. Help me to stay connected to You so that my life produces fruit that lasts. In Jesus Name. Amen.`},
  {id:86,title:'The Story of Dorcas',narration:`A woman full of good works. In Joppa there was a disciple named Tabitha - in Greek she was called Dorcas. The Bible describes her this way: she was always doing good and helping the poor. Always. This was not occasional generosity. It was a way of life. She made robes and garments for widows - women who had nothing and no one to provide for them. She saw a need and she filled it with her own hands. She became sick and died. Then Tabitha became sick and died. They washed her body and placed her in an upstairs room. When the disciples heard that Peter was in the nearby town of Lydda, they sent two men to him with an urgent message: Please come at once! They did not tell him she had died. They just came and asked him to come quickly. Something in them believed this was not the end. The widows show Peter her work. Peter arrived. All the widows stood around him, crying and showing him the robes and other clothing that Dorcas had made while she was still with them. They were not just mourning a person. They were showing the evidence of a life. Look what she made for us. Look what she did for us. This is who she was. Peter sent them all out of the room. Peter kneels and prays. Peter got down on his knees and prayed. He did not act before praying. He did not speak before listening. He knelt. He prayed. And then he turned toward her body and said: Tabitha, get up. She opened her eyes. And when she saw Peter, she sat up. He took her by the hand and helped her to her feet. Then he called the believers and the widows and presented her to them alive. Tabitha get up. Tabitha, get up. Three words. And the woman who had spent her life quietly serving the poor opened her eyes and came back to life. God raised her. Not because she was famous. Not because she was powerful. Because she was faithful. Because her hands had been busy with kindness and the community was poorer without her. God answered the grief of widows who showed Peter her robes. The evidence of a good life. This became known all over Joppa and many people believed in the Lord. A woman who made clothes for widows. That is the whole story. She did not preach. She did not perform. She sewed. She gave. She noticed who needed something and used her hands to meet that need. And God thought her life was so worth living that He gave it back to her. Every act of faithful service matters more than we know. Every act of kindness matters. This became known all over Joppa and many people believed in the Lord. A woman who made clothes for widows. That is the whole story. She did not preach. She did not perform. She sewed. She gave. She noticed who needed something and used her hands to meet that need. And God thought her life was so worth living that He gave it back to her. Every act of faithful service matters more than we know.`,prayer:`Dear God, help me to be like Dorcas - always doing good and helping the people around me. Help me to use my hands and my skills and my time to serve others faithfully. In Jesus Name. Amen.`},
  {id:87,title:'The Armour of God',narration:`Be strong in the Lord. Paul wrote to the Christians in Ephesus: Be strong in the Lord and in His mighty power. Put on the full armour of God so that you can take your stand. There are things in the world that try to pull us away from God, that try to make us afraid, that try to make us believe lies about ourselves. But God has given us armour for all of it. The belt of truth. The first piece is the belt of truth. A Roman soldier belt held all his armour in place. Truth does the same thing for us. When we know what is true - about who God is, about who we are, about what matters - everything else stays in place. Lies are one of the enemy greatest weapons. Truth is our first defence. Know the truth. Live in it. Hold onto it. The breastplate of righteousness. The breastplate protects the heart. The breastplate of righteousness means living rightly - making choices that align with what God says is good. When we live with integrity, when we turn away from what is harmful and toward what is right, our hearts are protected. Right living is not how we earn God's love. It is how we protect what God has already given. The shield of faith. Take up the shield of faith, Paul said, with which you can extinguish all the flaming arrows of the evil one. Roman soldiers used large shields that could be locked together to form a wall. Faith is not just personal - it works together with others. And faith - trusting that God is who He says He is, that He will do what He has promised - stops the doubts and fears and accusations before they can reach us. The helmet of salvation and sword of the Spirit. The helmet of salvation protects our mind - our identity as God child, the settled knowledge that we are saved and loved. The sword of the Spirit is the word of God - the only offensive weapon in the whole armour. Everything else is defensive. When Jesus was tempted in the desert, He answered every temptation with scripture. The word of God, known and used, is the most powerful weapon available to any believer. Pray in the Spirit at all times. After describing all the armour, Paul says: And pray in the Spirit on all occasions. Prayer is not the last piece of armour. It is the atmosphere in which all the armour works. We put on truth, righteousness, faith, salvation, and the word of God - and then we stay in constant conversation with the God who gave them to us. The armoured warrior is always also the praying child. Stand firm. Finally, Paul says: Stand firm. Not charge forward on your own. Not retreat. Stand firm. With the armour on, in prayer, together with others who also wear it - stand. God has given everything we need. Truth, righteousness, faith, salvation, His word, and prayer. The armoured warrior is always also the praying child. Put it on every day. Stand firm. He is with you.`,prayer:`Dear God, help me to put on Your full armour every day. Help me to know the truth, live rightly, trust You, know my salvation, use Your word, and pray always. I want to stand firm in You. In Jesus Name. Amen.`},
  {id:88,title:'Paul and Silas Sing at Midnight',narration:`Thrown into the deepest cell. Paul and Silas had been preaching in Philippi. A crowd had been stirred against them. The magistrates had them stripped, beaten with rods, and thrown into prison. The jailer was ordered to guard them carefully. He put them in the inner cell - the deepest, darkest part - and fastened their feet in stocks. Their backs were bleeding. The floor was cold. The chains were real. Singing at midnight. About midnight Paul and Silas were praying and singing hymns to God. And the other prisoners were listening to them. That detail matters - the other prisoners heard them. In a dungeon at midnight, beaten and chained, they chose to sing. Not because everything was fine. Not because they felt like it. Because God was worth singing to regardless of the circumstances. The earthquake. Suddenly a violent earthquake shook the foundations of the prison. At once all the prison doors flew open and everyone chains came loose. The earthquake happened at midnight. It happened while they were singing. It shook the foundations. It opened every door. It loosed every chain. Not just Paul and Silas - every prisoner. God answered their midnight praise with something no one could have predicted. Do not harm yourself. The jailer woke and saw the prison doors open. Thinking the prisoners had escaped, he drew his sword to kill himself - he would face execution if they were gone. But Paul shouted: Do not harm yourself! We are all here! Every prisoner had stayed. They had been freed by the earthquake and had not left. The jailer called for lights and rushed in. He came trembling before Paul and Silas. What must I do to be saved?. The jailer fell trembling before them and asked: What must I do to be saved? He had been the one with the keys. Now he was the one who needed to be unlocked. Paul said: Believe in the Lord Jesus and you will be saved - you and your household. That midnight in a prison in Philippi, a family came to faith because two men chose to sing instead of despair. A family baptised before dawn. That same night the jailer washed Paul and Silas wounds and his whole family was baptised. He set food before them and was filled with joy because he had come to believe in God. It all started with a choice to sing at midnight. Worship is warfare. When we praise God in the darkest places, something shifts that nothing else can shift. The chains come off. The doors open. And the person watching from the outside asks: what must I do to be saved? Every prison door can open. It all started with a choice to sing at midnight. Worship is warfare. When we praise God in the darkest places, something shifts that nothing else can shift. The chains come off. The doors open. And the person watching from outside asks: what must I do to be saved? You never know who is listening when you choose to praise God in your hardest moment. Sing anyway. The prison doors open for everyone.`,prayer:`Dear God, help me to praise You even at midnight - even when my circumstances are hard and dark. Help me to trust that my worship matters and that You are always worth singing to. In Jesus Name. Amen.`},
  {id:89,title:'The Love Chapter',narration:`Without love I am nothing. If I speak in the tongues of men and of angels, Paul wrote, but do not have love, I am only a resounding gong or a clanging cymbal. If I have the gift of prophecy and can fathom all mysteries and all knowledge, and if I have a faith that can move mountains, but do not have love, I am nothing. Even giving everything I own to the poor - if I do not have love, I gain nothing. Everything without love is empty noise. Love is patient love is kind. Love is patient. Love is kind. It does not envy. It does not boast. It is not proud. It does not dishonour others. It is not self-seeking. It is not easily angered. It keeps no record of wrongs. Love does not delight in evil but rejoices with the truth. Every line is both a description of love and an invitation. This is what love looks like in action. Not a feeling alone. A set of choices made again and again. It always protects always trusts. Love always protects, always trusts, always hopes, always perseveres. Always. Not when it is convenient. Not when the other person deserves it. Always. This is not the love of greeting cards. This is the love of long days and hard seasons and choosing to stay. Love as a decision, a practice, a discipline - the kind that endures because it has been built on something deeper than feeling. Love never fails. Love never fails. But where there are prophecies, they will cease. Where there are tongues, they will be stilled. Where there is knowledge, it will pass away. Everything that impresses people will eventually stop. Every gift will one day end. Every achievement will pass. But love - real love - is the one thing that outlasts everything. It never fails. It is the only thing worth building a life around. Now we see in part. Now we see only a reflection as in a mirror. Now I know in part. Then I shall know fully, even as I am fully known. Paul is honest about the limits of what we know now. We see dimly. We understand partially. But one day we will see face to face. We will know as we are known. And in that day, what remains will be faith, hope, and love. The greatest of these is love. Three things remain: faith, hope and love. And the greatest of these is love. Not because it is the nicest option. Because it is the nature of God Himself. He is love. Everything He does flows from it. Everything He calls us to flows from it. Follow the way of love. Choose it in the small moments - in the patient word, in the kind response, in the refusal to keep a record of wrongs. It is a road walked daily. And it is the only road that leads all the way home. Follow the way of love. Paul wrote: Follow the way of love. Not achieve it once. Not feel it occasionally. Follow it. Walk it every day. Choose it in the small moments - in the patient word, in the kind response, in the decision not to keep a record of wrongs, in the refusal to envy or boast. The way of love is a road walked daily. And it is the only road that leads all the way home.`,prayer:`Dear God, help me to follow the way of love. Patient, kind, not easily angered, keeping no record of wrongs. Help me to love the way You love. In Jesus Name. Amen.`},
  {id:90,title:'The Battle Belongs to the Lord',narration:`Three armies coming. King Jehoshaphat of Judah received terrifying news. Three armies were coming against him and they were already close. Jehoshaphat was alarmed. He was afraid. But he did something exactly right: he resolved to seek the Lord. He proclaimed a fast for all of Judah and the people came together from every city to seek help from God. We do not know what to do. Jehoshaphat stood in the assembly and prayed: Lord, the God of our ancestors, are you not the God who is in heaven? Power and might are in your hand. We do not know what to do, but our eyes are on you. That is one of the most honest prayers in the Bible. We do not know what to do. But our eyes are on you. From that posture, God could work. The battle is not yours but God. A man named Jahaziel declared in the assembly: Do not be afraid or discouraged because of this vast army. For the battle is not yours but God. Tomorrow march down against them. You will not have to fight this battle. Take up your positions. Stand firm. See the deliverance the Lord will give you. Jehoshaphat bowed with his face to the ground. And all the people worshipped. Singers at the front. In the morning, Jehoshaphat appointed men to sing to the Lord and to praise Him for the splendour of His holiness as they went out at the head of the army. Singers at the front. As they began to sing and praise, the Lord set ambushes against the three armies and they attacked each other. The armies that had come to destroy Judah destroyed themselves. The valley was full of riches. When Jehoshaphat and his people came and looked toward the vast army, they saw dead bodies lying on the ground. No one had escaped. It took the people of Judah three days to collect everything the armies had left behind - there was so much it took three days. On the fourth day they assembled in a valley and blessed the Lord. They called it the Valley of Blessing. Praise before the battle. When God's people praised before the battle, God fought for them. When they said the battle is not ours but God, it literally was not theirs. Sometimes the most powerful thing you can do is stand in your position, praise God, and let Him fight. Worship is warfare. Praise in the face of impossible odds releases something that no strategy can release. Put the singers at the front. Put the singers at the front. When God's people praised before the battle, God fought for them. When they said the battle is not ours but God, it literally was not theirs. Sometimes the most powerful thing you can do is stand in your position, praise God before you see the outcome, and let Him fight. Worship is warfare. Praise in the face of impossible odds releases something that no strategy can match. Put the singers at the front.`,prayer:`Dear God, help me to praise You before I see the outcome. Help me to stand firm and watch You fight for me. The battle belongs to You. In Jesus Name. Amen.`},
  {id:91,title:'Queen of Sheba Seeks Wisdom',narration:`Reports from a faraway land. The Queen of Sheba had heard reports about Solomon. His wisdom. His wealth. His relationship with the Lord his God. She was a ruler herself. She had heard wise advisors before. But the reports about Solomon were different from anything she had heard. She decided she had to see for herself. She would make the long journey to Jerusalem and test him with hard questions. A very great caravan. She came to Jerusalem with a very great caravan - camels carrying spices, large quantities of gold, and precious stones. This was not a casual visit. She had packed the finest things her kingdom had to offer. And she came to Solomon and talked with him about everything she had on her mind. She had prepared hard questions. And Solomon answered all of them. She tested him with hard questions. She asked him everything she had ever wondered. Difficult questions. And Solomon answered all of her questions. There was nothing too hard for the king. When she had experienced everything - his wisdom, his palace, his servants, his offerings at the temple - the Bible says there was no more spirit in her. She was completely overwhelmed. She had not believed the reports. But the reality was even greater. Not even half was told me. She said to Solomon: The report I heard in my own country about your achievements and your wisdom is true. But I did not believe these things until I came and saw with my own eyes. Indeed, not even half was told me. In wisdom and wealth you have far exceeded the report I heard. How happy your people must be! Praise be to the Lord your God, who has delighted in you. She praised the Lord. The Queen of Sheba praised the Lord. She had come for wisdom and found God in the wisdom. She had come to test a king and found the God who had made the king. She was not an Israelite. She was a foreign queen from a distant land. But she recognised where the wisdom came from. And Jesus later said: something greater than Solomon is here. Seek and you will find. The Queen of Sheba made one of the longest journeys recorded in the Bible because she had heard something and needed to know if it was true. She sought, and she found. She found more than she expected. Jesus said: Seek and you will find. Knock and the door will be opened to you. The Queen of Sheba knocked from thousands of miles away. God opens the door for everyone who truly seeks. Something greater is here. The Queen of Sheba made one of the longest journeys recorded in the Bible because she had heard something and needed to know if it was true. She sought, and she found. She found more than she expected. Jesus later said: something greater than Solomon is here. The wisdom available to us is greater than Solomon. The one we can seek and find is the Son of God Himself. Seek. You will find him.`,prayer:`Dear God, help me to seek You with as much determination as the Queen of Sheba sought wisdom. Help me to make the journeys You are calling me to make, to find more of You. In Jesus Name. Amen.`},
  {id:92,title:'John the Baptist Prepares the Way',narration:`An angel in the temple. There was a priest named Zechariah whose wife Elizabeth had never been able to have children. One day Zechariah was chosen by lot to go into the temple and burn incense. And an angel appeared to him standing at the right side of the altar. Zechariah was terrified. But the angel said: Do not be afraid, Zechariah. Your prayer has been heard. Your wife Elizabeth will bear you a son, and you are to call him John. A baby leaps in the womb. When Mary, who was carrying Jesus, went to visit the elderly Elizabeth, something extraordinary happened the moment they greeted each other. Elizabeth said: The baby in my womb leaped for joy when you greeted me. Even before John was born, he knew. His whole life was being prepared from before his birth to point to Jesus. He leaped at the sound of the voice of the mother of his Lord. A voice in the wilderness. John grew up in the desert. He wore camel hair and a leather belt and ate locusts and wild honey. He was unusual. He was uncomfortable. He did not try to fit in. He was not seeking approval. He had a message from God: Repent, for the kingdom of heaven has come near! People came from Jerusalem and all Judea to hear him. Something was happening. The one who comes after me. John told the crowds: I baptise you with water. But after me will come one who is more powerful than I am, whose sandals I am not worthy to carry. He will baptise you with the Holy Spirit and with fire. John knew exactly who he was. He was the forerunner. The messenger. The voice crying in the wilderness: Prepare the way of the Lord. Behold the Lamb of God. The next day John saw Jesus coming toward him and said: Look, the Lamb of God, who takes away the sin of the world! This is the one I meant when I said a man who comes after me has surpassed me because he was before me. I came baptising with water so that he might be revealed to Israel. John baptised Jesus. The heavens opened. A dove descended. A voice said: This is my Son, whom I love. He must increase I must decrease. John said: He must become greater. I must become less. This is one of the most beautiful things anyone in the Bible ever said about Jesus. John had the crowds. He had the fame. He had the authority to baptise. And he said: none of that matters. He must increase. That is the posture of a true forerunner. Everything we have, every gift and platform, is meant to make Jesus more visible, not ourselves. He must increase. John said: He must become greater. I must become less. This is one of the most beautiful things anyone in the Bible ever said. John had the crowds. He had the fame. And he said: none of that matters. He must increase. That is the posture of a true forerunner. Everything we have - every gift and platform and opportunity - is meant to make Jesus more visible, not ourselves. He must increase.`,prayer:`Dear Jesus, like John the Baptist, help me to live a life that points to You rather than to myself. Help me to be willing to decrease so that You can increase in the eyes of the people around me. In Jesus Name. Amen.`},
  {id:93,title:'Cain and Abel',narration:`Two brothers two offerings. Adam and Eve had two sons. Cain was a farmer who worked the soil. Abel was a shepherd who kept flocks. One day both brothers brought offerings to God. Cain brought some of his crops. Abel brought the best of his flock. God was pleased with Abel offering. But Cain offering was given differently - without the same wholehearted love. And Cain was very angry. Sin is crouching at the door. God came to Cain and said something tender: Why are you angry? If you do what is right, will you not be accepted? Sin is crouching at your door. It wants to control you - but you must master it. God was warning Cain. He was giving him a chance to choose differently. The path forward was not closed. Cain did not listen. The first great loss. Cain led his brother out to the field and hurt him. Abel was gone. It was the saddest thing that had ever happened on earth since the world began. And God came and said: Where is your brother? Cain said - I do not know. Am I my brother's keeper? He already knew the answer. We are all meant to keep each other. God hears Abel. God said: What have you done? The voice of your brother's blood is crying out to me from the ground. God heard. He always hears. Not one act of injustice, not one person who is hurt and forgotten, escapes His notice. Every single person matters to Him. He knows every name. He hears every cry. Even when no one else sees or knows, God does. A mark of mercy. Cain had to live with the consequences of what he had done. But even then, God put a mark on Cain to protect him so no one would harm him. Even in judgement, God showed mercy. He did not give Cain what he deserved in full. He gave him a chance to live. That is the nature of God - justice and mercy together, always. What we do with our anger. The story of Cain and Abel is a story about what we do with our anger. Anger is not a sin. But what we do with it can be. God gave Cain a warning. God gave him a chance. Cain chose not to listen. Every day we face our own choices - will we listen to God? Will we treat the people around us with kindness? What we choose with our anger matters more than we know. God is always the keeper of the lost. God knew Abel name. The world forgot him. He lay in a field unnamed, unseen, unhonoured. But God called his name and heard his blood crying out from the ground. God always sees the ones the world walks past. And He calls us to see them too - because when we reach out to someone who has been forgotten or hurt, we are reaching out to someone God's loves completely.`,prayer:`Dear God, help me when I feel angry or jealous. Help me to bring those feelings to You instead of letting them grow into something harmful. Teach me to choose well. In Jesus Name. Amen.`},
  {id:94,title:'The Prodigal Father',narration:`The younger son comes home. The younger son had left home, wasted his inheritance, and come back to his father mercy. He had rehearsed his speech: Father I have sinned. I am not worthy to be called your son. Make me like one of your hired servants. But the father saw him coming while he was still a long way off. He ran. He threw his arms around him. He kissed him. The son began his speech. The father interrupted it with a celebration. The older son in the field. The older son was in the field. He came near the house and heard music and dancing. Your brother has come home, a servant said. And your father has killed the fattened calf because he has him back safe and sound. The older son was angry. He would not go in. The celebration was happening right there in his own home and he chose to stand outside it. The older son speaks his heart. The older son said: All these years I have been slaving for you and never disobeyed your orders. Yet you never gave me even a young goat so I could celebrate with my friends. But when this son of yours comes home, you kill the fattened calf for him! He was angry. He had kept the rules. He had never left. And his brother had come home to a party he had never been given. Son you are always with me. The father said: Son, you are always with me, and everything I have is yours. The older son had been living as a servant in his own father's house. Everything was already his. He did not need a celebration because he had the father himself. And then the father said: But we had to celebrate and be glad, because this brother of yours was dead and is alive again, he was lost and is found. Two kinds of being lost. There are two kinds of lostness in this story. The younger son was lost far away. The older son was lost right outside the party. Both were separated from the father's love - one by rebellion, one by self-righteousness. The father went after both. He ran to the younger. He came out to the older. Grace has no favourites. But it does have to be received. Come in to the party. The parable ends without telling us what the older son decided. Jesus left it open on purpose. The older brothers were the Pharisees who were grumbling about Jesus welcoming sinners. Would they go in? The question is still open. For all of us who have stayed home and followed the rules and secretly wondered where our celebration is: you are always with the Father. Everything He has is yours. Come in. The door is always open. The parable ends without telling us what the older son decided. The question is still open. For all of us who have wandered like the younger son, the father is already running. For all of us who have stayed and quietly resented others, the father is already outside speaking to us. The door is open. The celebration is inside. Come in. Everything He has is yours. Come in.`,prayer:`Dear Father, thank You that You come after both kinds of lost. Help me to receive Your grace and to celebrate when the lost come home. In Jesus Name. Amen.`},
  {id:95,title:'The Passover Lamb',narration:`A lamb for each household. God told Moses: On the tenth day of this month each family must take a lamb. The lamb must be perfect, without defect. They were to keep it until the fourteenth day. Then they would slaughter it at twilight. They were to do something specific with the blood. And they were to eat the lamb that night roasted over fire with bitter herbs and bread made without yeast - eating it in haste, ready to leave. Blood on the doorframes. God said: Take some of the blood and put it on the sides and tops of the doorframes of the houses where you eat the lamb. That same night I will pass through Egypt and strike down every firstborn. But when I see the blood, I will pass over you. No destructive plague will touch you. The blood on the doorframe was the sign. What the blood covered, death would pass over. The destroyer passes over. That night God passed through Egypt. Wherever the blood was on the doorframe, death passed over. Every Israelite home that had applied the blood was kept safe. Not because of anything the people had done or earned. Because of the blood of the lamb applied to the door. Everything that was under it was saved. The blood was the protection. A great cry in Egypt. At midnight God struck down every firstborn in Egypt from the firstborn of Pharaoh to the firstborn of the prisoner in the dungeon. There was loud wailing in Egypt, for there was not a house without someone dead. Then Pharaoh summoned Moses and said: Up! Leave! Go! The night the blood saved Israel is called the Passover - because death passed over the homes that were covered. Jesus is our Passover Lamb. Centuries later, on the night of the Passover feast, Jesus ate the Passover meal with His disciples. The next day He was crucified. John the Baptist had called Him the Lamb of God who takes away the sin of the world. Paul wrote: Christ our Passover lamb has been sacrificed. The lamb in Egypt whose blood protected the Israelites was a picture of Jesus - the one whose blood covers all who believe. Remember this day forever. God said: This is a day you are to commemorate for the generations to come. Every year the Jewish people still celebrate the Passover. They retell the story. They eat the lamb and the bitter herbs and the bread without yeast. They remember. Because those who remember where they came from and who rescued them never completely lose their way. The rescue must be remembered. And the Rescuer must be known. The Rescuer must be known. God said: This is a day you are to commemorate for the generations to come. Every year the Jewish people still celebrate the Passover. They retell the story. They eat the lamb. They remember. Because those who remember where they came from and who rescued them never completely lose their way. The rescue must be remembered. And the Rescuer must be known. Jesus is the Lamb. Know Him.`,prayer:`Dear Jesus, thank You that You are the Lamb of God who takes away the sin of the world. Thank You that Your blood covers me. Help me to live with the grateful memory of what You have done. In Jesus Name. Amen.`},
  {id:96,title:'The Father Who Runs',narration:`Give me my share. The younger son said to his father: Give me my share of the estate now. The father divided his property between his two sons. And the younger son left. He walked away from home, from family, from everything that loved him - looking for something better. He had the money. He had the freedom. And for a while, he had a wonderful time. He wasted everything. The younger son went to a faraway country and wasted his whole inheritance in wild living. He had everything and no idea it would not last. But the money ran out. Then a severe famine hit the country. His friends disappeared when the money was gone. He was desperate. The only job he could find was feeding pigs. He sat in the mud watching the pigs eat and thought: I am worse off than my father servants. When he came to himself. He came to himself. I will get up and go back to my father, he said. I will tell him: Father, I have sinned against heaven and against you. I am no longer worthy to be called your son. Make me like one of your hired servants. He got up. He started the long walk home. He did not know what kind of reception he would receive. He just knew he had nowhere else to go. The father sees him coming. When he was still a long way off, his father saw him. He recognised him from far away. And he ran. He did not wait for the full apology. He did not wait for the son to prove he had changed. He ran. He threw his arms around him and kissed him. The son began his speech: Father, I have sinned. I am not worthy to be called your son. But the father was already calling to his servants. A robe a ring a party. The father said: Quick! Bring the best robe and put it on him. Put a ring on his finger and sandals on his feet. Bring the fattened calf and kill it. Let us have a feast and celebrate. For this son of mine was dead and is alive again. He was lost and is found. And they began to celebrate. This is the picture of what God is like. He runs. He embraces. He throws parties. He was lost and is found. The father had not forgotten his son in all the time he was away. He had been watching. He had been waiting. The moment he saw him in the distance, he ran. That is the God this story describes. He does not make us earn our way back. He does not wait for us to prove we have changed. When we turn toward home, He is already running toward us. That is grace. That is the gospel. This is what God is like. This is the gospel in one story. We take what we are given and waste it. We end up in a far country. We come to our senses. We turn toward home. And He is already running. He throws a party. He says my son was dead and is alive, was lost and is found. That is what God is like. That is always what God is like. The door is always open. Come home.`,prayer:`Dear Father, thank You that You are always watching for me to turn toward home. Thank You that You run toward me with open arms. Help me to come back to You whenever I drift. In Jesus Name. Amen.`},
  {id:97,title:'Jesus Heals a Blind Man',narration:`Who sinned this man or his parents?. As Jesus and His disciples passed by, they saw a man who had been blind from birth. The disciples asked: Rabbi, who sinned, this man or his parents, that he was born blind? Jesus said: Neither this man nor his parents sinned. This happened so that the works of God might be displayed in him. He turned the theological question into an opportunity for a miracle. Mud on his eyes. Jesus spat on the ground, made some mud with the saliva, and put it on the man's eyes. He said: Go and wash in the pool of Siloam. The man went. He washed. And he came home seeing. This is the strangest method Jesus ever used to heal someone - mud on the eyes. But obedience was all that was required. He went. He washed. He came back seeing. The neighbours do not believe it. His neighbours and those who had formerly seen him begging asked: Is this not the man who used to sit and beg? Some said yes, it is him. Others said no, he just looks like him. He kept saying: I am the man! How then were your eyes opened? He told them: The man they call Jesus made some mud, put it on my eyes and told me to go to Siloam and wash. So I went. I washed. And then I could see. The Pharisees investigate. They brought the man to the Pharisees. This happened on a Sabbath. The Pharisees were more interested in the fact that Jesus had made mud on the Sabbath than in the fact that a man who had been blind from birth could now see. They questioned him. They questioned his parents. His parents said: Ask him - he is of age, he can speak for himself. The man stood firm in what he knew. One thing I know. The man said: Whether he is a sinner or not, I do not know. One thing I do know. I was blind but now I see! They could not argue with it. They had not been there. He had. He did not have theology. He did not have training. He had one undeniable fact: I was blind and now I see. Sometimes that is the most powerful testimony anyone can give. Do you believe in the Son of Man?. When Jesus heard the man had been thrown out, He found him and said: Do you believe in the Son of Man? The man said: Who is he, sir? Tell me so that I may believe. Jesus said: You have now seen him. In fact, he is the one speaking with you. And the man said: Lord, I believe. And he worshipped Him. He had been healed by Jesus without ever seeing Him. Now he saw Jesus - and recognised Him immediately. I was blind but now I see. The man had been blind from birth. He had never seen a colour or a face or a sunrise. And the first face his healed eyes truly saw was the face of Jesus. He said: Lord, I believe. And he worshipped Him. Jesus gives physical sight and spiritual sight. The greatest healing is not to see the world clearly - though that is wonderful - it is to see Jesus for who He truly is. Lord. My Lord. I believe.`,prayer:`Dear Jesus, thank You for opening eyes - both physical and spiritual. Help me to see You clearly and to say with confidence: I once was blind but now I see. In Jesus Name. Amen.`},
  {id:98,title:'When People Tried to Reach Heaven',narration:`One language one people. Long ago, after the great flood, all the people on earth spoke the same language. Every word. Every name. Every song was shared. Everyone could understand everyone else. What a gift that was. They could have used it to build something beautiful for God. But they had a different idea. Let us make a name for ourselves. The people said to each other: Come, let us build a great city with a tower that reaches to the sky. Let us make a name for ourselves! They were not building a tower to honour God. They were building it to make themselves famous, to show how great they were, to prove they did not need anyone above them. They wanted to be their own gods. God comes down to see. The Bible says that God came down to see the city and tower that the people were building. That detail is wonderful. Their tower that reached to the sky - God had to come down even to see it. It was so much smaller than they thought. Human pride always is. But God took what they were doing seriously, because He cared about what was happening in their hearts. Different languages. God said: If they can do this when they all speak one language, nothing they plan will be impossible for them. So He gave the different groups different languages. Suddenly nobody could understand anyone else. The building stopped. The great city was abandoned. People scattered across the earth - which is exactly what God had originally wanted them to do. Scattered across the world. The tower was never finished. The city was called Babel, which means confused. The people spread out across the whole earth, each group with their own language, filling the lands and coasts and mountains God had always meant for them to fill. What they meant to do for pride, God turned into the spread of humanity across His whole beautiful world. Humility before the God who is great. The lesson of Babel is not complicated. God is great and we are loved by Him. When we try to make ourselves the centre of everything, things do not go well. But when we remember how great He is and how loved we are by Him, we find our right size - small enough to need God, big enough to be loved by Him. At Pentecost, the confusion of Babel was reversed by love. One day all languages will praise Him together. Love gathers what pride scatters. One day at Pentecost, the Holy Spirit came and people heard the good news in every language at once. What had been divided at Babel was reunited by love. And one day people from every tribe and tongue and nation will stand together before God in joy. The tower of Babel scattered people. The love of God is gathering them back. He is always gathering what pride has scattered.`,prayer:`Dear God, help me to remember that You are the greatest and I am loved by You. Keep my heart humble and help me to use my gifts to honour You, not to make myself famous. In Jesus Name. Amen.`},
  {id:99,title:'Let the Children Come',narration:`Families bring their children. People were bringing little children to Jesus for Him to place His hands on them and pray for them. They had come from a distance. They had waited in the crowd. They had made their way through the press of people just to get close enough. They wanted Jesus to touch their children. They wanted His blessing on their little ones. But when they got close, they ran into an obstacle. The disciples turn them away. The disciples rebuked them. They turned the families away. Jesus was busy. He was important. He had things to do. There were serious grown-up matters to attend to. Children could wait - or they could go away altogether. The disciples stepped in front of the families and told them no. They thought Jesus would be pleased with them for managing His schedule. He was not. Jesus is indignant. When Jesus saw what His disciples were doing, He was indignant. The word means genuinely upset - not mildly displeased. Let the little children come to me, He said firmly. Do not hinder them. For the kingdom of heaven belongs to such as these. The disciples stepped aside. The children poured through. And Jesus turned His full attention to each small face that came to Him. Jesus holds and blesses them. He took the children in His arms, placed His hands on them, and blessed them. He did not rush. He did not bless them quickly and move on. He gave each one his full attention. Children who had been turned away by the disciples were welcomed by Jesus. Children who had been told they were not important enough found themselves on the lap of the Son of God. The kingdom belongs to such as these. Jesus said: Unless you receive the kingdom of God like a little child, you will never enter it. He was not asking grown-ups to pretend. He was saying that the trust, the wonder, the openness that children carry naturally - that is exactly how every person needs to come to God. You do not outgrow it. You grow into it more deeply over a lifetime. Come to me. Jesus placed His hands on them and blessed them. Then He went on from there. But the children never forgot it. And neither did the disciples. The day they tried to turn children away from Jesus became the day they learned that the kingdom belongs to the ones who come with open hands and trusting hearts. No one is too small to be seen by Jesus. No one is too unimportant to be blessed by Him. You belong with Jesus. Jesus placed His hands on them and blessed them. The day the disciples tried to turn children away from Jesus became the day they learned that the kingdom belongs to those who come with open hands and trusting hearts. No one is too small to be seen by Jesus. No one is too unimportant to be blessed by Him. You belong with Jesus.`,prayer:`Dear Jesus, thank You that You welcome me - just as I am, just as young as I am, just as ordinary as I am. Thank You that the kingdom belongs to those who come to You with open hearts. In Jesus Name. Amen.`},
  {id:100,title:'The Great Commission',narration:`Gathered on a mountain. After the resurrection, Jesus told His disciples to go to a mountain in Galilee. They went. When they saw Him they worshipped Him. But the Bible says some doubted. Even at this extraordinary moment, even face to face with the risen Jesus, some of them were not fully sure. And Jesus did not wait for everyone to have their doubts resolved. He stepped forward and spoke to them anyway. All authority in heaven and on earth. Jesus said: All authority in heaven and on earth has been given to me. He did not say some authority. He did not say authority in spiritual matters only. All authority. In heaven and on earth. He was not describing a small or local kingdom. He was describing the scope of His reign over everything that exists. And from that authority, He gave them the greatest commission anyone has ever received. Go and make disciples. Therefore go and make disciples of all nations, baptising them in the name of the Father and of the Son and of the Holy Spirit, and teaching them to obey everything I have commanded you. Go. Not stay. Not wait. Not manage what you have. Go. Make disciples - not just converts, but people who actually follow Jesus all the way, who learn His ways, who live His life. All nations. All nations. Not some nations. Not the nearby nations. Not the easy nations. All of them. This is the Great Commission - not small, not local, not limited. Every person in every nation on every continent is included in the go. The disciples were eleven ordinary Galilean men. And Jesus told them to go to all nations. They did. And two thousand years later the gospel has reached every part of the world. I am with you always. And then Jesus said something that made the impossible commission possible: And surely I am with you always, to the very end of the age. Always. Not sometimes. Not when things are going well. Not until things get difficult. Always. To the very end. The commission was big enough to take a lifetime and beyond. But He who gave it would be with them for every step of it. The end of the beginning. The Great Commission is the last thing Matthew records Jesus saying before He ascended. Not a warning. Not a theology lesson. A mission. Go. Make disciples. Baptise. Teach. And I am with you always. Every Christian who has ever lived has been part of this commission. Every person who has shared their faith, opened the Bible with someone, or prayed for their neighbour has been part of what started on that mountain. The commission is still open. The promise is still good. Go. And I am with you always. The Great Commission is the last thing Matthew records Jesus saying before He ascended. Not a warning. Not a theology lesson. A mission. Go. Make disciples. Baptise. Teach. And I am with you always. Every Christian who has ever lived has been part of this commission. The commission is still open. The promise is still good. Go. Tell someone about Jesus. He is with you every step of the way.`,prayer:`Dear Jesus, thank You for the Great Commission and for the promise that You are with me always. Help me to be part of Your mission - to make disciples of all nations starting with the people right around me. In Jesus Name. Amen.`},
];</script>
<script>
let stopped = false, done = 0;
const total = 10;

function log(m){const el=document.getElementById('log');el.innerHTML+=m+'<br>';el.scrollTop=el.scrollHeight;}
function progress(){document.getElementById('bar').style.width=(done/total*100)+'%';document.getElementById('prog').textContent=done+' / '+total;}

async function gen(text, filename){
  const resp = await fetch('https://api.elevenlabs.io/v1/text-to-speech/'+document.getElementById('voiceId').value+'/stream',{
    method:'POST',
    headers:{'xi-api-key':document.getElementById('apiKey').value,'Content-Type':'application/json','Accept':'audio/mpeg'},
    body:JSON.stringify({text,model_id:'eleven_turbo_v2',voice_settings:{stability:0.5,similarity_boost:0.75}})
  });
  if(!resp.ok) throw new Error('API '+resp.status);
  const blob = await resp.blob();
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  await new Promise(r=>setTimeout(r,1000));
}

async function start(){
  stopped=false; done=0;
  document.getElementById('startBtn').disabled=true;
  document.getElementById('stopBtn').disabled=false;
  log('Starting... files will download to your Downloads folder.');

  for(let i=0;i<AUDIO_DATA.length;i++){ const sid=AUDIO_DATA[i].id; if(sid<27||sid>31) continue;
    if(stopped) break;
    const s = AUDIO_DATA[i];
    
    try{
      log('Story '+s.id+': '+s.title+' - narration...');
      await gen(s.narration, 'audio_s'+String(s.id).padStart(3,'0')+'_story.mp3');
      done++; progress();
      log('✅ audio_s'+String(s.id).padStart(3,'0')+'_story.mp3');
    }catch(e){log('❌ Story '+s.id+' narration failed: '+e.message);}

    if(stopped) break;

    try{
      log('Story '+s.id+': '+s.title+' - prayer...');
      await gen(s.prayer, 'audio_s'+String(s.id).padStart(3,'0')+'_prayer.mp3');
      done++; progress();
      log('✅ audio_s'+String(s.id).padStart(3,'0')+'_prayer.mp3');
    }catch(e){log('❌ Story '+s.id+' prayer failed: '+e.message);}
  }

  log('--- DONE! Generated '+done+'/'+total+' files. ---');
  document.getElementById('startBtn').disabled=false;
  document.getElementById('stopBtn').disabled=true;
}

function stop(){stopped=true;document.getElementById('stopBtn').disabled=true;log('Stopping...');}
</script>
</body>
</html>
