const AUDIO_DATA = [
  {id:1,title:'In the Beginning',narration:`Darkness before creation. Before the mountains stood tall, before the first fish ever flipped its tail in the deep blue sea, before even the very first ray of sunshine found its way through a cloud, there was nothing. Nothing at all. Except God. And then God spoke. "Let there be light!" He said, and in an instant, light came rushing in from every direction, warm and golden and glorious. God looked at the light and smiled. It was good. Sky, seas and land. Next God made the sky, a great wide blue ceiling arching over everything. He gathered the waters and let dry land push up through the waves. Grass sprouted. Trees stretched their arms toward the sky. Flowers opened their petals for the very first time. Animals fill the earth. The oceans filled with fish of every colour. Birds stitched through the air. Lions padded across the savannah, elephants lifted their great grey heads, and tiny ants marched in perfect lines through the grass. Then God made people, shaped in His own image. He breathed life into them with His own breath. God rests on the seventh day. God looked at everything He had made and nodded with deep satisfaction. It was not just good. It was very good. On the seventh day, God rested. He made that day holy, a day set apart for peace and gratitude and quiet joy. Adam and Eve in the garden. God made two people - Adam and Eve. He placed them in a beautiful garden called Eden, full of every fruit tree and flower and creature you could imagine. God walked with them in the cool of the evening and called them by name. They were never lonely, and they were never afraid. Every creature has a name. God brought every creature to Adam and asked him to give them all names. Adam looked at the one with the long neck and called it giraffe. He looked at the great maned one and called it lion. He named the tiny buzzing one bee, and the spotted one leopard. God smiled at every name. A world made with love. Everything you can see - the sky above you, the ground beneath your feet, the wind on your face - God made it all with care and joy. And He made you to live right in the middle of it and enjoy every wonderful bit. You are part of His most beautiful story.`,prayer:`Dear God, thank You for making such an amazing world. Thank You for making me. Help me to take care of the beautiful things You have created. In Jesus Name. Amen.`},
  {id:2,title:'Noah and the Big Ark',narration:`God speaks to Noah. Noah was a man with a big heart and strong hands, and he loved God more than anything in the world. One evening, God spoke to Noah. "I am going to send a great flood," God said. "But I will keep you and your family safe. Build a boat, a very big boat, made of cypress wood. Make it three storeys tall." God gave Noah every measurement and every detail. Building the enormous ark. Noah did not ask questions. He rolled up his sleeves, picked up his tools, and got to work. For years and years he hammered and sawed and nailed. His neighbours walked past and shook their heads. Some laughed. Some called him foolish. Noah kept building. Animals march two by two. Then, when the ark stood tall and ready, the animals started coming. Two by two they came, lumbering elephants and skittering mice, roaring lions and gentle doves, spiky hedgehogs and long-necked giraffes. Noah and his family guided them all safely aboard. The rainbow promise. Then the rain began. For forty days and forty nights, the rain fell until the whole earth was covered. But inside the ark, everyone was safe and dry. When the rain finally stopped, Noah sent out a dove. She flew back with a fresh olive leaf in her beak. Land! When they stepped out, God made a promise sealed in the sky. The very first rainbow. "Every time you see a rainbow," God said, "remember my promise." Rain falls for forty days. For forty days and forty nights the rain fell. The whole world filled with water. But inside the ark it was warm and dry. Noah could hear the animals breathing and the rain drumming on the roof. God had kept His word. Every single one of them was safe. A dove brings good news. When the rain stopped, Noah sent out a dove to look for dry land. The first time she came back with nothing. The second time she returned carrying a tiny green olive branch. Noah heart leapt. Land! Somewhere out there, the earth was drying up at last. Stepping onto dry ground. At last the day came. God said, come out. Noah opened the great door and one by one the animals poured into the sunshine. His family stepped onto solid ground and breathed the clean fresh air. They built an altar and thanked God with all their hearts. God had saved them, and He would never forget them.`,prayer:`Dear God, help me to trust You like Noah did, even when I cannot understand everything. Help me to keep going even when things feel difficult. In Jesus Name. Amen.`},
  {id:3,title:'Joseph and His Coat',narration:`The coat of many colours. Joseph had ten older brothers, and trouble had been brewing between them for years. Their father Jacob loved all his children, but he gave Joseph something special, a long flowing coat woven in every colour of the sunset. When Joseph walked past in that coat, his brothers felt something dark and hot rise up inside them. Jealousy. Thrown into the pit. One day his brothers grabbed him, tore off his beautiful coat, and sold him to traders heading to Egypt for twenty pieces of silver. They dipped his coat in goat's blood and carried it home to their father. Jacob wept until he could weep no more. Joseph in prison trusting God. In Egypt, Joseph was sold as a slave. Then, through a lie told about him, he was thrown into prison. Every door seemed slammed shut. But God was with Joseph in that prison. He never grew bitter. He worked honestly and kept trusting God even in the dark. Joseph forgives his brothers. When Pharaoh had mysterious dreams nobody could explain, Joseph explained them with God's help and was appointed to oversee all of Egypt. When the famine came and his brothers arrived hungry, Joseph recognised them immediately. He could have taken revenge. Instead, tears ran down his face. "I am Joseph, your brother," he said softly. "Do not be afraid. God sent me here to save you." He threw his arms around them and wept. Sold to strangers. His brothers sold Joseph to traders heading for Egypt. Joseph looked back as long as he could. He was far from home, far from his father, far from everything he knew. But even in the worst moment of his life, God had not left him. Every step those camels took, God was watching. Joseph rises in Egypt. Years passed. Joseph served faithfully wherever he was placed and everywhere he went God blessed him. He explained dreams in prison. Before Pharaoh he interpreted a great vision. Pharaoh said - there is no one like him. Joseph became the second most powerful man in all of Egypt. A family made whole again. When Joseph saw his brothers he could have had his revenge. Instead, tears ran down his face. He threw his arms around them. What they meant for harm, God had turned into something wonderful. The whole family came to live in Egypt, together at last.`,prayer:`Dear God, thank You that Your plan is bigger than my problems. Help me to trust You when things go wrong, and give me the strength to forgive others the way Joseph did. In Jesus Name. Amen.`},
  {id:4,title:'Baby Moses in the Basket',narration:`A mother weaves a basket. There was a law in Egypt that made every mother tremble. Pharaoh had ordered that every baby boy born to the people of Israel must be thrown into the River Nile. Into this frightening world, a woman named Jochebed gave birth to a baby boy with the most beautiful face she had ever seen. For three months she hid him. But a baby cannot be hidden forever. Setting Moses on the river. Jochebed wove a little basket from papyrus reeds and waterproofed it carefully so not a drop of water could get in. Then, with trembling hands, she laid her precious baby inside and carried him to the river's edge. She set him among the tall reeds, barely able to see through her tears. The princess finds the baby. Then came the sound of laughter and splashing. Pharaoh's daughter had come to bathe. She noticed the basket and had it brought to her. When she lifted the lid, the baby opened his eyes and began to cry. The princess loved him immediately. A joyful reunion. Miriam stepped out of the rushes. "Shall I find a Hebrew woman to nurse the baby for you?" "Yes," said the princess. "Go." Miriam ran home and came back with their own mother. Jochebed got to hold her own son again, under the protection of the royal palace. When the boy was old enough, the princess named him Moses, which means: drawn from the water. A dangerous command. Pharaoh had given a terrible command. Every baby boy born to the Hebrew people was to be thrown into the river. Moses mother looked at her little boy and could not do it. She counted his fingers. She kissed his face. She made a plan to trust God with the most precious thing she had. A sister stands guard. Miriam, Moses big sister, hid in the reeds and watched. Her heart was beating very fast. The basket bobbed gently in the water. When the princess found the baby, Miriam was ready. She stepped forward bravely with exactly the right words at exactly the right moment. Knowing who you really are. Because of Miriam courage, Moses own mother was paid to nurse him. Every day she held him and whispered to him. She told him he was a child of God and that God had plans for his life. When the time came for him to return to the palace, Moses carried those words in his heart. He never forgot where he really came from.`,prayer:`Dear God, thank You that You watched over Moses as a tiny baby. Thank You that You watch over me too. Help me to trust You even when I cannot see what You are doing. In Jesus Name. Amen.`},
  {id:5,title:'David and the Giant',narration:`David the shepherd. David was a young shepherd boy who had spent his life out on the hills keeping his father's sheep safe from wolves and lions. He trusted God completely with every moment. Goliath roars at the army. Every morning for forty days, the giant came out. Goliath of Gath stood over nine feet tall. His bronze helmet caught the sun like a beacon. "Send your best fighter!" he roared. Every day the soldiers of Israel stood frozen with fear. Then David arrived. "Who is this man," David asked, "that he dares to speak against the army of the living God?" Five smooth stones. King Saul tried to give David his armour. David took it off immediately. "I can't move in this." Instead he went to the stream and chose five smooth stones, put one in his sling, and walked into the open valley alone to face the giant. The giant falls. Goliath laughed. "Come here, and I will feed you to the birds!" David did not flinch. "You come with a sword and a spear," he called back steadily. "But I come in the name of the Lord God of Israel!" He ran forward, swung his sling, and released. The stone flew straight and struck Goliath in the forehead. The giant fell with a crash that shook the ground. The battle was won. Everyone else was afraid. Every morning for forty days Goliath walked to the front of the valley and shouted his challenge. And every morning the whole army of Israel turned and ran. Nobody stepped forward. Until a shepherd boy arrived carrying bread for his brothers and heard what was happening. David trusts his God. King Saul shook his head. But David looked back steadily. I killed a lion and I killed a bear to protect my sheep, David said. This Goliath is no different. The Lord who saved me from the lion will save me from him. Saul had no answer for that. He gave David his blessing. A shepherd becomes a legend. The news spread like fire. David had done what no soldier could do. But David did not boast. He knew the truth - it was not his stone that had won. It was his God. He went back to his sheep. He wrote songs to the Lord in the fields. And God looked at this young shepherd and said in His heart - this is a man after my own heart.`,prayer:`Dear God, when things seem too big and too scary, help me to remember that You are bigger than any giant I will ever face. Give me the same courage You gave David. In Jesus Name. Amen.`},
  {id:6,title:'Jonah and the Big Fish',narration:`Jonah runs to the harbour. God had a job for Jonah, and Jonah did not want it. "Go to the great city of Nineveh," God said. "Warn the people there to change their ways." Nineveh was east. So Jonah went west, as far west as he could get. He bought a ticket on the first ship he could find and settled below deck. Overboard in the storm. The ship set sail. Then a storm hit so suddenly that experienced sailors fell to their knees in terror. Jonah told them everything. "I worship the God who made the sea and I have run away from Him. Throw me into the sea. This storm is my fault." They threw him overboard and the sea went instantly calm. Inside the big fish. Jonah sank down into the cold darkness. Then a great fish swam up from the deep and swallowed him whole. Inside that fish, in the strangest quiet that ever existed, Jonah prayed. He said sorry. He thanked God for not letting him drown. He promised to obey. Three days later, the fish swam to shore and spat him out onto dry land. Nineveh repents. "Go to Nineveh," God said again. This time, Jonah went. And the whole city listened, from the king down to the smallest child. They turned back to God. God saw their changed hearts, and He showed them mercy. Jonah prays in the deep. In the dark belly of the great fish, Jonah prayed like he had never prayed before. I cried out to you Lord and you answered me, he said. From the depths I called and you heard my voice. Three days he stayed there. Three days he chose to turn his whole heart back to God. A city that listened. Jonah walked into the great city of Nineveh. It took three whole days just to walk across it. He walked and preached. And something extraordinary happened. The people listened. From the king on his throne to the poorest person in the street, every one of them listened and turned to God. God mercy is bigger than we think. Jonah sat on the hillside waiting to see what would happen to Nineveh. God sent a plant to shade him, then a worm to eat the plant. When Jonah was upset about the plant, God said gently - you cared about this plant. Should I not care about an entire city full of people? Jonah had more to learn about the size of God's love.`,prayer:`Dear God, help me not to run away from what You ask me to do. Thank You that even when I make mistakes, You still love me and give me another chance. In Jesus Name. Amen.`},
  {id:7,title:'Daniel and the Lions',narration:`Daniel prays at his window. Three times every day, without fail, Daniel opened his window toward Jerusalem, got down on his knees, and prayed. He thanked God for the morning. He asked for wisdom through the afternoon. He ended each evening in gratitude. It was as natural to Daniel as breathing. Officials watch through the door. Daniel had risen to become one of the most trusted officials in the whole kingdom. This made the other officials furious with jealousy. They convinced the king to sign a decree: for thirty days, anyone who prayed to any god except the king would be thrown into the lions' den. Daniel heard about the new law. He went home and prayed, just as he always had. Into the lions den. The jealous officials ran to the king. Darius's face fell. He tried all day to find a way around his own law. There was none. As the sun set, Daniel was lowered into the lions' den. The stone was rolled over the entrance. That night the king could not eat or sleep. Safe with the angel. At dawn the king ran to the pit. "Daniel!" he called. "Has your God been able to rescue you?" And from inside the pit, a calm and steady voice answered: "My God sent his angel and shut the mouths of the lions. They have not hurt me at all." Daniel was lifted out, completely unharmed. Not a scratch on him. Faithful in everything. Daniel had been brought to Babylon as a young boy. But he made up his mind to serve God faithfully no matter where he was. He worked hard. He was honest. He was kind. He was so good at everything he did that the king put him in charge of the whole kingdom. Other officials were jealous. They watched him carefully. They found nothing to accuse him of. Nothing except that he prayed. A king who could not sleep. King Darius loved Daniel. He had been tricked into signing the law that trapped him. All night the king could not sleep. He paced the floors. He refused food. When morning finally came, he ran to the den of lions. He fell to his knees and called out - Daniel! Has the God you serve been able to save you? One man changed an empire. Daniel came out of the lions den without a scratch. Not a mark on him. The king was so overcome that he sent a letter to every nation in his kingdom: In every corner of my kingdom people must fear and honour the God of Daniel. For He is the living God who rescues and saves. One faithful man changed an entire empire.`,prayer:`Dear God, help me to be as steady and brave as Daniel. Help me never to be ashamed of loving You or talking to You, no matter what. In Jesus Name. Amen.`},
  {id:8,title:'The Birth of Jesus',narration:`No room at the inn. The roads to Bethlehem were crowded that night. Everyone had been ordered to return to their hometown to be counted. Among them were Mary and Joseph, tired from the long road from Nazareth. When they finally reached Bethlehem, the town was bursting. Every inn was full. Joseph knocked on door after door. No room. No room. No room. Jesus is born in the stable. But one kind innkeeper offered them his stable. That night, in that humble and holy place, Mary's baby was born. She wrapped him in strips of soft cloth and laid him in a manger. She looked at his tiny face and his perfect fingers, and she knew: this was the Son of God, come to earth as a baby. Angels fill the sky. Out on the hillside, shepherds sat in the dark with their sheep when without any warning the darkness blazed with light. An angel stood before them. "Do not be afraid!" the angel said. "Tonight, in the town of David, a Saviour has been born. He is Christ the Lord." Then the whole sky filled with angels, singing: "Glory to God in the highest, and on earth, peace." Shepherds find the baby. The shepherds ran down the hillside to the town, breathless and laughing with wonder, until they found the stable and pushed open the door. There He was. Exactly as the angel had said. They knelt down. They were full of joy. And then they ran out and told everyone they met what they had seen and heard that night. Mary receives impossible news. It began with a girl named Mary in a small town called Nazareth. An angel came with news that would change everything. She would have a son and His name would be Jesus. He would be called the Son of God. Mary was frightened. She was also amazed. Then she said the bravest words ever spoken: Let it be to me as you have said. Wise men follow a star. Far away in the East, wise men who studied the stars saw something they had never seen before. A new star, brighter than all others. They knew what it meant - a great king had been born. They packed their finest gifts and set off across the desert following that star. They did not know exactly where they were going. But they knew they had to go. Simeon holds the hope of the world. When Mary and Joseph brought baby Jesus to the temple, an old man named Simeon was waiting. God had promised him he would see the Saviour before he died. When he took Jesus in his arms he began to cry tears of pure joy. Now I can go in peace, he said, because I have seen with my own eyes the one who will bring light to the whole world.`,prayer:`Dear Jesus, thank You for coming to earth as a baby, for me. Help me to run toward You the way the shepherds did, with joy and wonder in my heart. In Jesus Name. Amen.`},
  {id:9,title:'Jesus Calms the Storm',narration:`Setting sail at sunset. It had been a long and full day. Jesus had been teaching beside the lake for hours. When evening came He said to His disciples, "Let's cross to the other side." They climbed into their boat, and Jesus settled into the stern, found a cushion, and within minutes was deeply asleep. The storm strikes. The disciples rowed. The stars came out. And then the wind changed. One moment the water was flat and dark. The next, waves were crashing over the sides of the boat. These were experienced fishermen, and they knew a bad storm. They bailed frantically. Water rose around their ankles. And Jesus was still asleep. Jesus stands and commands. Finally they shook Him awake. "Teacher! Don't you care that we are drowning?" Jesus opened His eyes. He stood up in the rocking boat. He looked at the wind. He looked at the sea. And He said, simply and with complete authority: "Peace. Be still." The wind stopped. Instantly. Perfect calm and wonder. The crashing waves flattened out and became smooth and perfectly calm. Jesus looked at His disciples. "Why were you so afraid? Do you still have no faith?" The disciples looked at each other and then at the perfectly still water. "Who is this?" they whispered. "Even the wind and the waves obey him." Jesus sleeps through the chaos. The storm hit suddenly. Waves crashed over the sides of the boat. The disciples grabbed at ropes and oars and bailed water with their hands. Some had been fishermen their whole lives and had never seen a storm like this. They were sure they would drown. And in the back of the boat, Jesus was fast asleep on a cushion. Who is this man?. When the wind stopped and the sea turned to glass, the disciples looked at one another. Then they looked at Jesus. Then back at the sea. Who is this? they whispered to each other. Even the wind and the waves obey him. They had seen miracles before. But this was different. Something was stirring in their hearts - something bigger than fear. Peace in every storm. They made it safely to the other side. Later, when the disciples faced other storms - storms of fear and doubt and hardship - they would remember this day. They would remember how Jesus stood and spoke, and how even the sea listened. And they would know: if He can calm that, He can calm this too.`,prayer:`Dear Jesus, when I am scared and the storms of life feel too big, help me to remember that You are always with me. Help me to trust You and not be afraid. In Jesus Name. Amen.`},
  {id:10,title:'The Good Samaritan',narration:`A question about neighbours. A teacher of the law came to test Jesus. What must I do to live forever? Jesus turned the question back to him. What does the law say? The teacher answered correctly - love God and love your neighbour. Good, said Jesus. Do that and you will live. But the teacher was not finished. And who is my neighbour? So Jesus told a story. Robbers attack a traveller. The road from Jerusalem down to Jericho wound through rocky desert hills full of sharp bends where robbers could hide and wait. One day, a man set off down that road. He did not make it far. Robbers leapt out, grabbed everything he had, beat him badly, and left him face-down in the dirt. Two religious men walk past. Not long after, a priest came down the road. A man of God who spent every day talking about loving your neighbour. He saw the man lying in the dust. He crossed to the other side of the road and walked on. Then a Levite, another religious man, came by. He also crossed to the other side and walked on without a word. The Samaritan kneels down. Then came the sound of hooves. A Samaritan man rounded the bend. Samaritans and Jews did not get along at all. He had every reason to ride past. Instead he stopped. He climbed down. He knelt beside the man. His heart filled with pity. He poured oil and wine over the wounds and bandaged them. The Samaritan tends every wound. The Samaritan did not look away. He went straight to the man and knelt down. He poured oil and wine on the wounds - oil to soothe, wine to clean. He tore cloth and bandaged every cut carefully. He did not rush. This was what love looked like on a dusty road with nobody watching. Carried safely to the inn. He lifted the man onto his donkey and took him to the nearest inn. He paid for a room, cared for the man through the night, and in the morning pressed coins into the innkeeper's hand. "Take care of him. If it costs more, I will pay you when I come back." Jesus told this story and then asked, "Which of these three was a true neighbour?" "The one who showed mercy," came the answer. "Go," said Jesus, "and do the same." Go and do the same. Jesus finished the story. Which of these three was a neighbour? The teacher said quietly: the one who showed mercy. Jesus nodded. Go, He said, and do the same. The teacher had come with a trick question. He left with something much harder - a call to live differently. And so did everyone who heard the story. Including us.`,prayer:`Dear God, give me eyes to see people who need help and a heart that actually wants to stop and do something about it. Make me a good neighbour. In Jesus Name. Amen.`},
  {id:11,title:'Feeding of Five Thousand',narration:`A very hungry crowd. Wherever Jesus went, the crowds followed. This day five thousand men plus many women and children had gathered on a hillside. They had been there all day. By late afternoon nobody had eaten. The disciples said: Send these people away so they can buy food. But Jesus said: You give them something to eat. A boy offers his lunch. Philip said it would take half a year's wages to feed everyone. Andrew found a boy with five barley loaves and two fish. How far will they go among so many? It felt impossible. Jesus said: Have everyone sit down. Jesus gives thanks. Jesus took the five loaves and the two fish. He looked up toward heaven. He gave thanks. Something so simple - just a prayer of gratitude over a small boy's lunch. Then He began to break the bread. Bread multiplies in His hands. He broke it and broke it and broke it. And there was always more. Every time a disciple reached out, another piece appeared. The bread would not stop. The fish multiplied too. The hands that made every grain of wheat in every field held this small lunch - and it kept multiplying. A miracle unfolding in open hands. Everyone is fed. The disciples carried the food through the crowd. Row after row. Family after family. Person after person. The food kept coming and they kept giving. Every single person ate until completely satisfied. Five thousand men plus women plus children. All fed. All full. From a small boy's lunch. Twelve baskets of leftovers. When everyone had finished Jesus said: Gather the pieces left over. Let nothing be wasted. They collected twelve full baskets of leftovers. One for each disciple. More at the end than they had at the beginning. More than enough. He takes what we offer - however small, however ordinary - and He makes it more than enough. Always more than enough. The boy gave everything he had. It was a small lunch. In the hands of Jesus it became a feast for thousands.`,prayer:`Dear Jesus, I give You what I have, even when it seems small. I trust You to use it for something bigger than I can see. In Jesus Name. Amen.`},
  {id:12,title:'Zacchaeus in the Tree',narration:`Zacchaeus cannot see. In the city of Jericho there lived a man named Zacchaeus, and Zacchaeus was not popular. He was the chief tax collector, and he had made himself very rich by taking more than was owed from the people around him. When Zacchaeus heard that Jesus was passing through Jericho, something stirred inside him. He wanted to see this man. But the street was packed with taller people. Up the sycamore tree. He looked around, thought quickly, then did something a wealthy official would never normally do. He ran ahead through the crowd and climbed a sycamore tree, pulling himself up into the branches like a boy. Up there, hidden among the leaves, he finally had a clear view. Jesus calls his name. Then Jesus came. He was walking along the road when He came to the sycamore tree. And He stopped. He looked up, directly into the branches, directly at Zacchaeus. "Zacchaeus," He said, using his name, this name Jesus had never been told, "come down immediately. I must stay at your house today." A completely changed heart. Zacchaeus almost fell out of the tree. He scrambled down and welcomed Jesus with joy that spilled out of him. The crowd murmured. "He has gone to be the guest of a sinner." But something enormous had happened in Zacchaeus's heart. "Lord," he said, standing up straight, "I will give half of everything I own to the poor. And if I have cheated anyone, I will pay it back four times over." Jesus smiled. "Today salvation has come to this house." A man nobody wanted to know. Zacchaeus was rich. He was a chief tax collector who worked for the Romans and took more than was fair from his own people. Everyone in Jericho knew his name and nobody wanted to know him. He was surrounded by people every day and completely alone. Then he heard Jesus was coming through town. Jesus comes to dinner. Jesus did not just wave to Zacchaeus from the road. He stopped under the tree and looked up and said, Zacchaeus! Come down immediately. I am going to your house today. Zacchaeus nearly fell out of the tree. The crowd was horrified. But Jesus had come to find exactly the kind of person that everyone else had given up on. A life turned completely around. At dinner Zacchaeus stood up. Lord! I will give half of everything I own to the poor. And if I have cheated anyone I will pay them back four times as much. The room went quiet. This was not the Zacchaeus anyone knew. Jesus smiled. Today salvation has come to this house. A dinner. A conversation. A completely new life. That is what Jesus does when He comes looking for you.`,prayer:`Dear Jesus, thank You for seeing me just as I am and loving me anyway. Help me to be changed by Your love the way Zacchaeus was. In Jesus Name. Amen.`},
  {id:13,title:'The Prodigal Son',narration:`The son leaves home. A man had two sons, and one day the younger one came to him with a request that must have cut like a knife. "Father, give me my share of the inheritance now." The father divided his wealth. The young man packed everything and left for a distant country. There he threw the money around like it would never run out. He felt wonderfully free. Until the money was gone. Feeding pigs in rags. A great famine swept the land. He found work feeding pigs for a farmer. He was so hungry he looked at the pods he threw to the pigs and wished he could eat them himself. Sitting in the mud, empty and humiliated, he finally came to his senses. "I will go home. I will say: Father, I have sinned. Make me like one of your servants." The father runs. He got up and started the long walk home, his fine clothes long since turned to rags. He was still a long way off when his father saw him. The father had been watching every day. He did not walk. He ran. The embrace. He ran down the road with his robes flying, and when he reached his son he threw his arms around him and held him and would not let go. "Father, I have sinned," the son began. But the father was already calling to his servants. "Bring a robe! A ring! Prepare a feast! My son was lost, and now he is found!" A son who walked away. The younger son wanted his inheritance now - today, not when his father died. The father must have felt the sting of those words. But he did not argue. He divided everything and gave it to his son. And his son left. Walked away from home, from family, from everything that loved him - looking for something better. Coming back to his senses. The money ran out. His friends disappeared. A famine came. The only job he could find was feeding pigs. He sat in the mud watching the pigs eat and thought: my father servants eat better than this. He came to his senses. I will get up. I will go home. I will tell my father I am not worthy to be his son. He got up and started walking. A robe a ring and a party. The father did not make him a servant. He called for a robe - the best one. He put a ring on his finger. He ordered a feast. My son was dead and is alive again! He was lost and is found! The whole house filled with music and dancing. No matter how far you have gone - the moment you turn toward home, He is already running toward you.`,prayer:`Dear God, thank You for being the kind of Father who runs toward us. Help me to remember that no matter what I have done, I can always come home to You. In Jesus Name. Amen.`},
  {id:14,title:'The Resurrection',narration:`Walking to the tomb. It was the darkest weekend anyone who loved Jesus had ever lived through. Sunday morning, before the sun had fully risen, a group of women made their way through the quiet streets carrying spices and oils, a last act of love. Mary Magdalene was among them. As they walked, they wondered: "Who will roll the stone away for us?" The stone is moved. But when they reached the garden, they stopped and stood very still. The stone was already moved. The tomb was open. They stepped inside, their hearts hammering. The linen wrappings were there, folded neatly. But the body was gone. Two angels appear. Two angels in dazzling white appeared, and the women fell to the ground in terror. "Why are you looking for the living among the dead?" the angels asked. "He is not here. He has risen!" The women ran to tell the disciples, who did not believe them at first. Mary hears her name. Mary Magdalene stood alone outside the tomb, weeping, when she heard a voice behind her. She turned, thinking it was the gardener. "Mary," He said. One word. Her name. And she knew instantly. She turned fully and looked at Him, alive, standing before her in the morning light, and she cried out: "Teacher!" He was risen. Just as He had said. The longest Saturday. Saturday was the longest day the disciples had ever lived through. Jesus was gone. The tomb was sealed. His friends sat together in silence not knowing what to do with their grief. They had believed He was the one who would save them. Now they did not know what to believe. The women began preparing spices for His body. It was the only thing left to do. He is not here He is risen!. The women arrived at the tomb wondering how they would roll away the great stone. But the stone was already moved. An angel in clothes as white as lightning said: Do not be afraid. You are looking for Jesus who was crucified. He is not here. He has risen - just as He said He would. The tomb was empty. The grave could not hold Him. He appeared to them. That same evening Jesus appeared to His disciples. They thought they were seeing a ghost and were terrified. He showed them His hands. He showed them His side. He said, Peace be with you. Then He asked for something to eat - because ghosts do not eat fish, but He did. Joy swept through the room like a wave. He was alive. Truly, actually, completely alive. Death had not won. It never will.`,prayer:`Dear Jesus, thank You for rising from the dead. Thank You that death could not hold You. Help me to live with the joy of knowing that You are alive and You know my name. In Jesus Name. Amen.`},
  {id:15,title:'Jesus and the Children',narration:`Children are turned away. The children had been waiting all morning. Their mothers had brought them from all around. They wanted their children to receive Jesus's blessing. But when they got close, the disciples stepped forward with arms out. "Move back. The Teacher is busy." The children shrank back. Some looked at the ground. Jesus opens His arms. But Jesus had seen what was happening. He turned sharply, and the disciples went quiet. "Let the children come to me," He said firmly. "Do not stop them. The kingdom of God belongs to people like these." Then He sat down and opened His arms. Surrounded by children. Children poured in from every direction, scrambling onto His lap, pressing close, small fingers grabbing His robe, little faces turned up toward His. Jesus put His hands on each one. He spoke words of blessing over them. He laughed when they laughed. He was completely, entirely there, for them. The disciples made a mistake. The disciples thought they were being helpful. Jesus was busy. He was important. There were grown-up people with serious problems waiting. Children could wait. They stepped in front of the families and told them to leave. They thought Jesus would be pleased. He was not. Jesus is indignant. When Jesus saw what His disciples were doing, He was indignant. Not mildly displeased - truly upset. Let the little children come to me, He said firmly. Do not stop them. The kingdom of heaven belongs to such as these. The disciples stepped aside. The children poured through. Jesus turned His full attention to each small face that came to Him. What the children teach us. Jesus held them. He blessed them. He talked with them as though they were the most important people He had seen all day - because they were. He said that to enter the Kingdom of God every person needs to come with the trust of a child. Not pride or expertise. Just simple, open, wholehearted trust. Children already know how to do that. You belong in the Kingdom. Jesus said something that day that people have never forgotten: unless you receive the kingdom of God like a little child, you will never enter it. He was not asking grown-ups to pretend. He was saying that the trust, the wonder, the openness that children carry naturally - that is exactly how every person needs to come to God. You do not outgrow it. You grow into it more.`,prayer:`Dear Jesus, thank You for welcoming children and making time for them. Thank You for making time for me. Help me to always feel welcome to come to You. In Jesus Name. Amen.`},
  {id:16,title:'Elijah and the Fire',narration:`Elijah faces the nation. For three years not a single drop of rain had fallen on Israel. The prophet Elijah called everyone to Mount Carmel. "How long will you sit on the fence?" Elijah called out to the crowd. "If the Lord is God, follow Him. If Baal is god, follow him." "Let's settle this," Elijah said. "The God who answers by fire is the real God." False prophets dance and fail. The prophets of Baal went first. They built their altar and called on Baal from morning until noon, dancing and shouting. Silence. No answer. No fire. They kept calling until evening. Nothing came. Elijah watched. "Shout louder! Maybe Baal is sleeping!" Elijah drenches his altar. Then Elijah built his altar with twelve stones, dug a deep trench around it, and had four large jars of water poured over everything. Three times. Until water ran everywhere and filled the trench. Fire falls from heaven. Then Elijah simply prayed: "Lord, let it be known today that You are God in Israel. Answer me." The fire fell. It consumed the offering, the wood, the stones, the soil, and every drop of water in the trench. In seconds. Gone. Every person on the mountain fell face-down. "The Lord is God!" they cried. "The Lord is God!" A nation that forgot God. For years Israel had been drifting away from God. King Ahab and his wife Jezebel had filled the land with the worship of Baal, a false god who could not hear, could not answer, and could not save anyone. The prophets of God were hunted. The people were confused. Only one man was still standing and asking that question out loud - the prophet Elijah. Elijah rebuilds the altar. Before Elijah prayed, he did something important. He took twelve stones - one for each tribe of Israel - and rebuilt the altar of God that had been broken down. He prepared the wood. He laid the offering on top. Then he said - fill four jars with water and pour it over everything. And they did it three times. Completely drenched. Then Elijah prayed. Elijah alone with God. After the great fire and the great victory, the rain came. It poured in sheets across the dry land. The three-year drought was over. Elijah ran ahead of the king chariot all the way to Jezreel, filled with the power of God. The greatest thing about Elijah was not the fire. It was that he stayed close enough to God to be used by Him.`,prayer:`Dear God, help me to trust You like Elijah did. Help me to pray simply and honestly and to believe that You will answer. In Jesus Name. Amen.`},
  {id:17,title:'Ruth and Naomi',narration:`Ruth\\. Naomi had lost everything. Her husband and both her sons had died, leaving her alone in a foreign land. She told her daughters-in-law to go back to their own mothers. Orpah wept and, after a while, turned back. But Ruth held on and said: "Do not urge me to leave you. Where you go, I will go. Where you stay, I will stay. Your people will be my people, and your God will be my God." So they went to Israel together. Ruth gathering grain. Ruth worked in the fields every day, gathering leftover grain behind the harvesters in the blazing sun. She did it without complaint, every day, for the sake of Naomi. The field she chose belonged to a man named Boaz. When he heard about Ruth, how she had stayed with Naomi and worked so faithfully, his heart was moved. He gave instructions for her to be protected and fed. Naomi holds her grandchild. In time, Boaz married Ruth. Naomi, who had gone away empty and broken, found herself holding a grandchild in her arms, surrounded by kindness and joy she had not dared to hope for. A long road home. They walked the long road from Moab to Bethlehem together. Naomi kept trying to send Ruth back to her own people. But Ruth had made up her mind. Where you go I will go. Where you stay I will stay. Your people will be my people and your God my God. And she meant every single word. Boaz notices Ruth. Boaz was a wealthy farmer and a relative of Naomi family. When he came to his fields and saw Ruth working he noticed her. He asked his workers who she was. She came back with Naomi from Moab and has worked from morning until now without stopping. Boaz went to Ruth himself. Stay in my fields, he said. I will make sure you are safe. A love story God wrote. Boaz married Ruth. And when their son Obed was born, Naomi held the baby in her arms and the women of the town said: Naomi has a son! The empty place in her heart was full again. She had gone away with everything and come back with nothing. But God had been writing a love story all along. And baby Obed would one day be the grandfather of King David, and in the family line of Jesus Himself. Kindness that echoes forever. Ruth did not know when she left Moab that her faithfulness would be remembered forever. She only knew that Naomi needed her. She only knew that she would not walk away from someone she loved. And God - who sees every act of kindness, who forgets nothing - wove her story into the greatest story ever told. From Ruth and Boaz came Obed, then Jesse, then David, then Jesus Himself. One faithful woman changed eternity.`,prayer:`Dear God, help me to be faithful and kind like Ruth, not just when it is easy but when it costs me something. Thank You that You see every quiet act of love. In Jesus Name. Amen.`},
  {id:18,title:'Paul and Silas in Prison',narration:`Thrown into the innermost cell. Paul and Silas had done nothing wrong. They had helped a young woman who was being exploited, and in doing so had cost some powerful men a great deal of money. Those men got them beaten with rods and thrown into the innermost cell of the prison, their feet locked in stocks. They sat in the dark. Their backs were bleeding. Singing at midnight. At midnight, something happened that no one in that prison had ever heard before. Paul and Silas started to pray. And then they started to sing. Not whispers. Songs. Praise songs, rising up from that dark cell, filling every corridor. The other prisoners listened, unable to look away from these two beaten men singing in the dark. The earthquake breaks chains. Then the ground moved. An earthquake, sudden and violent, shook the foundations of the prison. The doors burst open. Every chain in every cell fell loose. Every prisoner was free. The jailer and his family. The jailer woke and drew his sword. "Do not harm yourself!" Paul called out. "We are all here!" The jailer ran inside, trembling. He fell at Paul and Silas's feet. "What must I do to be saved?" "Believe in the Lord Jesus," Paul told him. That same hour, the jailer washed their wounds, fed them, and his entire family was baptised, all of them full of joy. Spreading the good news. Paul and Silas had been travelling from city to city telling people about Jesus. They had seen people healed and whole households come to faith. But not everyone was happy. Some people in Philippi were losing money because of their work. They dragged Paul and Silas before the city rulers. They were beaten and thrown into the deepest part of the prison. The jailer finds faith. The jailer woke to find every cell open and every chain broken. He drew his sword - if the prisoners had escaped he would be executed. But Paul shouted from the darkness: Do not hurt yourself! We are all here! The jailer fell trembling before them. What must I do to be saved? he asked. He had been the one with the keys. Now he was the one who needed to be unlocked. A whole family changed forever. That night the jailer took Paul and Silas home, washed their wounds, and set food before them. That same night his whole family was baptised - every one of them. He had gone to sleep an ordinary prison guard. By morning he was a member of God's family. The most important thing that broke that night was the darkness in one man's heart - and God filled the space with light.`,prayer:`Dear God, help me to praise You even in the hard times, like Paul and Silas did. Remind me that my joy comes from You and not from my circumstances. In Jesus Name. Amen.`},
  {id:19,title:'The Lost Sheep',narration:`One sheep is missing. The shepherd knew every one of his sheep by name. He had one hundred of them, and every evening he counted them as they came through the gate. Ninety-seven, ninety-eight, ninety-nine. He counted again. Ninety-nine. One was missing. He left the ninety-nine and went. Searching through rocky hills. He took his crook and his lamp and went out into the night, calling. He searched through the thorny hillside, through the ravines, along the ledges where a sheep could fall. He did not give up when the night got cold. He called and listened and called again. Found wedged between rocks. And then, faint and frightened, the thin bleat of a sheep that had wedged itself between rocks and could not get free. He reached in and lifted the sheep out gently, murmuring quietly. The sheep was shaking. The shepherd held it close against his chest until it stopped trembling. Carried home with joy. Then he lifted it onto his shoulders and began the walk home. When he got back, he gathered his neighbours and friends. "Come and celebrate with me!" he laughed. "I found my lost sheep!" Then Jesus said: "There will be more joy in heaven over one sinner who turns back to God than over ninety-nine who need no help at all." That lost sheep is you, on the days when you have wandered. And the shepherd who goes out in the dark and does not stop looking, that is God. A shepherd who counts carefully. At the end of every day the shepherd counted his sheep. Tonight something was wrong. He counted again. And again. One was missing. Just one out of a hundred. Some people might say you still have ninety-nine - that is plenty. But to the shepherd the one that was missing was not just a number. That sheep had a face. That sheep had a name. And he was going to find it. Searching until he finds. He left the ninety-nine in the field and went searching. He called out into the dark. He climbed where it was difficult to climb. He pushed through thorny bushes. He did not say it is too hard or it is too late. He searched until he found. When he finally heard the faint sound of bleating from behind a rocky crag, something in him leapt with relief. There. Lost and found. More joy over one. He carried the sheep home on his shoulders - that is how shepherds do it, they carry the lost one. He called his friends: Celebrate with me! I found my lost sheep! Jesus finished the story and looked at the crowd. There is more joy in heaven over one person who comes back to God than over ninety-nine who never wandered. You are not just a number. You are the one He comes looking for.`,prayer:`Dear God, thank You for being a shepherd who always comes looking for me. Thank You that I am never just a number to You. Help me to stay close to You. In Jesus Name. Amen.`},
  {id:20,title:'The Walls of Jericho',narration:`Joshua faces impossible walls. The city of Jericho sat behind its walls like a fist. Thick stone walls, double walls, walls so wide that houses were built right into them. Joshua stood outside those walls and looked at them. Then God spoke. "March around the city once a day for six days. On the seventh day, march seven times. Have the priests blow a long loud blast, have all the people shout, and the walls will fall down." No storming of walls. No siege. Just obedience. Six days of silent marching. Day one: they marched in silence, the sound of the trumpets echoing off the stone walls. The people of Jericho watched from the top. Day two. Day three. Day four. Day five. Day six. Each day the same mysterious march. The great shout. On the seventh day, Joshua woke his army before the sun came up. Seven times they circled those unbroken walls. On the seventh circuit, Joshua raised his voice. "Now! Shout! God has given you this city!" The walls collapse. The people of Israel opened their mouths and roared. And the walls of Jericho, the thick double walls that no army had ever breached, collapsed. Flat. As if they had never been. Walls that seemed impossible. Joshua stood before the city of Jericho and looked up. The walls were enormous - thick enough to build houses inside them. The gates were shut tight. No one was going in, no one was coming out. In human terms there was no way through those walls. But God had promised them this land. And God had a plan that nobody would have thought of on their own. Priests with trumpets. God instructions were unusual. March around the city once a day for six days. The priests were to carry the ark and blow their trumpets. The soldiers were to walk in silence. No shouting. No war cries. Just walking. Just obedience. The people of Jericho must have watched from their walls and wondered what these people were doing. They had no idea what was coming. A shout that shook the earth. On the seventh day they marched around the city seven times. Then Joshua said: Shout! For the Lord has given you the city! And the whole host of Israel let out a sound that had never been heard before. The trumpets rang. The people shouted. And the walls - those enormous impossible walls - fell flat on the ground. All God needed was obedient faithful people willing to look foolish for seven days.`,prayer:`Dear God, help me to trust Your instructions even when I do not fully understand them. Help me to obey like Joshua did, knowing that Your ways are always perfect. In Jesus Name. Amen.`},
  {id:21,title:'Abraham and the Stars',narration:`God calls Abraham. Abraham was a man who lived comfortably with his large family in the city of Haran. He had everything he could want. Then one day, God spoke to him. "Leave your country," God said. "Leave your people and your father's household. Go to a land I will show you. And I will make you into a great nation." God did not show Abraham a map. He did not give him directions. He just said: go. The long journey. Abraham did not argue. He did not ask "but where exactly?" He packed up his tent, gathered his wife Sarah and his nephew Lot and all their servants and animals, and he left. Just like that. He was seventy-five years old, and he walked away from everything he knew, because God had asked him to. God shows the stars. Years passed, and Abraham still had no children. One night, God took Abraham outside his tent. "Look up at the sky," God said, "and count the stars - if indeed you can count them." Then God made a promise that seemed impossible: "That is how many descendants you will have." Abraham looked at the stars. He believed God. And that faith was credited to him as righteousness. Faith in the impossible. Abraham was old. Sarah was old. What God had promised seemed impossible. But Abraham kept trusting. He did not waver. He did not give up. He held on to God's promise like a lamp in the dark. And in time, God did exactly what He said He would do. Leaving everything behind. Abraham was seventy-five years old when God spoke to him and said - leave. Leave your country. Leave your people. Leave your father's household. Go to the land I will show you. Not here is a map. Not here is the plan. Just go and trust me with the details. Abraham packed his bags and left. That act of obedience changed the whole history of the world. A promise that seemed impossible. Abraham and Sarah were very old. Sarah had never been able to have children. When God said you will have a son, Sarah laughed. Not a happy laugh - the kind that says surely you cannot be serious. But the angel said: Is anything too hard for the Lord? That question was not just for Sarah. It was for every person who has ever thought - this is impossible. Nothing is too hard for God. The father of many nations. Isaac was born. Sarah held her baby and laughed again - but this time it was the best kind of laughter, the kind that comes when God does what He promised and you can hardly believe it is real. They named him Isaac, which means laughter. Every time they called his name they were reminded - God keeps His word. Always.`,prayer:`Dear God, help me to trust You like Abraham did, even when I cannot see the whole plan. Help me to believe Your promises even when they seem impossible. In Jesus Name. Amen.`},
  {id:22,title:'The Ten Plagues of Egypt',narration:`Moses stands before Pharaoh. Moses was an old man the first time he walked back into the palace he had grown up in. "Let my people go," he said to Pharaoh, the most powerful king in the world. Pharaoh crossed his arms. "No." So God sent a plague. The rivers turned to blood. Still Pharaoh said no. Frogs cover everything. God sent frogs. Millions of them. They were everywhere - in the beds, in the food, in the palace, hopping on the royal throne itself. Pharaoh begged Moses to pray them away, and when they were gone, he changed his mind again. He said no. Darkness covers the land. God sent locusts that ate every green thing. He sent boils and hail and thunder. Then He sent three days of complete darkness over all of Egypt. The Egyptians could not see each other. They could not leave their homes. But wherever the Israelites lived, there was light. Still Pharaoh said no. The people go free. Then came the last plague, the most terrible of all, and finally Pharaoh broke. "Go!" he cried at midnight. "Leave! Take everything and go!" And the people of Israel walked out of Egypt, free at last, after four hundred years. Moses walked at the front, his staff raised high, and behind him came a whole nation walking into a new life. Pharaoh says no. Moses and Aaron stood before the most powerful man in the world and said: Let my people go. Pharaoh looked at them and said: Who is the Lord, that I should obey Him? I do not know the Lord and I will not let Israel go. He had slaves to build his cities. He had gods of stone and gold. He was about to discover just how wrong he was. Plague after plague. God sent ten plagues upon Egypt - each one a direct challenge to one of Egypt gods. The Nile turned to blood. Frogs swarmed everywhere. Gnats, flies, disease on their livestock. Boils. Hail. Locusts. Darkness. Each time Moses told Pharaoh: Let my people go. Each time Pharaoh heart grew harder again after the plague stopped. The exodus begins. After the last plague Pharaoh said one word in the night: Go. The people of God walked out of Egypt after four hundred and thirty years. They left with gold and silver pressed upon them by the Egyptians. They left with their heads high. They left free. God had heard every cry, counted every year, and kept every promise.`,prayer:`Dear God, thank You that You are more powerful than anything in this world. Help me to trust that no problem is too hard for You. In Jesus Name. Amen.`},
  {id:23,title:'The Burning Bush',narration:`Moses in the desert. Moses had been a shepherd in the desert for forty years. After leaving Egypt, he had settled in the land of Midian, married, and spent his days walking these quiet hills with his father-in-law's flock. He was not expecting anything unusual. It was just another morning. The burning bush. Then he noticed something extraordinary. A thornbush ahead of him was on fire - bright orange flames leaping from every branch. But the bush was not burning up. Moses stared. He looked again. The fire kept burning but nothing was being consumed. "I must go closer," Moses thought, "and see this strange thing." God speaks from the fire. As Moses approached, God called from inside the fire. "Moses! Moses!" "Here I am," Moses answered. "Take off your sandals," God said, "for you are standing on holy ground." Moses pulled off his sandals immediately. "I am the God of Abraham, the God of Isaac, the God of Jacob," God said. Moses hid his face in awe. Moses receives his mission. "I have seen the suffering of my people in Egypt," God told Moses. "I have heard their crying. I am sending you to Pharaoh to bring my people out of Egypt." Moses was afraid. "Who am I to do this?" he asked. "I will be with you," God said simply. And that was enough. A man in the desert. Moses had not always been a shepherd. He had grown up in Pharaoh palace. He had seen the suffering of his people and tried to act in his own way. It went badly. He fled. For forty years he lived in the desert. He may have thought his best days were behind him. He was eighty years old. God was just getting started. Holy ground. The bush was burning but it was not burning up. Moses turned aside to look - and when he came closer, God called his name from the fire: Moses! Moses! And Moses said, Here I am. God said: Take off your sandals. The place where you are standing is holy ground. The place where God meets us becomes holy. A desert becomes a sanctuary when God is in it. Who am I to go?. Moses asked five questions. Who am I? What if they do not believe me? I am not a good speaker. Please send someone else. God answered every one. I will be with you. Take your staff. Your brother Aaron can speak for you. Moses had thought God needed a mighty hero. God was looking for a willing shepherd. Sometimes the person God chooses is the one who cannot imagine why God would choose them.`,prayer:`Dear God, help me to notice when You are speaking to me, even in ordinary moments. Help me to stop and listen like Moses did. In Jesus Name. Amen.`},
  {id:24,title:'Crossing the Red Sea',narration:`Trapped between army and sea. Three days after leaving Egypt, the Israelites found themselves trapped. The Red Sea stretched impossibly wide before them. Behind them, the thunder of thousands of Egyptian chariot wheels growing louder every minute. The people were terrified. "Were there no graves in Egypt?" they cried. "Why did you bring us here to die?" Moses turned to face them. "Do not be afraid," he said. "Stand firm. Watch what God will do today." The sea parts. Then Moses stretched out his hand over the sea. And God drove the sea back with a powerful east wind all that night, and the sea became dry land. The water was divided. Two walls of water stood on either side, and between them was a wide dry path. And Moses began to walk forward. Walking through on dry ground. All night the Israelites walked between the walls of the sea on dry ground. Children held their parents' hands. Grandparents walked. Babies were carried. And on either side, the sea stood still like a wall of glass as they walked through. Not one Israelite got their feet wet. The Egyptians are stopped. When all the Israelites had crossed, Moses stretched out his hand again. The sea rushed back. The Egyptian army, which had followed them into the path, was swept away. The Israelites stood on the far shore and looked back. They were free. Completely free. And they sang a song of praise to God that rang across the water. Pharaoh changes his mind. It did not take long for Pharaoh to regret letting his slaves go free. He called up his army - six hundred of his finest chariots, horsemen and soldiers - and set out after them. The Israelites looked back and saw the dust cloud of the Egyptian army coming. In front of them: the sea. Behind them: an army. They were trapped. Moses stretches out his hand. God said to Moses: Tell the Israelites to move forward. Stretch out your hand over the sea. He stretched out his staff - and a strong east wind began to blow. All night it blew. God had placed a pillar of cloud between the Israelites and the Egyptians protecting them all night. And in the morning, the sea was divided. A song on the other side. When every Israelite had crossed safely, Moses stretched out his hand again and the waters came back. The whole Egyptian army was swallowed by the sea. On the far shore the people of God stood safe on dry ground. Then Miriam picked up her tambourine. She began to sing: Sing to the Lord for He is highly exalted. And the whole nation sang with her.`,prayer:`Dear God, when I am trapped and cannot see any way forward, help me to remember that You can part seas. Nothing is impossible for You. In Jesus Name. Amen.`},
  {id:25,title:'Solomon Asks for Wisdom',narration:`The young king. Solomon had just been made king of Israel, one of the most powerful nations in the world. He was young, and the responsibility was enormous. One night, God appeared to Solomon in a dream. "Ask for whatever you want me to give you," God said. It was the most extraordinary offer anyone had ever received. Surrounded by advisors. Solomon thought about what he needed. He was surrounded by powerful men who had served his father for decades. He would need to make decisions that affected hundreds of thousands of people. He could ask for riches. He could ask for a long life. He could ask for the defeat of his enemies. Solomon asks for wisdom. Instead, Solomon asked for something else entirely. "Give me a wise and discerning heart," he prayed, "so that I can govern your people and tell the difference between right and wrong." God was deeply pleased. "Since you have asked for wisdom rather than long life or riches or the death of your enemies," God told him, "I will give you what you asked for. And I will also give you what you did not ask for - both riches and honour." The wisest king. Solomon became the wisest person who had ever lived. People came from every nation to hear his wisdom. He wrote three thousand proverbs and over a thousand songs. He built the Temple in Jerusalem, the most magnificent building in the world. And it all began because when God said "ask for anything," the young king asked not for things that benefit only himself, but for the ability to serve others well. A dream at night. Solomon had just become king of Israel. He was young and the responsibility was enormous. One night God appeared to him in a dream and said: Ask for whatever you want me to give you. What an offer. Solomon could have asked for anything. Wealth. Power. Long life. He had one chance to ask God for anything in the world. What would you ask for? A test of wisdom. Two women came to King Solomon with an impossible dispute. Both claimed the same baby was theirs. There were no witnesses. Solomon called for a sword and said he would cut the baby in half. One woman said yes. The second cried out: No! Give her the baby - do not kill him! Solomon knew immediately who the real mother was. Real love would rather give away what it loves than see it destroyed. The whole world comes to listen. News of Solomon's wisdom spread to every nation. The Queen of Sheba travelled from the ends of the earth just to test him with hard questions. When she heard his answers she said there was no breath left in her. The greatest thing Solomon ever had was not his gold or his palace. It was that he had asked God for the right thing. When you do not know what to ask for, ask for wisdom.`,prayer:`Dear God, give me wisdom like Solomon had - wisdom to know what is right, to treat people fairly, and to make good decisions. Help me to care more about others than about myself. In Jesus Name. Amen.`},
  {id:26,title:'Esther Saves Her People',narration:`Esther becomes queen. Esther was an orphan who had been raised by her older cousin Mordecai. She was Jewish, living far from home in the Persian Empire. When the king of Persia searched for a new queen, Esther was chosen. She became Queen Esther of the most powerful empire in the world, though she kept her Jewish identity secret, as Mordecai had advised. A terrible plot. But a powerful and proud official named Haman hated Esther's cousin Mordecai. When Mordecai refused to bow to him, Haman was furious. He convinced the king to sign a decree ordering the killing of all Jewish people in the entire empire. When Mordecai told Esther, she felt the ground move beneath her feet. She sent word back. What could she do? Esther\\. Mordecai sent back a message that cut to her heart. "Perhaps you were made queen for exactly this moment." Esther paused. "If I die, I die," she wrote back. "But first I will fast and pray for three days. Then I will go to the king, though it is against the law. And if I perish, I perish." She chose her people over her own safety. The people are saved. After three days of prayer and fasting, Esther walked through the great doors to the king. The king extended his golden sceptre. She was welcome. She asked for a banquet. At the banquet she exposed Haman's terrible plan. The king, furious, reversed the decree. Esther had saved her entire people - not with an army or a sword, but with courage, prayer, and the right words at the right moment. A queen placed by God. Esther had not chosen to be queen. She was a young Jewish woman living in Persia with her cousin Mordecai when the king chose her from all the women in the land. Mordecai had told her: do not tell anyone you are Jewish. She did not know yet why those words mattered. God was positioning her for a moment she could not yet see. For such a time as this. Mordecai sent Esther a message about Haman terrible plan to destroy all the Jewish people. He said: Do not think that because you are in the palace you alone will escape. But who knows - perhaps you were made queen for exactly such a time as this. Esther sat with those words. Then she made her choice. If I perish I perish. But first I will go to the king. Courage that saved a nation. Esther went to the king. She revealed the truth - she was Jewish, and Haman had plotted to kill her people. The king was furious. Haman was punished. A new decree went out. The Jewish people were saved. Every year since that day the Jewish people celebrate this story in a feast called Purim. A young woman who could have stayed silent chose courage - and an entire nation lived.`,prayer:`Dear God, help me to be as brave as Esther. Help me to trust that You have placed me where I am for a reason, and give me the courage to act when the moment comes. In Jesus Name. Amen.`},
  {id:27,title:'Gideon and the Fleece',narration:`Hiding in the winepress. The Midianites had oppressed Israel for seven years. Every harvest, they swept in and stole everything. So Gideon was secretly threshing wheat inside a winepress, hiding it from raiders. He was not a warrior. He was not brave. He was a farmer hiding food in a hole. Then an angel of God appeared and sat under the oak tree nearby. The angel calls him mighty warrior. "Mighty warrior," the angel said. Gideon looked around. There was nobody else there. "The Lord is with you," the angel continued. Gideon stared. "Pardon me, sir," he said, "but if God is with us, why has all this happened to us?" The angel did not argue. "Go in the strength you have," God told him. "Am I not sending you?" Gideon was not convinced. He laid out a fleece of wool on the ground and asked God for a sign. The fleece was wet with dew but the ground was dry. The next night he asked again, and the fleece was dry but the ground was wet. God patiently gave both signs. The army is reduced to 300. God gave Gideon an army of thirty-two thousand men. Then He said, "Too many. Send home anyone who is afraid." Twenty-two thousand left. "Still too many," God said. He had them drink from a stream and kept only the three hundred who lapped water like dogs. Three hundred against a hundred and thirty-five thousand enemies. Trumpets and torches. On God's instructions, each of the three hundred men carried a torch inside a clay jar in one hand and a trumpet in the other. At Gideon's signal, they surrounded the enemy camp at night, blew their trumpets, smashed their jars, and shouted "A sword for the Lord and for Gideon!" The enemy camp erupted in total confusion. They fled. The battle was won, not by swords, but by 300 torches and trumpets and the power of God. The smallest from the weakest. Gideon was threshing wheat in a wine press - hiding it from the Midianites who would steal any food they found. He was not a hero. When the angel appeared and said The Lord is with you mighty warrior, Gideon laughed bitterly. Mighty warrior? He was the least important member of the weakest family in the smallest tribe. But God does not look for impressive people. God looks for available people who will trust Him. Three hundred against thousands. God kept reducing Gideon army. Thirty-two thousand became ten thousand. Ten thousand became three hundred. Three hundred men against armies like a swarm of locusts. Gideon could have argued. Instead he trusted the God who said with the three hundred I will save you. The fewer people around, the more clearly everyone would see it was God who won. Torches trumpets and trust. At midnight Gideon gave the signal. Three hundred torches blazed in the darkness all at once. Three hundred clay jars shattered. Three hundred trumpets sounded. A sword for the Lord and for Gideon! The enemy camp erupted in panic and confusion. They ran. They turned on each other. The whole vast army was routed - by three hundred people with no weapons, just torches and trumpets and obedience to God.`,prayer:`Dear God, thank You that You do not need me to be the strongest or the bravest to use me. Help me to trust You even when I feel small and afraid. In Jesus Name. Amen.`},
  {id:28,title:'Shadrach, Meshach and Abednego',narration:`Standing alone in the crowd. King Nebuchadnezzar of Babylon built a massive golden statue ninety feet tall. He commanded everyone in his empire to bow down to it when the music played. Shadrach, Meshach and Abednego were Jewish officials serving in the royal court. When the music played and everyone around them fell to their knees, they remained standing. They would not bow to an idol. The king was furious. Face to face with the king. "Heat the furnace seven times hotter than usual," the king commanded, "and throw them in." The furnace was so hot that the soldiers who threw them in were killed by the heat. Shadrach, Meshach and Abednego fell into the fire. The king watched. His eyes went wide. His mouth fell open. A fourth figure in the flames. "Did we not throw three men into the fire?" the king asked his advisors. "Yes," they answered. "Then look!" the king said. "I see four men walking around freely in the fire, and the fourth looks like a son of the gods!" He stood up in shock. The three men were walking in the fire. Something holy was walking with them. Walking out untouched. The king called them to come out. The three young men walked out of the furnace. The officials crowded around. Their hair was not singed. Their robes were not scorched. There was not even the smell of fire on them. "Praise the God of Shadrach, Meshach and Abednego!" the king declared. "Who has sent his angel and rescued his servants who trusted in him!" Every knee must bow - except three. Nebuchadnezzar golden statue was ninety feet tall. When the music played every person in the empire was commanded to fall down and worship it. Every person did - except three. Shadrach Meshach and Abednego stood straight and still while everyone else was on the ground. Some people noticed. They reported it to the king immediately. Our God is able - but even if He does not. The king gave them one last chance. What god can save you from my hand? Their answer is one of the most courageous things ever said: Our God is able to save us from the burning fire. But even if He does not - we want you to know O king that we will never worship your gods or your golden statue. Not ever. They were faithful without knowing the outcome. That is what faith looks like. The whole empire hears. The king called them out of the fire. Not a hair singed. Not a thread of clothing burned. No smell of smoke at all. Nebuchadnezzar said in front of his whole empire: There is no other god who is able to save in this way. Three young men who refused to bow had shown an entire empire who the real God was.`,prayer:`Dear God, when I go through hard and painful things, help me to remember that You are walking right there with me in the fire. I am never alone. In Jesus Name. Amen.`},
  {id:29,title:'God Provides for Elijah',narration:`Ravens bring food. Elijah had just told King Ahab that there would be no rain in Israel until God said so. That made him extremely unpopular. God told Elijah to hide by a brook east of the Jordan River. "I have commanded ravens to bring you food there," God said. Every morning and every evening, ravens flew to Elijah and brought him bread and meat. He drank from the brook. God provided exactly enough. The widow gathering sticks. When the brook dried up, God sent Elijah to a town called Zarephath. "I have commanded a widow there to supply you with food," God said. Elijah arrived at the gate and saw a woman picking up sticks. "Please bring me a little water," he said. She went to get it. "And please bring me a small piece of bread." The last handful of flour. The woman stopped. "As surely as your God lives," she said, "I have only a handful of flour in a jar and a little olive oil in a jug. I am gathering sticks to cook one last meal for myself and my son. We will eat it, and then we will die." Elijah looked at her with compassion. "Don't be afraid," he said. "Go home and do as you have said. But first make a small loaf of bread for me. God says your flour and oil will not run out until the day it rains." Flour and oil never run out. The woman went home and did exactly as Elijah said. She made bread for him first. And from that day on, the flour in her jar was not used up and the oil in her jug did not run dry, just as God had promised through Elijah. Every day she reached in and found enough. Every single day. A prophet on the run. Just days after the great victory on Mount Carmel, Elijah was running for his life. Queen Jezebel had sent him a death threat. Elijah sat under a juniper tree in the desert and asked God to let him die. It is enough Lord, he said. I have had enough. He was exhausted and terrified and completely alone. And he fell asleep. An angel with warm bread. When Elijah woke up, there was a warm cake of bread baking on coals beside him, and a jar of water. He ate and drank and fell asleep again. The angel came a second time. Get up and eat, for the journey is too great for you. God did not lecture Elijah. God sent an angel to bake him bread and let him sleep. Sometimes what a tired person needs is not a sermon. It is food and rest and the knowledge that someone sees them. Carried by bread he did not make. Elijah got up and ate. And then he walked for forty days and forty nights on the strength of that one meal. The bread God gives is not ordinary bread. He went to Horeb, the mountain of God, and there God met him again. Not in the wind or the earthquake or the fire, but in a still small voice: Go back. There is still work to do. And you are not alone. God never lets His people finish alone.`,prayer:`Dear God, thank You that You always provide for those who trust You. Help me to trust You even when I cannot see where the next thing is coming from. In Jesus Name. Amen.`},
  {id:30,title:'Nehemiah Rebuilds the Wall',narration:`Nehemiah hears bad news. Nehemiah was the king's cup-bearer in the Persian Empire - a trusted and important position. Then a visitor came from Jerusalem with news. "The wall of Jerusalem is broken down," the man said. "Its gates have been burned with fire. The people there are in great trouble and disgrace." Nehemiah sat down and wept. He mourned for days. Then he fasted and prayed. The king gives permission. Nehemiah had never been sad in the king's presence before - it was dangerous to show sadness before a king. But the king noticed. "Why does your face look so sad?" he asked. Nehemiah silently prayed a lightning-fast prayer. Then he explained. The king listened. "What is it you want?" he asked. And Nehemiah asked to go back and rebuild Jerusalem. The king said yes. He even gave him letters and supplies. Building despite opposition. Nehemiah arrived in Jerusalem and inspected the walls at night. Then he gathered the people. "Come, let us rebuild the wall." The work began. But enemies mocked them. Then they threatened to attack. Nehemiah gave each worker a sword to hold while they worked. "Do not be afraid," he told them. "Remember the Lord, who is great and awesome, and fight for your families." They worked from dawn to dusk. Fifty-two days. The walls of Jerusalem were completely rebuilt in fifty-two days. When their enemies heard, they were afraid and lost their confidence, because they realised that this work had been done with the help of God. Nehemiah gathered the people around the wall and they celebrated with great joy. Jerusalem stood strong again. A cupbearer who wept. Nehemiah was the king of Persia personal cupbearer - one of the most trusted positions in the empire. Then news came from Jerusalem: the walls of the holy city were broken down and the gates burned. Nehemiah sat down and wept. He fasted. He prayed for days. He could not stop thinking about it. And then he made a request that would change everything. A night inspection. Nehemiah arrived in Jerusalem and said nothing to anyone for three days. Then at night, secretly, with just a few men and a donkey, he went out and inspected the broken walls by moonlight. He looked at every section. He made no announcements. He did not yet tell anyone what God had put in his heart. First he looked. First he understood the full size of the problem. Then he was ready to lead. Built in fifty-two days. When Nehemiah told the people his plan, something caught fire in them. Let us start building, they said. Each family took responsibility for the section of wall nearest their own home. They built with tools in one hand and weapons in the other. In fifty-two days the walls of Jerusalem were complete. And their enemies knew: this work was done with the help of their God.`,prayer:`Dear God, when I see something that needs fixing - in my family, at school, in my community - help me to pray and then act. Give me courage like Nehemiah. In Jesus Name. Amen.`},
