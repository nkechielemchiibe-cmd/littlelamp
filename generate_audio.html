  {id:31,title:'The Woman at the Well',narration:`A woman comes to the well. It was midday - the hottest part of the day - and no sensible person went to the well in the midday heat. Women usually came in groups in the cool of the morning. But this woman came alone, in the heat, when she knew no one else would be there. She had her reasons. Sitting at the well was a Jewish man. And Jewish men did not talk to Samaritan women. Jesus asks for water. "Will you give me a drink?" Jesus asked. The woman stopped. "You are a Jew and I am a Samaritan woman," she said. "How can you ask me for a drink?" She was right. Jews did not associate with Samaritans. Men did not talk to unknown women alone. And she had a reputation. Jesus looked at her. "If you knew who is asking you," He said gently, "you would have asked me and I would have given you living water." He knows everything. Their conversation went deep very quickly. Jesus knew things about her that she had never told anyone - the painful details of her life. She was amazed. "I see you are a prophet," she said. Then she asked her deepest question, about worship and about God. Jesus answered her honestly and fully. He talked to her as if she was the most important person in the world. Because to Him, she was. She tells the whole town. The woman left her water jar at the well and ran back to the town. "Come," she called to everyone she met, "come and see a man who told me everything I ever did! Could this be the Christ?" People poured out of the town and walked to the well. Because of the woman the whole town believed. She had gone to the well alone, in disgrace, in hiding. She went back into the middle of her town with news that changed everything. Coming alone at noon. In those days women came to the well in the cool of the morning, together. But this woman came alone at midday in the full heat of the sun. She did not want to meet the other women of the town. She had a complicated history and knew what they thought of her. She expected an empty well. Instead she found a Jewish man sitting there who she assumed would ignore her completely. Living water. Give me a drink, Jesus said. She was surprised He spoke to her at all. Then He said something strange: If you knew who was asking you, you would ask Him, and He would give you living water. She pushed back with questions. He answered everything. And then He told her everything about her life that she had never told anyone. This was no ordinary man. She ran and told the whole town. She left her water jar at the well - forgot it completely - and ran back to the town. Come and see a man who told me everything I ever did! she called out. Could this be the Messiah? The whole town came out to find Him. The woman everyone had avoided became the first evangelist of her town. She had come to get water. She left carrying something far more valuable.`,prayer:`Dear Jesus, thank You for seeing me completely - everything about me - and loving me anyway. Help me to see the people that others overlook, the way You saw this woman. In Jesus Name. Amen.`},
  {id:32,title:'Lazarus Comes Out',narration:`Jesus hears the news. Lazarus was one of Jesus's closest friends, along with his sisters Mary and Martha. When Lazarus became seriously ill, his sisters sent urgent word to Jesus. "Lord, the one you love is sick." Jesus did not rush. Instead He waited two more days. "This sickness will not end in death," He told His disciples. "It is for God's glory." Then He set out for Bethany. By the time He arrived, Lazarus had been in the tomb for four days. Martha runs to meet Jesus. Martha heard that Jesus was coming and ran to meet him. "Lord," she said, "if you had been here, my brother would not have died. But I know that even now God will give you whatever you ask." Jesus looked at her. "I am the resurrection and the life," He said. "Whoever believes in me, even though they die, will live." Martha looked into His eyes. "I believe," she said. Jesus weeps. When Jesus saw Mary weeping and all the mourners weeping with her, the Scripture says something remarkable: Jesus wept. Tears ran down His face. "See how much he loved him," the people said. God in human form, standing outside a tomb, crying for his friend. He was not performing or pretending. His heart was broken. Come out. "Take away the stone," Jesus said. They rolled it away. Jesus prayed aloud, thanking His Father. Then He called in a loud voice: "Lazarus! Come out!" And Lazarus came out - still wrapped in his burial cloths, alive, walking out of the darkness into the light. "Unwrap him," Jesus said calmly, "and let him go." Four days in the tomb. And now standing alive in the afternoon light. Jesus loved this family. Of all the homes Jesus visited in His travels, there was one He loved to come back to. Mary, Martha and Lazarus in Bethany were among His closest friends. When word reached Jesus that Lazarus was sick, the message from the sisters was not just information. Lord, the one you love is sick. They were counting on His love. And Jesus stayed where He was for two more days. He had a plan bigger than a healing. The resurrection and the life. When Jesus finally arrived, Lazarus had been in the tomb four days. Martha ran to meet Him. Lord, if you had been here my brother would not have died. Jesus looked at her and said: I am the resurrection and the life. Whoever believes in me will live even though they die. Do you believe this? And Martha, through her tears, said yes. Sometimes God asks us to believe before we can see. Many believed that day. Jesus told them to take away the stone. He looked up and prayed. Then He called out in a loud voice: Lazarus, come out! And he did. Many people who saw it believed in Jesus that day. Death had listened to its Creator and given back what it had taken. The grave could not hold what God had put His voice to.`,prayer:`Dear Jesus, thank You that You cry with us when we are sad, and that You have power over everything that feels final and hopeless. Nothing is too much for You. In Jesus Name. Amen.`},
  {id:33,title:'The Sermon on the Mount',narration:`Jesus on the hillside. Jesus sat on a hillside one day and looked at the crowd that had gathered. He began to teach. What came out of His mouth was unlike anything anyone had ever heard. "Blessed are the poor in spirit," He said, "for theirs is the kingdom of heaven. Blessed are the gentle. Blessed are those who hunger and thirst for righteousness. Blessed are the merciful. Blessed are the pure in heart. Blessed are the peacemakers." You are the light of the world. "You are the light of the world," Jesus continued. "A city on a hill cannot be hidden. Nobody lights a lamp and then puts it under a bowl. They put it on a stand where it gives light to everyone in the house. In the same way, let your light shine before others, so that they may see your good deeds and glorify your Father in heaven." Do not worry. "Look at the birds of the air," Jesus said. "They do not sow or reap or store food. Yet your heavenly Father feeds them. Are you not much more valuable than they are? Consider how the wildflowers grow. They do not labour or spin. Yet even Solomon in all his splendour was not dressed as beautifully as one of these. So do not worry about your life." The crowd went very quiet. The golden rule. "So in everything," Jesus said, "do to others what you would have them do to you. This is the sum of the Law and the Prophets." He finished teaching. The crowd sat in silence for a moment. Then they were amazed. He taught as one who had authority - not like the teachers of the law. They had never heard anything like it. They had never heard anyone speak with such complete authority about how to live. Blessed are the ones the world overlooks. Jesus went up on the hillside, sat down, and began to teach. The first things He said turned everything upside down. Blessed are the poor in spirit. Blessed are those who mourn. Blessed are the gentle. These were not the people the world called blessed. Jesus pointed at the people no one was pointing at and said - these are the ones God smiles upon. The Kingdom belongs to them. Salt and light. You are the salt of the earth, Jesus said. Salt preserves. Salt gives flavour. A little of it changes everything it touches. And you are the light of the world. A city on a hill cannot be hidden. He was not talking to kings or priests. He was talking to fishermen and farmers and ordinary people. He was telling them that they mattered - that what they did with their lives would affect the world. Build on the rock. Jesus finished the sermon with a picture. Two men, two houses. One built on rock, one on sand. Same storm hits both. One stands. One falls with a great crash. Everyone who hears these words of mine and does them is like the wise man who built on the rock. The crowd had never heard teaching like this. He was not quoting other rabbis. He was speaking with His own authority.`,prayer:`Dear Jesus, help me to live the way You taught on that hillside. Help me to be gentle, merciful, pure in heart, and to treat others the way I want to be treated. In Jesus Name. Amen.`},
  {id:34,title:'The Ten Lepers',narration:`Kept at a distance. Leprosy was a skin disease that changed everything. It isolated you from your family, your village, your whole life. Lepers had to call out "unclean, unclean!" wherever they went so people would keep their distance. Ten lepers had banded together outside a village, surviving together in the only company they could have - each other. When they saw Jesus in the distance, they cried out with everything they had. Jesus sends them to the priests. "Jesus, Master, have pity on us!" they cried. Jesus looked at them. "Go," he said, "show yourselves to the priests." That was all. He did not touch them. He did not say "be healed." He just told them to go to the priests, which was what healed people were supposed to do to be declared clean. And they went. As they went, something happened. One turns back. All ten were healed as they walked. All ten saw their skin restored, their fingers whole, their faces cleared. Nine of them kept going toward the priests, toward the town, toward their families. One of them stopped. He looked at his hands. He turned around. He ran back toward Jesus, shouting praises to God, and when he reached him he threw himself at Jesus's feet, face down on the road, overcome with gratitude. He was a Samaritan - a foreigner, an outcast even among outcasts. Where are the other nine?. "Were not all ten cleansed?" Jesus asked. "Where are the other nine? Has no one returned to give praise to God except this foreigner?" He looked at the man at his feet. "Rise and go," Jesus said, "your faith has made you well." The man stood up - clean, healed, and full of a joy that the other nine, still healed, had not stopped to find. Living between worlds. Ten people with leprosy lived together on the edge of the village. The law said they had to. Whenever anyone came near they had to call out Unclean! to warn them away. They could not go home. They could not hug their children. They lived between towns, belonging nowhere. Then one day they heard that Jesus was passing through their region. Standing at a distance and calling out. They stood at a distance - as the law required. But they did not stay silent. They raised their voices as loud as they could: Jesus! Master! Have mercy on us! Jesus heard. He looked at them. He said: Go show yourselves to the priests. In the law only priests could declare a leper clean. Jesus was telling them to go as if they were already healed. They had to start walking before they could see the miracle. One turned back. As they walked all ten were healed. Nine kept walking. One stopped. He turned around. He came back to Jesus shouting praises to God and fell at His feet giving thanks. And he was a Samaritan - a foreigner. Jesus looked around. Were not ten cleansed? Where are the other nine? Gratitude is the right response to every gift from God. This one man remembered.`,prayer:`Dear Jesus, thank You for every good thing in my life. Help me to be like the one who came back - to notice Your gifts and return to say thank You with a full heart. In Jesus Name. Amen.`},
  {id:35,title:'Blind Bartimaeus',narration:`Bartimaeus begs by the road. Bartimaeus sat by the roadside every day, begging. He could not see. He had not seen for years. All he knew was sound and texture and memory. Then one day he heard the noise of a larger crowd than usual passing by. "What is happening?" he asked. "Jesus of Nazareth is passing through," someone told him. Bartimaeus\\'s heart leapt. Told to be quiet - shouts louder. "Jesus, Son of David, have mercy on me!" he cried out. People around him told him to be quiet. He was embarrassing himself. He was making a scene. But Bartimaeus shouted even louder. "Son of David, have mercy on me!" He had been sitting in darkness for years. He was not going to let Jesus walk past because someone told him to be polite. Jesus stops. Jesus stopped. "Call him," He said. The mood of the crowd shifted instantly. "Cheer up! On your feet! He's calling you!" Bartimaeus threw off his cloak - his most valuable possession, his warmth, his shelter - and jumped to his feet. He left it in the dust. He was going to Jesus and he was not planning to go back. What do you want me to do?. "What do you want me to do for you?" Jesus asked. It was the same question He asked the rich young ruler, but the answer would be different. "Rabbi," Bartimaeus said simply, "I want to see." "Go," Jesus said. "Your faith has healed you." Immediately Bartimaeus received his sight and followed Jesus along the road. Sitting in the dark listening for life. Bartimaeus had been blind since he could remember. Every day he sat by the road with his cloak on the ground and he listened. He had learned everything he knew about the world from sound. One day he heard a sound he had never heard before - a large excited crowd moving through town. He grabbed someone arm. What is happening? Jesus of Nazareth is passing by, they said. He shouted all the louder. The moment he heard the name, he knew. Jesus! Son of David! Have mercy on me! The people nearby told him to be quiet. He was causing a scene. Bartimaeus ignored every single one of them and shouted all the louder: Son of David! Have mercy on me! Some people are so desperate for Jesus that they cannot be shushed. They have nothing to lose and everything to gain. Jesus heard. Jesus stopped. The first face he ever saw clearly. Jesus said: Call him. Those who had told him to be quiet now said: Cheer up! He is calling for you! Bartimaeus threw off his cloak - his only possession - and went to Jesus. Jesus asked: What do you want me to do for you? Rabbi, he said, I want to see. And immediately he saw. And the first face he ever saw clearly was the face of Jesus.`,prayer:`Dear Jesus, help me to call out to You with the same boldness and persistence that Bartimaeus had. Help me to never let anyone or anything stop me from reaching out to You. In Jesus Name. Amen.`},
  {id:36,title:'The Last Supper',narration:`Gathered in the upper room. Jesus knew what was coming. He had known for a long time. On that last evening, He gathered His twelve disciples for a Passover meal in an upper room in Jerusalem. He looked around the table at their familiar faces - Peter the fisherman, John, Thomas, all of them - and He wanted them to understand something important before everything changed. Jesus washes their feet. Jesus got up from the table, took off his outer clothing, wrapped a towel around his waist, poured water into a basin, and began washing his disciples' feet. When he got to Peter, Peter pulled back. "You shall never wash my feet!" Jesus looked at him. "Unless I wash you, you have no part with me." Peter said: "Then wash my hands and head as well." After washing all their feet, Jesus put his robe back on. "Do you understand what I have done? You call me Teacher and Lord - and rightly so. Now I have washed your feet. You should do the same for each other." The bread and the wine. Jesus took bread, gave thanks, broke it, and gave it to them. "This is my body," He said, "given for you. Do this in remembrance of me." Then He took the cup of wine and gave thanks. "This cup is the new covenant in my blood, which is poured out for you. Do this, whenever you drink it, in remembrance of me." The disciples were quiet, not fully understanding yet. A hymn and the garden. When they had sung a hymn, they left together for the Garden of Gethsemane on the Mount of Olives. Jesus walked through the moonlit streets knowing what lay ahead. But He went toward it, not away from it. His disciples were with Him. And before the darkness came, He had given them bread and wine and water and a command: love each other as I have loved you. A room prepared just right. Jesus sent two disciples ahead with precise instructions. You will meet a man carrying a water jar. Follow him. He will show you a large upper room, furnished and ready. Prepare the meal there. They went. They found the man. They found the room exactly as Jesus had described. God had been preparing this room and this moment long before they arrived. This is my body this is my blood. Jesus took the bread, gave thanks, and broke it. This is my body, given for you. Do this in remembrance of me. Then He took the cup. This cup is the new covenant in my blood. He was telling them what was about to happen - in the language of bread and wine. Every church in the world that shares communion is still keeping His promise. One of you will betray me. At the table Jesus said something that fell like a stone into the water: One of you will betray me. They were crushed. One by one they began to ask: Surely not I? Jesus knew. He had chosen to go through with it anyway. The love that went to the cross had a full view of every betrayal - and it went anyway.`,prayer:`Dear Jesus, thank You for giving us bread and wine and feet-washing to remind us of You. Help me to love others the way You loved your disciples - by serving them. In Jesus Name. Amen.`},
  {id:37,title:'The Cross',narration:`The road to Golgotha. After the trial, the soldiers put a heavy wooden cross on Jesus's shoulders and led him through the streets of Jerusalem toward a hill called Golgotha, which means "the place of the skull." Women in the crowd wept for him. Jesus turned to them. "Daughters of Jerusalem, do not weep for me. Weep for yourselves and for your children." He kept walking. He fell more than once under the weight of the cross. A man named Simon was pulled from the crowd to carry it with him. Jesus is crucified. They crucified Him at nine in the morning. Above His head they placed a sign: THIS IS JESUS, THE KING OF THE JEWS. Two criminals were crucified alongside Him, one on either side. Those passing by hurled insults. One of the criminals joined them. "Are you not the Messiah? Save yourself and us!" But the other criminal rebuked him. "Don't you fear God?" he said. "We are getting what we deserve. But this man has done nothing wrong." Then he said: "Jesus, remember me when you come into your kingdom." And Jesus replied: "Today you will be with me in paradise." Darkness covers the land. From noon until three in the afternoon, darkness covered the whole land. The crowds who had been mocking went quiet. Some started to leave. Something was happening that no one could explain. Then at three o'clock, Jesus cried out in a loud voice, and breathing His last, He said: "Father, into your hands I commit my spirit." The curtain tears. At that moment the curtain of the Temple was torn in two from top to bottom. The earth shook. The rocks split. When the centurion standing opposite the cross saw all this, he said: "Surely this was a righteous man." And he was right. Jesus had died. But the story was not over. The curtain that separated God from people was torn in two - forever. The way was now open. For everyone. The garden of Gethsemane. Before the cross came the garden. Jesus took His disciples to a place called Gethsemane and asked them to watch and pray. Then He went further alone and fell with His face to the ground. Father, He prayed, if it is possible let this cup pass from me. Yet not my will but yours. Three times He prayed the same prayer. The disciples fell asleep. Jesus faced the hardest night in history alone and chose the Father will. A crown of thorns. They mocked Him. They put a purple robe on Him and pressed a crown of thorns onto His head and said, Hail, King of the Jews! They did not know they were telling the truth. He did not fight back. He did not call down the angels He could have called. He endured every moment of it, for us. Isaiah had written about it hundreds of years before: By His wounds we are healed. It is finished. For six hours He hung on the cross. The sky turned dark for three of those hours in the middle of the afternoon. Then with a loud voice, Jesus cried out: It is finished! And He gave up His spirit. The curtain in the Temple tore from top to bottom. Not from bottom to top as if a man had done it. From top to bottom. God reached down and tore it Himself. The way to His presence was open. It has never been closed again.`,prayer:`Dear Jesus, thank You for what You did on the cross for me. Help me to understand that Your love for me is so great that You chose to go through that to bring me home. In Jesus Name. Amen.`},
  {id:38,title:'Pentecost',narration:`Waiting in Jerusalem. After Jesus ascended to heaven, the disciples went back to Jerusalem and waited. Jesus had told them to wait for a gift - the gift of the Holy Spirit, who would come and give them power to tell the whole world about Him. For ten days they waited, praying together in the upper room. One hundred and twenty of them. Then the day of Pentecost came. Wind and fire. Suddenly a sound like a violent rushing wind came from heaven and filled the whole house where they were sitting. Then what looked like individual tongues of fire appeared and rested on each one of them. They were all filled with the Holy Spirit and began to speak in languages they had never learned. A crowd was gathering outside, people from every nation in the world who were in Jerusalem for the festival. Peter preaches. The crowd outside was confused. People could hear the disciples speaking in their own native languages. "What does this mean?" some asked. Peter stood up and addressed the crowd. He was not afraid. This was the same Peter who had three times denied knowing Jesus. Now he stood before thousands and proclaimed: "Jesus of Nazareth was a man accredited by God by miracles and wonders. You killed him. But God raised him from the dead. And all of this is what God promised through the prophets." Three thousand are baptised. When the crowd heard Peter's words, they were cut to the heart. "What should we do?" they cried out. "Repent and be baptised," Peter told them, "every one of you, in the name of Jesus Christ. You will receive the gift of the Holy Spirit." That day about three thousand people were baptised. The church had been born. The disciples who had been hiding in a room were now changing the world. Waiting and praying together. After Jesus ascended to heaven He told His disciples to wait in Jerusalem. One hundred and twenty of them gathered in an upper room. They prayed together. They were not arguing. They were not making plans. They were doing the only thing Jesus had told them to do: wait and pray. For ten days they prayed. And on the tenth day something came that changed everything. Every language under heaven. Jerusalem was full of Jewish pilgrims from every nation for the festival of Pentecost. When the disciples began speaking in the power of the Spirit, these visitors heard something astonishing - they each heard the wonderful works of God spoken in their own native language. Crowds gathered. What does this mean? they asked. Peter stood up to explain. The church is born. Peter preached about Jesus - His life, His death, His resurrection. The crowd was cut to the heart. What shall we do? they cried. Repent and be baptised, Peter said. That day three thousand people believed and were baptised. The church that had been a hundred and twenty people in a room in the morning was three thousand one hundred and twenty by the afternoon. The Holy Spirit had done in one day what no human plan could have done in a lifetime.`,prayer:`Dear God, thank You for sending Your Holy Spirit to live inside Your people. Help me to be brave and bold like Peter, filled with the same power that raised Jesus from the dead. In Jesus Name. Amen.`},
  {id:39,title:'The Paralysed Man Through the Roof',narration:`The crowded house. Jesus had come back to Capernaum, and word spread quickly. So many people gathered to hear him that there was no room left, not even outside the door. Jesus was teaching inside the packed house. Outside, four men had arrived carrying their friend on a mat. Their friend could not walk. He had probably never walked. They had heard that Jesus could heal people. They were determined to get their friend to Him. Climbing to the roof. They could not get through the crowd. So they climbed up on the roof. They dug through the clay and reeds. They made a hole big enough. Then they carefully lowered their friend down through the hole on his mat, using ropes, right into the middle of the room in front of Jesus. Dust and clay fell on the people below. Everyone looked up, then down. Jesus forgives and heals. Jesus saw the man lying on the mat. He looked up at the hole in the roof, and then He saw the faith of the four friends. "Son," Jesus said to the man, "your sins are forgiven." Some teachers of the law sitting in the crowd were outraged. Only God could forgive sins. But Jesus looked at them. "Which is easier," He said, "to say 'your sins are forgiven,' or to say 'get up and walk'? So that you know I have authority to forgive sins-" He turned back to the man. "Get up. Take your mat and go home." He walks. The man stood up, picked up his mat, and walked out in front of everyone. The crowd fell silent, and then erupted. "We have never seen anything like this!" they said. The four friends looked down through the hole they had made in the roof. Their friend was walking. He was walking home. They had refused to let anything stop them from getting their friend to Jesus. And Jesus had not just healed his legs. He had healed everything. Four friends who would not give up. The paralysed man could not get to Jesus. But he had four friends who could. They had carried him before. They knew the weight of him. They looked at the crowd blocking the door and did not give up. There must be a way, they said. They looked up at the roof. They looked at each other. They nodded. Their friend deserved their best effort. Faith from above. They dug through the roof. Debris fell on the people below. They tied ropes to the corners of the mat and slowly, carefully lowered their friend down through the hole in the ceiling. Right in front of Jesus. The crowd stared upward in disbelief. Then they looked at Jesus to see what He would do. What He did first surprised everyone. He looked at the man face and said: Friend, your sins are forgiven. He walked home carrying his mat. Pick up your mat and go home, Jesus said. The man stood up immediately. He picked up the mat that had carried him and he walked - for the first time. The crowd fell back to let him through. They had come expecting to see a teacher. They had seen something far greater. We have never seen anything like this! And four friends with a mat and a plan had brought their friend to the one person who could help him.`,prayer:`Dear Jesus, thank You for friends who help us get to You. Help me to be that kind of friend to others - someone who helps carry people toward You, not away. In Jesus Name. Amen.`},
  {id:40,title:'Jesus Raises Jairus\\',narration:`Jairus falls at Jesus\\. Jairus was one of the leaders of the synagogue - a respected and important man. But now he forgot about his reputation. He pushed through the crowd, fell at Jesus's feet, and pleaded with all his heart. "My little daughter is dying," he said. "Please come and put your hands on her so that she will be healed and live." Jesus went with him immediately. A messenger arrives. They were still on the way when someone came from Jairus's house. "Your daughter is dead," the man said. "Why bother the teacher anymore?" The words hit Jairus like a wall. But Jesus heard what they said and turned to Jairus immediately. "Don't be afraid," Jesus said. "Just believe." They kept walking. Inside the house of mourning. When they arrived at Jairus's house, there was a commotion - people weeping loudly. "Why all this noise?" Jesus asked. "The child is not dead, only asleep." They laughed at him. Jesus put them all out of the house. Only the parents and three disciples came inside with him. Talitha, koum. Jesus took the girl's hand. He said to her: "Talitha, koum!" which means: "Little girl, I say to you, arise." Immediately the girl stood up and began to walk around. She was twelve years old. Her parents were overwhelmed. They could not speak. Jesus told them not to tell anyone, and then very practically said: "Give her something to eat." The miracle had been done quietly, with nobody watching. Just her parents, and Jesus, and a little girl who got up. A father who knelt in the street. Jairus was an important man - a ruler of the synagogue. Important men did not usually kneel in the street. But Jairus had a twelve-year-old daughter who was dying. He fell at Jesus' feet in front of everyone. My little daughter is dying. Please come and put your hands on her so she will be healed. Jesus went with him immediately. Do not fear only believe. On the way someone pushed through the crowd. Your daughter is dead. Do not bother the teacher any more. Those words must have hit Jairus like a physical blow. But Jesus turned immediately to him: Do not fear. Only believe. Four words. Everything in those four words. Jairus kept walking with Jesus. Little girl get up. Jesus arrived at the house. Mourners were already wailing. She is not dead, Jesus said. She is sleeping. They laughed at Him. He put them all outside, went to the girl, took her hand and said: Talitha, koum - Little girl, I say to you, get up. She stood up immediately and walked around. Then Jesus told them to give her something to eat. Even in the middle of a miracle, He thought of the practical thing.`,prayer:`Dear Jesus, when it seems too late and too hopeless, help me to hear Your voice saying "don't be afraid, just believe." Help me to trust You even at the worst moments. In Jesus Name. Amen.`},
  {id:41,title:'Elijah and the Still Small Voice',narration:`Elijah under the juniper tree. Right after his greatest victory, Elijah ran away. Queen Jezebel had threatened his life, and Elijah was terrified. He ran into the desert, sat down under a small tree, and prayed to die. "It is enough, Lord," he said. "Take my life. I am not better than my ancestors." Then he lay down and fell asleep. He was exhausted, afraid, and completely alone. An angel brings food. Then an angel touched him. "Get up and eat," the angel said. Elijah opened his eyes. Right there beside his head was freshly baked bread and a jar of cool water. He ate. He drank. He lay back down. The angel came again and touched him a second time. "Get up and eat," the angel said, "for the journey is too much for you." Elijah got up, ate and drank, and on the strength of that food he travelled for forty days. The wind, earthquake, and fire. Elijah came to Mount Horeb and spent the night in a cave. In the morning God asked: "What are you doing here, Elijah?" God told him to go outside and stand on the mountain. A great and powerful wind tore the mountains apart. Then an earthquake. Then fire. But God was not in the wind, not in the earthquake, not in the fire. The still small voice. After the fire came a gentle whisper. A still small voice. Elijah pulled his cloak over his face and went and stood at the mouth of the cave. The voice asked: "What are you doing here, Elijah?" God listened to Elijah's fear and despair. Then He gave him a new assignment. "Go back the way you came." Elijah was not finished. God had work for him still to do. And God had come to him not in spectacle, but in a whisper. Running from Jezebel. After the great victory on Mount Carmel, Elijah received a death threat from Queen Jezebel. The man who had faced four hundred and fifty prophets of Baal alone was now running from one angry queen. Fear can do that - it does not have to be logical. Elijah ran a full day journey into the desert and sat under a juniper tree. I have had enough Lord, he said. And he fell asleep. Wind earthquake fire then silence. God told Elijah to stand on the mountain. A great wind came that split rocks. But God was not in the wind. Then an earthquake. But God was not in the earthquake. Then fire. But God was not in the fire. And after the fire - a still small voice. A gentle whisper. Elijah pulled his cloak over his face. Sometimes God speaks loudest in the smallest voice. You are not alone. God first words were a question: What are you doing here Elijah? Elijah poured out his heart. God gave him three things: a task, a companion in Elisha, and a truth: I have seven thousand in Israel who have not bowed to Baal. You are not the only one. You are not alone. You are not finished. Get up. There is still work to do. And Elijah got up.`,prayer:`Dear God, in the noise and business of my life, help me to be still enough to hear Your gentle whisper. Thank You that You come to us even in our darkest moments. In Jesus Name. Amen.`},
  {id:42,title:'Stephen, the First Martyr',narration:`Stephen full of grace and power. Stephen was one of seven men chosen to help the apostles serve the early church. The Scripture says he was full of faith and of the Holy Spirit. He was also full of grace and power, doing great wonders and signs among the people. When people argued with him, they found they could not win the arguments - because the Spirit gave him wisdom they could not overcome. Arrested and brought to trial. His opponents could not defeat him in argument, so they had him arrested. They brought him before the Sanhedrin - the highest religious court in Israel. As Stephen stood there while the council stared at him, something remarkable happened. All the members of the council looked at Stephen's face and they all saw the same thing. His face shines like an angel. Stephen's face was like the face of an angel. Then he gave his defence, a sweeping account of all of Israel's history from Abraham to Jesus, showing how God had always been faithful and how they had always resisted Him. The council was furious. Seeing heaven open. "Look!" Stephen said, his voice full of wonder. "I see heaven open and the Son of Man standing at the right hand of God." The council covered their ears and rushed at him. They dragged him out of the city and stoned him. Stephen prayed: "Lord Jesus, receive my spirit." He knelt down. "Lord, do not hold this sin against them." And then he died. Watching everything and approving was a young man named Saul. A man full of the Holy Spirit. Stephen was chosen to serve the widows and the poor in the early church. He was full of faith and the Holy Spirit. But Stephen was also full of grace and power and he performed great signs among the people. He was not trying to be famous. He was trying to serve. But the more faithful he was the more visible he became. And some decided they needed to stop him. His face shone like an angel. They brought Stephen before the Sanhedrin - the highest religious court. Witnesses told lies about what he had said. The high priest asked if the charges were true. Stephen did not defend himself. He preached the whole history of Israel from Abraham to Solomon showing how at every step God's people had resisted God's messengers. And his face shone like an angel face. The first to follow Jesus all the way. Stephen looked up to heaven and saw the glory of God and Jesus standing at the right hand of God. Look! he cried. I see heaven open! As the stones fell, Stephen prayed: Lord Jesus, receive my spirit. Then: Lord do not hold this sin against them. In his last moments, he sounded exactly like Jesus. Among the crowd watching approvingly was a young man named Saul. He would never forget this day.`,prayer:`Dear God, help me to have faith as real as Stephen's - faith that looks up even in the worst moments and sees Jesus. Help me to forgive the way He taught us to forgive. In Jesus Name. Amen.`},
  {id:43,title:'Isaiah Sees the Lord',narration:`The Lord on his throne. The year King Uzziah died, the prophet Isaiah had a vision. He saw the Lord seated on a high and exalted throne, and the train of His robe filled the temple. Above the throne flew seraphim, each with six wings - two covering their faces, two covering their feet, two for flying. And they were calling to each other: "Holy, holy, holy is the Lord Almighty. The whole earth is full of His glory!" The sound shook the foundations. The room filled with smoke. Isaiah is undone. "Woe to me!" cried Isaiah. "I am ruined. I am a man of unclean lips, and I live among a people of unclean lips, and my eyes have seen the King, the Lord Almighty." Being in the presence of perfect holiness showed Isaiah everything about himself that was not holy. He was overwhelmed. A coal touches his lips. Then one of the seraphim flew toward Isaiah holding a live coal it had taken with tongs from the altar. He touched Isaiah's lips with it. "See, this has touched your lips," the seraph said. "Your guilt is taken away and your sin is forgiven." The moment it touched him, the guilt was gone. The unworthiness was answered by grace. Isaiah was clean. Here am I, send me. Then Isaiah heard the voice of the Lord: "Whom shall I send? And who will go for us?" Isaiah had been terrified, broken, and forgiven. Now there was only one answer possible. "Here am I," he said. "Send me." He had seen the holiness of God, experienced the grace of God, and now volunteered for the work of God. That is the order it always goes. A holy and overwhelming sight. In the year that King Uzziah died, Isaiah saw the Lord. Seated on a throne, high and lifted up. His robe filled the entire temple. Above Him were burning seraphim - heavenly beings with six wings each. With two wings they covered their faces because even they could not look fully at God holiness. And they called to each other: Holy, holy, holy is the Lord Almighty. The whole earth is full of His glory. A coal from the altar. Isaiah cried out: Woe is me! I am a man of unclean lips and my eyes have seen the King, the Lord Almighty! He was overwhelmed by his own unworthiness in the presence of perfect holiness. But one of the seraphim flew to him with a glowing coal from the altar and touched his lips. Your guilt is taken away. Your sin is atoned for. God did not disqualify Isaiah. God cleansed him and sent him. Here am I send me. Then Isaiah heard the voice of the Lord saying: Whom shall I send? And who will go for us? It was not a command. It was a question. God was asking for a volunteer. And Isaiah, who moments before had declared himself ruined, said: Here am I. Send me. When God cleanses us He does not send us home to recover. He sends us out with purpose.`,prayer:`Dear God, let me see Your holiness more clearly. And let me understand more deeply the grace that covers my unworthiness. Then let me say like Isaiah: here am I. Send me. In Jesus Name. Amen.`},
  {id:44,title:'Doubting Thomas',narration:`Thomas refuses to believe. Thomas was one of Jesus's twelve disciples. He was not there when the risen Jesus appeared to the others, and when they told him what they had seen, he refused to believe. "Unless I see the nail marks in his hands," Thomas said firmly, "and put my finger where the nails were, and put my hand into his side, I will not believe." He was honest about his doubt. A week passed. Jesus appears for Thomas. A week later, the disciples were together again. This time Thomas was with them. The doors were locked. Jesus came and stood among them. He looked directly at Thomas. "Put your finger here," Jesus said. "See my hands. Reach out your hand and put it into my side. Stop doubting and believe." Jesus had come back specifically for Thomas. He had not given up on him because he doubted. My Lord and my God. Thomas fell to his knees. He did not need to touch the wounds. He did not need any more proof. "My Lord and my God!" he said. This is the clearest statement of who Jesus is in all of John's Gospel - spoken by the greatest doubter in the room. Jesus looked at him gently. "Because you have seen me, you have believed. Blessed are those who have not seen and yet have believed." Thomas the missionary. Thomas went on to carry the message of Jesus further than almost any other disciple. Tradition tells us he travelled all the way to India, where churches bearing his name still exist today. The man who would not believe without seeing became one of the boldest ambassadors of faith in history. Jesus had not given up on his doubt. He had answered it. The disciples behind locked doors. After the resurrection the disciples were hiding behind locked doors. They had heard reports from Mary Magdalene that the tomb was empty. Thomas was not with them the first time Jesus appeared. When the others told him We have seen the Lord, he crossed his arms and said something very honest: Unless I see the nail marks in his hands and put my finger where the nails were - I will not believe. Jesus comes back for Thomas. A week later Thomas was there. The doors were locked again. Jesus came and stood among them. Peace be with you, He said. Then He turned to Thomas. He had heard every word Thomas said. He knew exactly what Thomas needed. Put your finger here. See my hands. Put your hand into my side. Stop doubting and believe. Jesus came back for the one who doubted. He did not leave Thomas alone to figure it out. Blessed are those who have not seen. Thomas said: My Lord and my God. Eight words. The greatest confession of faith in all the Gospels, from the one who had doubted most. Jesus said: Because you have seen me you have believed. Blessed are those who have not seen and yet have believed. He was talking about us. We were not in that room. And yet - blessed are we who believe.`,prayer:`Dear Jesus, I bring You my honest doubts and questions. Thank You that You do not reject people who doubt. Help me to be like Thomas - honest about where I am, and open to Your answer. In Jesus Name. Amen.`},
  {id:45,title:'Jacob Wrestles with God',narration:`Alone at the ford of Jabbok. Jacob had spent twenty years building a life, a family, a flock. Now he was heading home, and he was terrified. His brother Esau was coming to meet him with four hundred men. Jacob had stolen Esau's blessing all those years ago. He sent his family across the river ahead of him, sent all his possessions, and was left alone in the dark. Then someone grabbed him. Wrestling in the dark. A man appeared and wrestled with Jacob through the night. Jacob was a strong man, a man who had survived decades of difficulty. He did not stop. He did not give up. He wrestled and wrestled. When dawn approached, the man touched Jacob's hip and wrenched it out of joint. It must have been agonising. But Jacob still would not let go. Let me go - I will not let you go. "Let me go, for it is daybreak," the figure said. But Jacob tightened his grip. "I will not let you go unless you bless me." The figure asked his name. "Jacob," he said. "Your name will no longer be Jacob," the figure said, "but Israel, because you have struggled with God and with humans and have overcome." Jacob understood then who he had been wrestling with. A new name at dawn. Jacob called the place Peniel, saying "It is because I saw God face to face, and yet my life was spared." The sun rose above him as he crossed the river. He was limping. He would limp for the rest of his life. But he was changed. He walked into the rest of his life with a new name - Israel - and the mark of a man who had wrestled with God and refused to let go without a blessing. A complicated man facing his past. Jacob had spent his whole life being clever. He had tricked his brother Esau out of his birthright. He had tricked his father Isaac. Now he was about to meet his brother Esau again - the brother he had wronged, with four hundred men. Jacob was very afraid. He sent his family across the river. He sent gifts ahead. He made every plan he could make. Then he was alone. And someone grabbed him in the dark. All night long. They wrestled. All night. Neither one letting go. At some point the other man touched Jacob hip and dislocated it - just like that with a touch - which told Jacob something: this was no ordinary man. But even with a dislocated hip Jacob kept holding on. When the man said let me go for the day is breaking, Jacob said: I will not let you go unless you bless me. A new name a new man. What is your name? the man asked. Jacob, he said - which meant deceiver. Your name will no longer be Jacob, the man said, but Israel, because you have struggled with God and with humans and have overcome. A new name. A new identity. A changed walk - he limped from that day on. Every step reminded him of that night. Jacob became Israel. A nation was born from a limp.`,prayer:`Dear God, teach me to hold on in prayer the way Jacob held on. Help me to keep coming back, keep asking, keep seeking - and to trust that You bless those who refuse to give up. In Jesus Name. Amen.`},
  {id:46,title:'The Rich Young Ruler',narration:`Running to Jesus. As Jesus was leaving a village, a young man ran up to him and fell on his knees before him. "Good teacher," he said, "what must I do to inherit eternal life?" He had everything - wealth, youth, good character. He had kept all the commandments since he was young. He had done everything right. And still something was missing. He could feel it. Jesus looks at him and loves him. Jesus looked at him. The Gospel says: "Jesus looked at him and loved him." He had known this young man for ten seconds and already loved him. "One thing you lack," Jesus said. "Go, sell everything you have and give to the poor, and you will have treasure in heaven. Then come, follow me." He was offering him the best thing available. He was offering himself. The one command. Jesus looked at him and loved him. That is what the Gospel says. He looked at him and loved him. And then He said the one thing the man had not come expecting to hear. Go and sell everything you have and give it to the poor. Then come and follow me. He was not saying this to everyone. He said it to this specific man, because He could see exactly what the man was holding onto. The one thing that was between him and the life he was asking about. He could not let go. The young man turned and walked away. The Bible says he went away sad, because he had great wealth. He had kept the commandments. He had come running in sincerity. He had everything except the willingness to release the one thing Jesus asked. Wealth was not the problem. It was what the wealth owned in him. He could not let go. And Jesus watched him go without lowering the price of following Him. He goes away sad. The young man's face fell. He went away sad, because he had great wealth. He could not do it. Jesus watched him go. He did not chase after him. He did not lower the cost. He turned to his disciples. "How hard it is for the rich to enter the kingdom of God," He said. "It is easier for a camel to go through the eye of a needle than for someone who is rich to enter the kingdom of God." Then who can be saved?. "Who then can be saved?" the disciples asked, bewildered. Jesus looked at them. "With man this is impossible," He said, "but not with God. All things are possible with God." The young man chose his wealth. But Jesus left the door open. The invitation was never withdrawn. It never is. And no one who truly comes to Jesus empty-handed goes away without everything they need. The door stays open. Jesus watched him go. He turned to His disciples and said: How hard it is for the rich to enter the kingdom of God. Then who can be saved? they asked. With man it is impossible, Jesus said. But not with God. All things are possible with God. We do not know if the rich young ruler ever came back. But we know Jesus loved him. And love keeps the door open.`,prayer:`Dear Jesus, show me if there is anything I am holding so tightly that it is keeping me from holding onto You. Help me to want You more than anything else. In Jesus Name. Amen.`},
  {id:47,title:'Miriam the Prophetess',narration:`Miriam leads worship. After Moses led the Israelites through the Red Sea and the Egyptian army was swallowed by the waves, there was a moment of the greatest joy Israel had ever known. Moses led the men in a song of praise. And then Miriam, his sister, picked up her tambourine. She was called a prophetess. The Bible tells us she led the women in dance and song. "Sing to the Lord," she called out, "for He is highly exalted!" A woman who watched over Moses. Miriam had always been courageous. She was the girl who had stood in the Nile reeds as a child and watched over her baby brother Moses in his basket, then stepped forward bravely to speak to the princess. She had helped save Moses's life. And now she stood on the far shore of the Red Sea, having seen God do the impossible, and she led Israel in worship. She speaks presumptuously. But later, Miriam spoke against Moses, questioning his leadership and whether God had only spoken through him. "Has God only spoken through Moses?" she said. "Has He not also spoken through us?" God called Moses, Aaron, and Miriam to the tent of meeting. He spoke in defence of Moses. He said he spoke to Moses face to face, not in dreams as with other prophets. God's anger burned against Miriam. Restored after seven days. Miriam was struck with leprosy. Moses immediately cried out to God: "Please, God, heal her!" God told him she must stay outside the camp for seven days. The whole community waited for her. They did not move on. After seven days, she was restored and the community moved forward together. She was flawed, as all the great people of faith were. But she was restored, forgiven, and remembered as a prophetess who led a nation in worship at the edge of the sea. The girl in the reeds. Before Moses led a nation, his older sister watched over him. She was just a girl when she stood in those reeds watching the basket that held her baby brother. When the princess found the baby, Miriam was ready. She stepped forward from the reeds without hesitation with exactly the right words at exactly the right moment. Because of Miriam courage, Moses own mother was paid to nurse him. Leading the nation in worship. On the far shore of the Red Sea, after God had parted the waters and brought them through safely, it was Miriam who picked up the tambourine. Sing to the Lord! she sang, for He is highly exalted! And all the women followed her, dancing. She was called a prophetess. She led worship for an entire nation. Before David psalms, Miriam song rang across the desert. A woman of the whole story. Miriam was not perfect. There came a time when she spoke against Moses and was wrong. God corrected her and she was restored. Even that part of her story matters - it shows that great people can make great mistakes and still be brought back and healed and used again. The book of Micah lists her among the great leaders God sent to Israel: I sent Moses to lead you, also Aaron and Miriam.`,prayer:`Dear God, thank You for using real people with real flaws. Thank You that mistakes do not end Your plan for someone's life. Thank You for restoration. Help me to pray for people who have fallen, the way Moses prayed for Miriam. In Jesus Name. Amen.`},
  {id:48,title:'The Road to Emmaus',narration:`Walking away in despair. That same Sunday - the day of the resurrection - two of Jesus's followers were walking from Jerusalem to a village called Emmaus, about seven miles away. They were talking about everything that had happened. Talking and arguing and trying to make sense of it. The man they had believed was going to redeem Israel had been crucified three days ago. And now some women were saying he had risen, but they did not know what to believe. They were walking away. A stranger joins them. Jesus himself drew near and walked with them. But they did not recognise him. "What are you discussing?" he asked. They stopped, their faces downcast. "Are you the only visitor to Jerusalem who does not know the things that have happened?" Then they told him everything - about Jesus, whom they had hoped would redeem Israel, and about the women who found the empty tomb. Jesus listened. Then He said: "How foolish you are, how slow to believe!" And beginning with Moses and all the prophets, He explained to them everything in Scripture about Himself. Stay with us. When they approached Emmaus, Jesus acted as if he would keep going further. But they urged him strongly: "Stay with us, for it is nearly evening." He went in to stay with them. This is one of the great gestures in the Gospels. They did not want the conversation to end. Something had happened inside them on that road, even though they did not yet know who He was. Known in the breaking of bread. When He was at the table with them, He took bread, gave thanks, broke it and began to give it to them. At that moment their eyes were opened and they recognised Him. And He disappeared from their sight. They turned to each other. "Were not our hearts burning within us while he talked with us on the road?" They got up immediately, even though it was night, and ran the seven miles back to Jerusalem to tell the others. Walking away from hope. It was the afternoon of the resurrection but Cleopas and his companion did not know that yet. They were walking from Jerusalem to Emmaus - walking away from where everything had happened. Their hopes had died with Jesus on the cross. A stranger fell into step beside them and asked what they were talking about. They stopped walking. Are you the only visitor to Jerusalem who does not know what has happened? they asked. Beginning with Moses. Jesus asked them what things had happened. They told Him everything. Then Jesus said: How foolish you are, and how slow to believe all that the prophets have spoken! And beginning with Moses and all the Prophets He explained to them what was said in all the Scriptures concerning Himself. The whole walk - perhaps two hours - He opened the scriptures to them. Their hearts burned as He spoke, though they did not yet know who He was. Known in the breaking of bread. They begged the stranger to stay for supper. He sat at their table, took the bread, gave thanks, broke it, and handed it to them. And their eyes were opened - they recognised Him. And He vanished. Were not our hearts burning within us while He talked with us on the road? They got up immediately and rushed seven miles back to Jerusalem. They had been walking away from hope. Jesus walked with them until they turned around.`,prayer:`Dear Jesus, open our eyes to recognise You in the breaking of bread, in the reading of Scripture, in the moments when our heart strangely burns. Come walk with us on our road. In Jesus Name. Amen.`},
  {id:49,title:'Philip and the Ethiopian',narration:`An unexpected instruction. Philip was in the middle of a very successful ministry in Samaria when an angel of the Lord gave him strange instructions. "Go south, to the desert road that goes down from Jerusalem to Gaza." That was all. No explanation. No destination. Just a road through the desert. Philip went. This was a man who had learned to obey immediately without needing all the reasons. The Ethiopian\\. On that empty desert road, a chariot appeared. Inside it was an important official - the treasurer of Ethiopia, the queen's minister, a man who had come all the way to Jerusalem to worship and was now heading home reading the scroll of Isaiah. The Spirit said to Philip: "Go to that chariot and stay near it." Philip ran. This is one of the most intentional encounters in Acts - a Spirit-arranged appointment in the middle of the desert. Do you understand what you are reading?. "Do you understand what you are reading?" Philip called up to him. "How can I," the man replied, "unless someone guides me?" He invited Philip up into the chariot. He was reading Isaiah 53 - the passage about a sheep led to the slaughter, about a man who suffered without complaint. "Tell me," the Ethiopian said, "please. Who is the prophet talking about - himself or someone else?" Philip opened his mouth and began to tell him about Jesus. Baptised in the desert. As they rode along, they came to some water. "Look," the Ethiopian said, "here is water. What can stand in the way of my being baptised?" Philip baptised him right there, in the desert, in whatever pool or stream they had found. When they came up out of the water, the Spirit of the Lord suddenly took Philip away. The official never saw him again. But he went on his way rejoicing. He took the message of Jesus back to Ethiopia. And it is still there today. Strange instructions from an angel. Philip was in Samaria and things were going very well. Then an angel of the Lord came and said: Go south to the road that goes from Jerusalem to Gaza. That was all. No explanation. No destination. Just go to a desert road. Philip went. He did not argue. He did not ask for more information. He obeyed immediately. And on that desert road, a chariot was passing. Do you understand what you are reading?. The chariot belonged to a high Ethiopian official - the treasurer of the Queen of Ethiopia. He had been to Jerusalem to worship. Now he was heading home reading aloud from the scroll of Isaiah. Philip heard him and asked: Do you understand what you are reading? The man said: How can I unless someone explains it to me? He invited Philip to sit with him. And Philip told him the good news about Jesus. Baptised in the desert. As they travelled they came to some water. The Ethiopian said: Look, here is water! What is to prevent me from being baptised? He stopped the chariot. They went down into the water together. Philip baptised him. When they came up, the Spirit of the Lord suddenly took Philip away. The official went on his way rejoicing. One conversation on a desert road sent the good news of Jesus to the whole nation of Ethiopia.`,prayer:`Dear God, make me as instantly obedient as Philip. Help me to run when You say run, even when I don't know why yet. The best appointments in life are often the ones You arrange. In Jesus Name. Amen.`},
  {id:50,title:'The Vision of John',narration:`John on the island of Patmos. John was the last surviving apostle. He was very old. The Roman Emperor had exiled him to a small rocky island called Patmos in the Aegean Sea. He was there because of his faith in Jesus. He had nothing - no community, no work, no freedom. One Sunday morning, he was in prayer when something extraordinary began to happen. A new heaven and a new earth. John was given a vision of the end of God's story - and the beginning of the real story. He saw a new heaven and a new earth. The old ones had passed away. There was no more sea. He saw the holy city, the new Jerusalem, coming down from heaven like a bride dressed for her wedding. And he heard a loud voice say: "Look! God's dwelling place is now among the people, and he will dwell with them." Every tear wiped away. "He will wipe every tear from their eyes," the voice continued. "There will be no more death, or mourning, or crying, or pain. The old order of things has passed away." John wept as he heard it. He had lived through so much loss - friends martyred, people he loved taken by violence and disease and time. And the voice said: God himself will wipe every tear. The river of life. John saw a river of the water of life, as clear as crystal, flowing from the throne of God. Trees of life lined its banks bearing fruit every month, their leaves for the healing of the nations. No more curse. His servants will serve Him, and they will see His face. There will be no more night. The Lord God will give them light, and they will reign for ever and ever. John wrote it all down on his island, in exile, in his very old age. The last word of the whole story is not death or darkness. It is light. And it is God among his people. Always. An old man on a rocky island. John was the last of the twelve disciples still alive. He had been exiled by the Roman emperor to a small rocky island called Patmos because of his faith. He was old. His friends were gone. But on a Sunday - the Lord Day - something happened that no exile could prevent. The Spirit came upon him. A voice behind him like a trumpet said: Write down what you see. And John turned around. All of heaven worshipping. John saw heaven open. He saw the throne of God. He saw twenty-four elders falling down in worship. He saw four living creatures crying Holy, holy, holy day and night without stopping. He saw a great multitude from every nation and tribe and language more than anyone could count, standing before the throne with palm branches crying: Salvation belongs to our God! At the centre of it all - a Lamb, looking as though it had been slain. Jesus. Worshipped by all of heaven. He is coming soon. At the very end of his vision John heard Jesus say: I am coming soon. Three times in the last chapter of Revelation Jesus says it: I am coming soon. And John - old, exiled, alone on his rocky island - wrote back the prayer of every believer: Amen. Come, Lord Jesus. The last book of the Bible ends not with a rule but with a conversation. God promises to come. His people say yes, please come. And one day He will, and every tear will be wiped away.`,prayer:`Dear God, thank You that You have shown us how the story ends. Help me to live today with the confidence of knowing the ending - that You win, that love wins, and that one day every tear will be wiped away. In Jesus Name. Amen.`},
  {id:51,title:'Adam and Eve in the Garden',narration:`A perfect garden home. After God made Adam and Eve, He planted a beautiful garden called Eden just for them. There were trees of every kind, with fruit of every colour. Rivers ran through the middle. Animals wandered around without fear. It was the most perfect home that had ever existed - made especially for them. One tree they must not touch. God told Adam and Eve they could eat from any tree in the garden. But there was one tree in the very middle that they must not eat from. God called it the tree of the knowledge of good and evil. Not to keep something from them - but because He knew some things were not yet meant to be carried. A whisper of temptation. One day a serpent came to Eve. It twisted God's words and made the command sound unreasonable. Eve looked at the fruit. It looked beautiful. It seemed like it would make her wise. She took it. She ate. She gave some to Adam. He ate too. And suddenly everything felt different. Hiding from God. The moment they ate it, they knew something was wrong. For the first time they felt shame. They hid among the trees. When God walked through the garden calling for them, Adam said: I was afraid, so I hid. God had never wanted them to be afraid of Him. He only ever wanted to walk with them. Leaving the garden. There were consequences. Adam and Eve had to leave the garden. Life would be harder now. But even in that sad moment, God made them something to wear. He did not stop loving them. And He made a promise - one day someone would come who would make things right again. That someone would be Jesus. God never stopped loving them. Adam and Eve made a very big mistake. But their story did not end at the gate of Eden. God watched over them. He gave them children. He stayed close. And the promise He made in the garden - about the one who would come and fix what had been broken - He was already setting that plan in motion. The whole rest of the Bible is the story of God keeping that promise. Grace from the very beginning. The most important thing about the garden story is not the mistake. It is the grace. God could have walked away. He did not. He clothed them. He spoke to them. He promised them a future. From the very first sin in the very first garden, God was already planning the rescue. That is who He is. He never stops coming after the people He loves.`,prayer:`Dear God, thank You that Your love does not stop when I make mistakes. Help me to trust You and obey You because I know You want good things for me. In Jesus Name. Amen.`},
  {id:52,title:'The Tower of Babel',narration:`One language one people. Long ago, after the great flood, all the people on earth spoke the same language. Every word. Every name. Every song. Everyone could understand everyone else. What a gift that was. They could have used it to build something beautiful for God. But they had a different idea. Let us build a tower. The people said to each other: Come, let us build a great city with a tower that reaches to the sky. Let us make a name for ourselves! They were not building a tower to honour God. They were building it to make themselves famous, to show how great they were. God comes down to look. The Bible says that God came down to see the city and tower that the people were building. Their tower that reached to the sky - God had to come down to even see it. It was so much smaller than they thought. Human pride always is. But God took it seriously, because He cared about what was happening in their hearts. Different languages. God gave the different groups different languages. Suddenly nobody could understand anyone else. The building stopped. The great city was abandoned. People scattered across the earth - which is exactly what God had originally wanted them to do. The city was called Babel, which means confused. Scattered across the earth. The people spread out across the whole earth, each group with their own language, filling the lands and coasts and mountains God had always meant for them to fill. What they meant to do for pride, God turned into the spread of humanity across His whole beautiful world. Pride and humility. The lesson of Babel is not complicated. We are not the most important thing in the universe. God is. When we try to make ourselves the centre of everything, things do not go well. But when we remember how great He is and how loved we are by Him, we find our right size. Small enough to need God. Big enough to be loved by Him. One day all languages will praise Him. One day at Pentecost, the Holy Spirit came and people heard the good news in every language at once. What had been divided at Babel was reunited by love. And one day, the book of Revelation tells us, people from every tribe and tongue and nation will stand together before God in joy. The love of God is gathering them back.`,prayer:`Dear God, help me to remember that You are the greatest and I am loved by You. Keep my heart humble and help me to use my gifts to honour You. In Jesus Name. Amen.`},
  {id:53,title:'Isaac and Rebekah',narration:`Abraham sends a faithful servant. Abraham was old. His son Isaac needed a wife. Abraham called his most trusted servant and asked him to travel all the way back to his own family in a faraway land to find the right woman. It was a long and uncertain mission. But the servant trusted God and set out. A prayer at the well. When the servant arrived at the city, he stopped at the well outside the town and prayed. Lord, give me success today. Here is my sign: the girl I ask for water - if she gives me water and offers to water my camels too - let her be the one. Before he had even finished praying, a young woman named Rebekah came to the well. Rebekah gives water to the camels. The servant asked Rebekah for a drink. She gave him water at once. Then she said: I will draw water for your camels too, until they have had enough. And she hurried back and forth, filling the trough for all his camels. The servant watched in silence, wondering if God had answered his prayer before he had even finished asking. Gold for a chosen bride. When Rebekah had finished, the servant gave her golden bracelets and a gold nose ring. He asked who her father was and if there was room to stay. Rebekah ran home to tell her family. And the servant went to their home and told them the whole story - the prayer, the sign, and God's faithfulness. Will you go with this man?. Rebekah family agreed that this was from God. But they asked Rebekah herself: Will you go with this man? She said simply: I will go. She did not know Isaac. She had never seen him. But she trusted that God was leading her. She said yes to a journey she could not see the end of. Isaac sees her coming. Isaac was walking in the fields in the evening when he looked up and saw the camels coming. Rebekah looked up too and saw Isaac. When the servant told Isaac everything that had happened, Isaac brought her into his mother tent. He loved her. She became his wife. And the loneliness in his heart was healed. God leads us where we need to be. A servant prayed a bold prayer and God answered before he finished. A young woman said yes because she trusted God direction. A lonely man looked up at the right moment and saw the person God had prepared for him. God's loves to lead His people - if we are willing to pray, listen, and go.`,prayer:`Dear God, thank You that You lead Your people and care about the details of our lives. Help me to pray boldly and trust You even when I cannot see what is ahead. In Jesus Name. Amen.`},
  {id:54,title:'The Boy Jesus in the Temple',narration:`A family journey to Jerusalem. Every year Mary and Joseph travelled to Jerusalem for the Passover festival. When Jesus was twelve years old, He went with them. Jerusalem was full of thousands of pilgrims. Families and neighbours travelled together in large groups. It was exciting and busy and full of celebration. Three days of searching. When the festival was over, the family began the journey home. After a whole day of travelling, Mary and Joseph realised something alarming - Jesus was not with them. They turned around and went back to Jerusalem, hearts pounding. For three days they searched. Sitting among the teachers. They found Him in the temple courts. He was sitting among the teachers, listening to them and asking them questions. Everyone who heard Him was amazed at His understanding and His answers. This was the Son of God doing what was most natural to Him - being in His Father's house, discussing the very scriptures He Himself had inspired. Did you not know?. Mary said to Him: Son, why have You done this to us? Your father and I have been searching for you with great anxiety! And Jesus said: Why were you looking for me? Did you not know that I must be in my Father's house? He was gently pointing to something deeper - that His relationship with God the Father was the central truth of His life, even at twelve years old. He went home and obeyed. Then Jesus went home with them. He obeyed His parents. Even the Son of God, who had just been amazing the greatest teachers in Israel, went home and lived under the authority of His earthly parents. Mary kept all these things in her heart. And Jesus grew in wisdom and stature, and in favour with God and with people. Growing in wisdom. For eighteen years after this, Jesus lived quietly in Nazareth. He worked. He helped His family. He learned. He prayed. He grew. The Son of God spent thirty years being ordinary before He spent three years changing the world. God does not waste the quiet seasons. In the years of preparation, He is always doing something. Faithful in the ordinary. The years in Nazareth were not wasted years. They were preparation years. Jesus learned His trade. He learned the scriptures. He grew in wisdom. He was faithful in the ordinary. And when the time came for His ministry to begin, He was ready. The faithful ordinary days of your life are never wasted either.`,prayer:`Dear God, help me to grow in wisdom just like Jesus did. Help me to be faithful in ordinary things, knowing that even the quiet seasons of my life matter to You. In Jesus Name. Amen.`},
  {id:55,title:'The Wedding at Cana',narration:`A wedding celebration. Jesus and His disciples were invited to a wedding in a town called Cana in Galilee. Mary, Jesus mother, was there too. Weddings in those days went on for several days - they were the biggest celebrations of the year. A wedding feast was a great joy, and everyone wanted it to go well. The wine has run out. Something went wrong. The wine ran out. In that culture, this would have been a serious embarrassment for the family hosting the wedding. It was Mary who noticed first. She went to Jesus and said three simple words: They have no wine. She did not tell Him what to do. She just told Him the problem. She trusted Him with it. Do whatever He tells you. Jesus said to His mother: My hour has not yet come. But Mary turned to the servants and said: Do whatever He tells you. She did not argue. She simply pointed to Jesus and said trust Him. Those words - do whatever He tells you - are some of the most important words any person can ever follow. Six stone jars filled with water. Jesus told the servants to fill six large stone water jars with water. The servants filled them to the brim, just as He said. Then He said: Now draw some out and take it to the master of the banquet. They did. The servants did not know what had happened. They just obeyed. And when the master of the banquet tasted what they brought him - it was not water. The best wine saved for last. The master of the banquet tasted the wine and was amazed. He called the bridegroom over and said: Everyone brings out the best wine first. But you have saved the best till now! He did not know where it had come from. But the servants knew. The quiet miracle had done two things: saved the family embarrassment, and revealed who Jesus really was. His disciples believed in Him. This was the first of the signs through which Jesus revealed His glory. And His disciples believed in Him. A quiet miracle at a wedding party. Six stone jars of water. A family spared embarrassment. And the hearts of His closest friends beginning to understand who He truly was. Jesus cared about the ordinary details of people lives. The best is always yet to come. The best wine saved for last. That is always God's way. The best is not behind us. It is ahead. However good things are now, God always has something more prepared. In the kingdom of God, the celebration does not run out. The joy does not run dry. The best is always yet to come for those who trust in Jesus.`,prayer:`Dear Jesus, thank You that You care about every detail of my life, even the ordinary things. Help me to bring my needs to You and to trust You enough to do whatever You say. In Jesus Name. Amen.`},
  {id:56,title:'Nicodemus at Night',narration:`A leader who came at night. Nicodemus was a Pharisee - one of the most respected religious leaders in all of Israel. He was a member of the Jewish ruling council. He had studied the scriptures his whole life. He had been watching Jesus, listening to Him, seeing the signs He performed. And something in him said: I have to speak with this man. He came at night, secretly. Rabbi we know you come from God. Nicodemus said to Jesus: Rabbi, we know that you are a teacher who has come from God. For no one could perform the signs you are doing if God were not with him. He was being careful. He was a man accustomed to navigating things diplomatically. But Jesus did not answer what he said. He answered what he was actually coming to ask. You must be born again. Very truly I tell you, Jesus said, no one can see the kingdom of God unless they are born again. Nicodemus was confused. How can someone be born when they are old? He was thinking physically. Jesus was talking about something spiritual. Unless someone is born of water and the Spirit, they cannot enter the kingdom of God. Flesh gives birth to flesh. Spirit gives birth to spirit. The wind blows where it will. Jesus said: The wind blows wherever it pleases. You hear its sound but you cannot tell where it comes from or where it is going. So it is with everyone born of the Spirit. Nicodemus said: How can this be? What Jesus was describing was not a new idea - it was the deepest promise of the prophets - a new heart, a new spirit, born from above. God so loved the world. Jesus said: For God so loved the world that He gave His one and only Son, that whoever believes in Him shall not perish but have eternal life. For God did not send His Son into the world to condemn the world, but to save the world through Him. Nicodemus had studied the scriptures his whole life. But he had never heard it put quite like this. Nicodemus walks home changed. We do not know exactly what Nicodemus decided that night. But we see him twice more in John gospel. He speaks up for Jesus when others want to condemn Him. And after the crucifixion, he comes with a hundred pounds of spices to help bury Jesus' body - a gesture that would have cost him his reputation. He became a disciple. He was born again. Born from above. Nicodemus came at night. He left with the most extraordinary thing anyone had ever heard: that eternal life is not earned by knowledge or religious performance. It is received by faith in the Son of God. You can know all the scriptures and still miss the One they are about. Nicodemus found Him in a room at night. And the teacher of Israel became a student of grace.`,prayer:`Dear Jesus, thank You that You offer new life to anyone who believes. Help me to truly believe in You - not just know about You, but trust You with my whole heart. In Jesus Name. Amen.`},
