  {id:57,title:'Mary and Martha',narration:`Jesus visits their home. Jesus and His disciples came to a village, and a woman named Martha welcomed Him into her home. Martha and her sister Mary and their brother Lazarus were among Jesus closest friends. Their home was a place He loved to visit. And when Jesus came through the door, the two sisters responded in completely different ways. Mary sits at His feet. Mary sat down at Jesus' feet and listened to what He said. In that culture, sitting at a teacher feet was the posture of a student, of someone choosing to receive. Mary chose the place of listening. She was not idle. She was not doing nothing. She was doing the most important thing in the room. She was paying attention to Jesus. Martha is distracted. Martha was distracted by all the preparations that had to be made. She was working hard. She was being generous. But she was distracted. And the frustration grew as she watched Mary sitting and listening. Finally she came to Jesus and said - Lord, do You not care that my sister has left me to do all the work? Tell her to help me! Martha Martha. Jesus said: Martha, Martha. He said her name twice - gently, lovingly. You are worried and upset about many things, He said. But few things are needed - or really only one. Mary has chosen what is better, and it will not be taken away from her. He was not criticising Martha work. He was gently pointing to what she was missing. The one thing needed. The one thing needed. What was it? Being with Jesus. Listening to Him. Choosing the place at His feet even when there were other things to do. Martha was worried about many things. Jesus was offering her one thing that would put all the others in their right place. Not no work. Not no service. Just - Him first. Both sisters were loved. Jesus loved Martha. He did not dismiss her work or her personality. He wanted her to know what was missing. And later, when their brother Lazarus died, it was Martha who ran to meet Jesus on the road and made one of the greatest confessions of faith in the Gospels. She grew. She learned. Both sisters were loved deeply by Jesus - each with their own way of learning to love Him back. Choosing what cannot be taken away. Mary chose what is better, and it will not be taken away from her. The dishes get done and then dirty again. But time spent at Jesus' feet - listening, learning, loving Him - that is stored up forever. In every busy season, Jesus is still saying: sit with me first. Everything else will find its right place.`,prayer:`Dear Jesus, thank You that You welcome me just as I am, whether I am busy or still. Help me to choose the one thing needed - time with You - and let everything else flow from that. In Jesus Name. Amen.`},
  {id:58,title:'The Unmerciful Servant',narration:`How many times must I forgive?. Peter came to Jesus with a question that felt generous at the time. Lord, how many times must I forgive someone who sins against me? Up to seven times? Seven was more than the teachers of the law usually required. Peter thought he was being very generous. Jesus said: Not seven times - but seventy-seven times. And then He told a story. A servant with an impossible debt. A king decided to settle accounts with his servants. One man was brought to him who owed an enormous amount of money - more than anyone could earn in a thousand lifetimes. The king ordered that the man, his wife, his children, and everything he had be sold to begin paying the debt. The man fell on his knees. Have patience with me! he begged. I will pay back everything! The king cancels the debt. The king looked at the man on his knees. His heart was moved with compassion. And he did something remarkable - he cancelled the entire debt. Not reduced it. Not extended the time to pay it. He wiped it out completely. Every last coin. Gone. This is a picture of what God has done for us - cancelled a debt we could never repay. The same servant finds his fellow. The man who had just been forgiven walked out and immediately found a fellow servant who owed him a very small amount. He grabbed him by the throat. Pay back what you owe me! The fellow servant fell on his knees and said the exact same words: Have patience with me! But the forgiven man refused. He had his fellow servant thrown into prison. The king hears what happened. When the other servants saw what had happened, they went and told the king everything. The king called the man back. You wicked servant! he said. I cancelled all that debt of yours because you begged me. Should you not have had mercy on your fellow servant just as I had mercy on you? And the king handed him over to be punished. The point of the story. Jesus finished the story and looked at His disciples. This is how my heavenly Father will treat each of you unless you forgive your brother or sister from your heart. From your heart. Not just in words. Not just on the surface. The reason we can forgive is not because the person deserves it. It is because we have been forgiven so much more than we could ever deserve. Forgiven people forgive people. We have been forgiven an enormous debt - all of our wrongdoing against a perfect God. When we remember that, other debts become smaller. Not easy to forgive. But possible. Because forgiven people forgive people. Not to earn anything. Not because the other person deserves it. But because we know what it feels like to have something impossible lifted off us.`,prayer:`Dear God, thank You for cancelling my debt - for forgiving me everything. Help me to forgive others from my heart, not because they deserve it, but because You have forgiven me so much more. In Jesus Name. Amen.`},
  {id:59,title:'The Transfiguration',narration:`Up the mountain. Jesus took Peter, James and John and led them up a high mountain by themselves. They did not know what they were going there for. They just followed. That is often how it works with Jesus - He leads, and we discover what He was doing when we arrive. They climbed. The world got quieter below them. And then something began to happen. His face shone like the sun. Jesus was transfigured before them. His face shone like the sun. His clothes became dazzling white. This was not something put on Him from outside. This was what He was like inside - and for a moment, the outside matched. The same glory that had been there in heaven before the world began was visible for a moment on a mountain in Galilee. Moses and Elijah appear. Moses and Elijah appeared, talking with Jesus. Moses who had spoken with God face to face. Elijah who had been taken up to heaven in a chariot of fire. Two of the greatest figures of the entire Old Testament, standing on a mountain talking with Jesus. Luke tells us they were speaking about His departure - the death and resurrection about to happen in Jerusalem. A voice from the cloud. Peter, not quite knowing what to say, offered to build three shelters. He was still speaking when a bright cloud covered them all and a voice came: This is my Son, whom I love. With Him I am well pleased. Listen to Him. When the disciples heard the voice, they fell face down on the ground, terrified. Then Jesus came and touched them. Get up, He said. Do not be afraid. Just Jesus. When they looked up, the cloud was gone. Moses and Elijah were gone. They saw no one except Jesus. Just Jesus. Always, in the end, just Jesus. On the mountain they saw Moses - the Law. They saw Elijah - the Prophets. And they saw Jesus - and He outshone them both. Then the Law and the Prophets were gone and there was Jesus alone. He is enough. He is everything. Coming down from the mountain. As they came down the mountain, Jesus told them not to tell anyone what they had seen until after He had risen from the dead. They kept it to themselves but wondered what rising from the dead meant. The transfiguration was a gift - a glimpse of who Jesus truly was - to prepare them for what was coming. When the cross came, they would remember the mountain. He is more glorious than we imagine. Jesus is more glorious than we can imagine. The transfiguration was a peek behind the curtain - a moment when the ordinary appearance of a carpenter from Nazareth gave way to the eternal light of the Son of God. That same Jesus walks with us. The more we get to know Him, the more we see who He truly is - and the less afraid we need to be.`,prayer:`Dear Jesus, thank You that You are glorious and wonderful and more than enough. Help me to know You better every day and to not be afraid of who You truly are. In Jesus Name. Amen.`},
  {id:60,title:'The Rich Man and Lazarus',narration:`A rich man and a poor man. Jesus told a story about two men whose lives could not have been more different. One man was very rich, dressed in fine purple clothing and eating the most lavish food every single day. The other man was named Lazarus - which means God has helped. He was very poor, covered in sores, and lay at the rich man gate hoping to eat scraps from his table. The beggar at the gate. Every single day Lazarus lay at the gate. Every day the rich man walked past him, or stepped over him, or simply did not see him at all. The gate was right there. The need was right there. Lazarus was not far away in another town. He was at the gate. And every day the rich man made a choice - even if he called it not making a choice - to walk past. Both men die. Both men died. The poor man Lazarus was carried by angels to Abraham side - the place of rest and blessing. The rich man died and was buried with great ceremony. But the story takes us to where they ended up after death. The rich man found himself in a place of torment. And when he looked up, he could see Abraham far away, with Lazarus at his side. A reversal of everything. The rich man called out: Father Abraham, have pity on me! Send Lazarus to dip his finger in water and cool my tongue. And Abraham said: Remember that in your lifetime you received good things, while Lazarus received bad things. But now he is comforted here and you are in agony. And there is a great chasm between us that cannot be crossed. God sees the invisible ones. God knew Lazarus name. The world did not. He lay at the gate unnamed, unseen, unhelped. But God called him by name and sent angels to carry him home. God always sees the ones the world walks past. And He calls us to see them too - because when we reach out to the poorest person at our gate, we are reaching out to someone God's loves completely. Who is at your gate?. Jesus told this story not to frighten but to wake us up. Lazarus was right there - at the gate, impossible to miss. The rich man did not hate Lazarus. He just did not see him as someone who mattered. The question this story asks is: who is at your gate? Who is right there, easy to walk past? What will you do? See them as God sees them. Every person at every gate in the world is someone God's loves completely. He sees them. He knows their name. And He calls us to see them too. Not to fix everything. Just to stop. To see. To treat them as someone who matters - because they do, to God, and therefore they should to us. Who is at your gate today?`,prayer:`Dear God, help me to see the people around me the way You see them. Give me eyes to notice those who are overlooked and a heart generous enough to help. In Jesus Name. Amen.`},
  {id:61,title:'The Parable of the Sower',narration:`A farmer goes out to plant. Jesus sat by the lake and a large crowd gathered. He told them about a farmer who went out to sow seeds. The farmer scattered the seed generously across the whole field. But not all the soil was the same. And the different soils told a story about something far more important than farming. Seed on the path. Some seeds fell on the path where the ground was hard. Before the seeds could sink in at all, birds came and ate them up. Jesus explained: when someone hears the message about the kingdom and does not understand it, the evil one comes and snatches away what was sown. A hard heart is like a hard path. The word cannot go in and nothing grows. Seed on rocky ground. Some seeds fell on rocky ground where there was only a thin layer of soil. They shot up quickly. But when the sun came up, the plants withered because they had no roots. Jesus said this is like someone who receives the word with joy but when trouble comes, they quickly fall away. Enthusiasm without roots cannot last. Seed among thorns. Some seeds fell among thorns. The thorns grew up alongside the seedlings and choked them. Jesus said this is like someone who hears the word but worries and wealth and the desires of this world grow up alongside it and choke it. The seed is real. But other things crowd in and take all the light and water. Seed on good soil. Some seeds fell on good soil. These seeds took root, grew tall, and produced a crop - thirty, sixty, even a hundred times what was planted. Jesus said this is like someone who hears the word and understands it. They let it go deep. They think about it. They act on it. And it produces fruit in their life far more than the seed that was planted. What kind of soil are you?. Jesus was not just talking about farming. He was asking: what kind of soil is your heart? Is it hard? Is it shallow? Is it crowded with other things? Or is it open and deep and clear - ready to receive the word and let it grow? The answer changes everything about how much fruit our lives produce. Good soil grows good fruit. Good soil does not just happen. It is tended. Rocks are removed. Weeds are pulled. Our hearts are the same. We can choose to soften them - through prayer, through reading God's word, through letting go of the things that crowd out the most important things. The farmer scatters the seed generously. What we do with the soil is up to us.`,prayer:`Dear God, help my heart to be good soil for Your word. Help me to hear it, understand it, and let it grow deep roots in my life. Clear out anything that is crowding it out. In Jesus Name. Amen.`},
  {id:62,title:'The Hidden Treasure and the Pearl',narration:`A man finds treasure in a field. Jesus said: The kingdom of heaven is like treasure hidden in a field. When a man found it, he hid it again, and then in his joy went and sold all he had and bought that field. The treasure was found by surprise - he was not looking for it. But when he found it, there was no question about what he would do. Everything else he owned suddenly seemed small. He sells everything with joy. He sold everything. Not with a heavy heart. With joy. That is the key word Jesus used. He did not regret what he gave up because what he was gaining was worth infinitely more. The kingdom of God is like that. When you truly discover it, giving up anything that competes with it does not feel like a sacrifice. It feels like the most obvious decision in the world. A merchant searches for pearls. Jesus told another story: The kingdom of heaven is like a merchant looking for fine pearls. Unlike the man who found treasure by accident, this man was a professional who had been searching deliberately. He knew pearls. He had seen thousands of them. And then one day he found one pearl of such extraordinary quality that he knew immediately - this is the one. The pearl of great price. When he found the pearl of great price, he went away and sold everything he had and bought it. The same decision as the man who found the treasure. Sell everything. Buy the one thing. Both stories are about the same discovery made in different ways - but both arriving at the same place. The moment you truly find the kingdom, nothing else compares. Not a sacrifice - a trade up. Both men gave up everything. But neither story is a tragedy. Both men are filled with the certainty that they made the right exchange. The kingdom of God is not something we give things up for reluctantly. It is something we run toward joyfully because we finally understand that everything else we were holding was temporary, and this is eternal. What are you trading for?. Both stories cover both kinds of people - those who stumble upon the kingdom unexpectedly, and those who have been searching deliberately. Neither story tells us how to find it. Both tell us what to do when we do. And the answer is the same: give everything else to get this. Because this is worth everything. The kingdom is worth everything. The kingdom of heaven is worth more than everything else combined. Not because God needs our things. But because when we find the kingdom, we find God Himself - His love, His presence, His peace, His purpose. And those who find that discover something the world cannot give and cannot take away. Yours, if you sell everything else for it.`,prayer:`Dear Jesus, help me to understand how valuable Your kingdom is. Help me to put it first and to hold everything else loosely. In Jesus Name. Amen.`},
  {id:63,title:'The Ten Virgins',narration:`Ten young women waiting. Jesus told a story about ten young women who took their lamps and went out to meet the bridegroom. Five of them were wise and five were foolish. The wise ones took oil in jars along with their lamps. The foolish ones took their lamps but did not bring any extra oil. Then the bridegroom was delayed. They all became drowsy and fell asleep. The cry at midnight. At midnight the cry rang out: Here is the bridegroom! Come out to meet him! All ten young women woke up and trimmed their lamps. But the foolish ones realised their lamps were going out. They said to the wise ones: Give us some of your oil. Our lamps are going out! The wise ones said: There may not be enough for both of us. Go and buy some for yourselves. The door is shut. While the foolish ones went to buy oil, the bridegroom arrived. The five wise young women who were ready went in with him to the wedding banquet. And the door was shut. Later the other five came. Lord! Lord! Open the door for us! But he replied: Truly I tell you, I do not know you. Watch therefore, Jesus said. For you do not know the day or the hour. Ready now not later. This parable is about being ready for Jesus when He returns. The oil represents the real relationship with God that cannot be borrowed or transferred. The foolish young women did not plan ahead. They assumed there would be time. They were wrong. And when the moment came, the preparation that had not been done could not be done in time. What extra oil looks like. Extra oil is not collected in one big surge. It is accumulated daily - in prayer, in time with God, in obedience, in choosing His ways in small decisions. The wise young women had more oil because they had prepared. Relationship with God is built over time, in the everyday. You cannot borrow it when you need it. He is worth waiting for. The story is not meant to frighten. It is meant to help. Jesus is worth waiting for. He is worth being ready for. The five wise women sat in the darkness for a long time waiting. But they were ready when the cry came. That is what faithfulness looks like - not a flashy burst of preparation at the last moment, but a lamp kept full through all the ordinary days that came before. Keep your lamp burning. Watch therefore. Keep your lamp burning. Not because you need to earn your place. But because Jesus is worth your full attention. He is worth the daily prayer, the open Bible, the small choices to do right, the habits of the heart that fill the lamp slowly and surely over time. One day the cry will come. And those whose lamps are ready will enter a joy beyond anything they have imagined.`,prayer:`Dear Jesus, help me to be ready for You. Help me to build my relationship with You every day in the small faithful things, so that when the moment comes, my lamp is burning. In Jesus Name. Amen.`},
  {id:64,title:'Josiah the Young King',narration:`A boy on the throne. Josiah became king when he was only eight years old. Eight. Think about how old you are. Josiah had to sit on the throne and make decisions for an entire nation. He had not chosen this. But the Bible says that Josiah did what was right in the eyes of the Lord. He walked in all the ways of his ancestor David. From the very beginning, even as a child, he chose to follow God. Repairing the temple. The kingdom of Judah had drifted far from God for many years. Altars to false gods were everywhere. The temple of God had been neglected. When Josiah was eighteen, he began repairing the temple. He collected money from the people and hired workers. While they were working, the priest Hilkiah made an extraordinary discovery - he found the Book of the Law. The word of God had been lost in the temple itself. The king hears the Law. When Josiah heard the words of the Law being read, he tore his robes. He understood immediately how far his nation had strayed from what God had commanded. He sent people to enquire of God. A prophetess named Huldah gave them a message: God had seen Josiah humility, heard his weeping, and He would show him mercy. Reading the Law to everyone. Josiah called everyone in Jerusalem together - every elder and every person, small and great. He stood in the temple and read the whole Book of the Covenant to them. All of it. Then he made a covenant before God to follow the Lord and obey His commands with all his heart and soul. And all the people pledged themselves to the covenant too. Removing the idols. Josiah did not stop at the ceremony. He acted. He went through the whole land removing altars to Baal, cutting down idol worship poles, smashing the high places. He restored the Passover celebration which had not been properly celebrated for many generations. He was thorough. He was wholehearted. And God remembered it. A heart turned toward God. The Bible says this about Josiah: Neither before nor after Josiah was there a king like him who turned to the Lord as he did - with all his heart and with all his soul and with all his strength. He started when he was eight. He reformed his whole nation when he was eighteen. He never turned away. Never too young. You are never too young to choose God. Josiah was eight when he started. And one person who chooses God with their whole heart - reads His word, removes what competes with Him, gathers others to follow - can turn a whole nation. What you choose now matters more than you know.`,prayer:`Dear God, help me to be like Josiah - to choose You early and to choose You with my whole heart. Help me to read Your word and to let it change how I live. In Jesus Name. Amen.`},
  {id:65,title:'The Widow Giving Her Coins',narration:`The temple treasury. Jesus sat down opposite the temple treasury and watched people put their money in. He watched. He paid attention to what people did with their money. Many rich people threw in large amounts. The sound of it was impressive. But Jesus was looking at something that money amounts do not measure. A widow approaches. A poor widow came. She put in two very small copper coins - the smallest coins that existed. Worth almost nothing. Barely a fraction of a day wage. She had come to give, and this was what she had. She did not hesitate. She did not weigh it up or calculate whether it made sense. She had two coins and she gave them both. She did not keep one for the journey home. Jesus calls His disciples to look. Jesus called His disciples to Him and said: Truly I tell you, this poor widow has put more into the treasury than all the others. The disciples looked at each other. The numbers did not add up. She had given the least. Everyone could see that. But Jesus was using a different accounting system. He was measuring not by what was given, but by what was kept back. Everything she had to live on. Jesus said: They all gave out of their wealth. But she, out of her poverty, put in everything - all she had to live on. She did not give from the overflow. She gave from the need. She gave everything she had and walked away with nothing. And Jesus saw it. He called His disciples over to make sure they saw it too. She did not give money - she gave trust. The widow did not give money. She gave trust. She gave the two coins that said: I believe God will take care of me. I believe giving to God is more important than keeping something for my next meal. I believe He sees. Jesus saw. He called His disciples over. He made sure they remembered her. God weighs the heart. God does not weigh our gifts by their amount. He weighs them by what they cost us. He weighs the heart. The widow gave less money and more faith than anyone else in the temple that day. And Jesus made sure she was remembered. Your giving, your service, your sacrifice - if it comes from a heart that trusts God - is seen. He is sitting opposite the treasury. He always is. Give from trust not from overflow. Two thousand years later, we are still talking about two small copper coins given by a woman whose name we do not even know. Your giving, however small, is not invisible. If it comes from a trusting heart that says God will take care of what is left - He sees it. And He calls people over to make sure they notice.`,prayer:`Dear God, help me to give generously - not just when I have plenty but when I have little too. Help me to trust You the way the widow trusted You. You see every gift given from the heart. In Jesus Name. Amen.`},
  {id:66,title:'Jacob and Esau',narration:`Two very different twins. Isaac and Rebekah had twin boys. Esau came first - red and hairy. Jacob came second, holding his brother heel. Even their names told a story. Esau loved the outdoors and became a skilled hunter. Jacob was quieter and liked staying near the tents. And their parents made a dangerous mistake - they each had a favourite. That is where the trouble began. A bowl of soup for everything. One day Esau came in from hunting, completely starving. Jacob was cooking a rich red stew. Esau said: Give me some of that! I am dying! Jacob said: Sell me your birthright first. The birthright was the special inheritance of the firstborn. Esau was so hungry in that moment that he said yes. He traded something priceless for a bowl of soup. And the Bible says he despised his birthright - he treated it as if it did not matter. A blessing stolen. When their father Isaac was old and nearly blind, he wanted to give Esau the great blessing of the firstborn. But Rebekah helped Jacob disguise himself as Esau and go in first. Jacob deceived his own father. Isaac gave the blessing meant for Esau to Jacob. When Esau came in and the truth was revealed, he wept bitterly. And Jacob had to run for his life. A stairway to heaven. Jacob ran away to his uncle Laban. That night he slept on the ground with a stone for a pillow. He had a dream - a great stairway from earth to heaven, with angels going up and down on it. And God spoke: I am with you. I will not leave you until I have done what I have promised. Jacob woke up afraid and amazed. He had grabbed his future through trickery. God was offering to give it to him as a gift. Twenty years away. Jacob spent twenty years away from home. He worked for his uncle Laban. He got married. He had twelve sons. He was not idle. But every year he was away was a year of living with the consequences of his choices. God was still with him. God blessed him. But Jacob was slowly learning that you cannot build a true life on what you have taken - only on what God gives. Running to his brother. When Jacob finally came home and faced his brother Esau, he was terrified. He bowed down seven times as he came near. But Esau ran to him. He threw his arms around Jacob and wept. He had already forgiven him. Sometimes the person we have wronged has far more grace in their heart than we imagine. Jacob said: To see your face is like seeing the face of God. Grace is the greater gift. The blessing Jacob stole was real. But the forgiveness Esau gave freely was greater. God turns our messes into stories of grace. He took Jacob the deceiver and made him Israel the father of a nation. He is always bigger than our biggest mistakes. He is always working, even when we cannot see it.`,prayer:`Dear God, help me to value the right things and not trade something precious for something that only feels important right now. And when I make mistakes, help me to come back and make things right. In Jesus Name. Amen.`},
  {id:67,title:'The Ravens Feed Elijah',narration:`A bold message to the king. Elijah the prophet walked straight into King Ahab palace and said: As the Lord, the God of Israel, lives - there will be no rain in the next few years except at my word. Then he walked out. No rain in a farming land meant disaster. It was the judgement God had sent Elijah to declare. And then God told Elijah to leave immediately and go into hiding by a brook called Kerith. By the brook Kerith. God told Elijah: Go east and hide in the Kerith Ravine. You will drink from the brook and I have directed the ravens to supply you with food there. Elijah went. He found the brook. He drank from it. And every morning and every evening, the ravens came. They brought bread and meat in the morning. Bread and meat in the evening. Day after day. In a hidden wilderness, fed by birds. Ravens arrive at dawn. The ravens came. Ravens are not tame birds. They are not trained to deliver things to people. But God directed them. He spoke to His creation, and it obeyed. Every morning. Every evening. In the wilderness where no food grew and no market existed, God fed His prophet through birds. His provision does not always look like we expect it to look. Drinking from the brook. Elijah drank from the brook. That is all it says. He did not build a house. He did not plant a garden. He received what was given each day and trusted God for the next. Not a warehouse of supplies - just enough for today. The brook was there. The ravens came. And that was enough. In that ravine, Elijah learned what enough really means. The brook dries up. Then the brook dried up because there had been no rain. The very source of water that had been sustaining Elijah was gone. But God was not caught by surprise. He had already been watching the brook. He already had the next step planned. Sometimes God lets the thing that has been sustaining us come to an end - not to abandon us, but to move us on to what He has prepared next. God always has a next step. When the brook dried up, God spoke: Go at once to Zarephath. I have directed a widow there to supply you with food. From ravens to a widow. From a wilderness brook to a town in another country. God's provision does not repeat itself. It moves and surprises. The brook was His means. He is the supply. And He never runs out. He always provides. Ravens at dawn. Water from a brook. A widow in a distant town. God feeds His people in ways they would never have designed for themselves. The brook was His means. He is the supply. And He never runs out. Elijah trusted, went where he was told, and was fed. That is the whole pattern. Trust and go. He handles the rest.`,prayer:`Dear God, thank You that You provide for Your people in unexpected ways. Help me to trust You for what I need today and not to be afraid about tomorrow. In Jesus Name. Amen.`},
  {id:68,title:'Elisha and the Widow Oil',narration:`Nothing left but a jar. A widow came to the prophet Elisha in desperation. Her husband had died. The man he owed money to was coming to take her two sons as slaves in payment of the debt. She had nothing left to sell. She had no family to help. She had only one thing in the whole house: a small jar of olive oil. She came to Elisha and told him everything. What do you have in your house?. Elisha asked: What do you have in your house? She said: Nothing at all, except a small jar of olive oil. And Elisha said: Go around and ask all your neighbours for empty jars. Do not ask for just a few. Get as many as you can. Then go inside, shut the door behind you and your sons, and pour oil into all the jars. Set each one aside when it is full. She did not know what he was planning. But she went. Collecting jars from neighbours. The widow went out and asked her neighbours for every empty jar they had. As many as they could find. She came back with armfuls. Her sons helped carry them. They brought them all into the house. They shut the door. And then she began to pour from her small jar of olive oil. She poured into the first jar. It filled. She poured into the second. It filled. The oil kept flowing. The oil flows and flows. She poured until every jar was full. She said to her son: Bring me another jar. He said: There is not a jar left. And the oil stopped flowing. It stopped exactly when the containers ran out. The limit on the miracle was the limit on the preparation. If she had collected more, more would have been filled. The oil was not the limit. The jars were. Go sell the oil. She went and told Elisha, and he said: Go sell the oil and pay your debts. You and your sons can live on what is left. The miracle had a practical next step. She had enough to pay the debt that would have taken her sons. She had enough to live on after that. God gave her enough. Exactly what was needed. Not more. Not less. Exactly enough. He fills what we bring empty. She came with nothing but one small jar and absolute need. She left with enough. God fills what we bring to Him empty. He does not need us to have much to start with. He just needs us to bring what we have, do what He says, and bring as many empty containers as we can find. The widow brought her jar and her sons and her obedience. God brought everything else. Bring more jars. The limit on the widow miracle was the limit on her jars. She brought what she had. God filled what she brought. That is the invitation to us too. Do not hold back because you do not have much. Do not calculate whether it is worth bringing. Bring every empty jar you have. Bring every need, every worry, every lack. God fills what we bring to Him empty - every single time.`,prayer:`Dear God, I bring You what I have, even when it feels like almost nothing. Help me to obey You and to prepare for Your provision. Fill my empty jars. In Jesus Name. Amen.`},
  {id:69,title:'Balaam and the Donkey',narration:`A prophet offered great reward. The king of Moab, Balak, was frightened of the Israelites. He sent for a prophet named Balaam and offered him great rewards to curse Israel. God told Balaam clearly: You must not curse these people, because they are blessed. Balaam knew this. But the rewards were very attractive. And when the king sent again with even more honour and wealth, Balaam set off on his donkey toward something God had already forbidden. An angel with a sword. God was angry that Balaam was going. He sent an angel to stand in the road with a drawn sword. The donkey saw the angel and turned into a field. Balaam beat her. The angel moved to a narrow path with walls on either side. The donkey pressed against the wall and crushed Balaam foot. He beat her again. Then the angel blocked the path completely. The donkey lay down. And God did something nobody expected. The donkey speaks. God opened the donkey mouth and she said: What have I done to you to make you beat me three times? Balaam was so angry he answered the donkey as if this were perfectly normal. He said: You have made a fool of me! The donkey said: Am I not your own donkey, which you have always ridden? Have I been in the habit of doing this? And Balaam said: No. The angel stands revealed. Then God opened Balaam eyes and he saw the angel of the Lord standing in the road with his sword drawn. Balaam bowed face down. The angel said: Why have you beaten your donkey three times? I have come here to oppose you because your path is reckless before me. The donkey saw me and turned away from me three times. If she had not turned away, I would certainly have killed you by now, but spared her. The donkey saved his life. The donkey had saved Balaam life three times. She had seen the angel. She had turned. She had pressed against the wall. She had lain down. And each time, Balaam had beaten her for the protection. Sometimes the thing that frustrates us most is actually God's protection in disguise. We do not always see what our obstacles are saving us from. God speaks through anything. God used a donkey. He can use anything to get our attention when we are going the wrong way. He used the burning bush, the still small voice, a dream, an angel, a donkey. He uses what He needs to use. The question is never whether God can reach us. It is whether we are listening. Balaam listened eventually - even after the donkey started talking. And when he finally obeyed, he found the path was clear. Listen before you have to. God can use anything to get our attention. But the gift of the Balaam story is this: we do not have to wait for the donkey to speak. We can pray before we go. We can ask: Is this the right way? Is this what You want? God speaks through His word, through prayer, through the counsel of others, through circumstances. The donkey spoke because Balaam had stopped listening to everything else. Let us listen earlier.`,prayer:`Dear God, help me to listen to You before You have to send a donkey to stop me. Help me to stay on the right path and to notice when You are trying to redirect me. In Jesus Name. Amen.`},
  {id:70,title:'Zacchaeus the Tax Collector',narration:`The most disliked man in Jericho. Zacchaeus was the chief tax collector in Jericho. He had become very rich, and everyone in town knew how. He collected taxes for the Romans and took more than was required. He had made himself wealthy at his neighbours expense. And so every person in Jericho knew his name and turned away when they saw him coming. He was rich and completely alone. Then he heard Jesus was coming through town. Up a sycamore tree. Zacchaeus wanted to see who Jesus was. But he was short and the crowd was large and no one was going to make way for the chief tax collector. He could have given up. Instead he ran ahead and climbed a sycamore tree. He did not care how it looked. He did not care that a wealthy official climbing a tree was undignified. He wanted to see Jesus badly enough to look foolish. Jesus looked up. When Jesus reached the spot, He looked up. Out of all the trees on that road, He stopped at this one. Out of all the faces in the crowd, He looked up into this man branches. And He said: Zacchaeus, come down immediately. I must stay at your house today. He knew his name. Jesus had never been to Jericho before. But He knew exactly who was in that tree. The crowd grumbles. The crowd began to mutter. He has gone to be the guest of a sinner, they said. This was not who they would have chosen for Jesus to spend His time with. But Jesus had not come for the people who thought they were already fine. He had come for the lost. And He could see something in Zacchaeus that the crowd could not see - a man in a tree who wanted to see Him badly enough to look foolish. A changed man at dinner. At dinner something happened to Zacchaeus heart. He stood up and said: Lord! I will give half of everything I own to the poor. And if I have cheated anyone - and he knew he had - I will pay them back four times as much. Something had broken open in him. Love had come to his house, and he could not keep the old life and the new love at the same time. He came to seek and to save. Jesus said: Today salvation has come to this house. For the Son of Man came to seek and to save the lost. He came to seek. Not to wait. He went looking for Zacchaeus before Zacchaeus even started climbing the tree. By the time Zacchaeus was in the branches, Jesus was already coming around the corner. You do not have to have it all together to be found by Him. You just have to want to see Him. Salvation came to this house. Jesus said: For the Son of Man came to seek and to save the lost. He came to seek. Not to wait for the lost to find their way. To actively go looking. He went looking for Zacchaeus before Zacchaeus even started climbing the tree. By the time Zacchaeus was in the branches, Jesus was already coming around the corner. He is always already coming for you.`,prayer:`Dear Jesus, thank You that You came to seek and to save the lost. Thank You that You know my name and come looking for me. Help me to welcome You in. In Jesus Name. Amen.`},
  {id:71,title:'The Widow and Two Coins',narration:`Jesus watches at the treasury. Jesus sat opposite the temple treasury and watched people put their money in. Many rich people threw in large amounts. The sound was impressive. People around them could hear the coins clattering. But Jesus was looking at something that money amounts alone cannot measure. He was watching what each gift cost the person giving it. A widow approaches. A poor widow came. She put in two very small copper coins - the smallest coins that existed. Worth barely a fraction of a day wage. She had come to give, and this was what she had. She did not hesitate. She did not weigh it up. She had two coins and she gave them both. She did not keep one for the journey home. Jesus calls His disciples. Jesus called His disciples to Him and said: Truly I tell you, this poor widow has put more into the treasury than all the others. The disciples looked at each other. The numbers did not add up. She had given the least. Everyone could see that. But Jesus was using a different accounting system. He was measuring not by what was given, but by what was kept back. Everything she had to live on. Jesus said: They all gave out of their wealth. But she, out of her poverty, put in everything - all she had to live on. She did not give from the overflow. She gave from the need. She gave everything she had and walked away with nothing in her hands. And Jesus saw it. He called His disciples over specifically so they would see it too. She gave trust not money. The widow did not give money. She gave trust. The two coins said: I believe God will take care of me. I believe giving to God matters more than keeping something for my next meal. Jesus saw. He called His disciples over. He made sure they remembered her. Two thousand years later, we are still talking about two small coins given by a woman whose name we do not even know. God weighs the heart. God does not weigh our gifts by the amount. He weighs them by what they cost us. He weighs the heart. The widow gave less money and more faith than anyone else in the temple that day. And Jesus made sure she was remembered. Your giving, your service, your sacrifice - if it comes from a heart that trusts God - is seen. He is sitting opposite the treasury. He always will be. Seen by the One who matters. The widow gave two coins and walked away. She never knew Jesus had seen her. She never knew He called His disciples over to witness it. She never knew her act of faith would be remembered for thousands of years. We often will not know either. But every act given from a trusting heart is seen by the One who matters. He is always watching. He is always moved.`,prayer:`Dear God, help me to give generously - not just when I have plenty but when I have little too. Help me to trust You the way the widow trusted You. You see every gift given from the heart. In Jesus Name. Amen.`},
  {id:72,title:'Jesus Appears to Mary Magdalene',narration:`Running to the tomb before dawn. Mary Magdalene had been with Jesus from the early days of His ministry. He had healed her. She had followed Him to Jerusalem. She had stood at the foot of the cross when others ran away. She had watched where He was buried. And before dawn on the first day of the week, she went to the tomb. She could not stay away. She had to be near Him, even in death. The stone is moved. She arrived and found the stone rolled away. She did not stop to look inside. She ran to Simon Peter and the other disciple and said: They have taken the Lord out of the tomb and we do not know where they have put Him! The disciples ran to the tomb, looked in, saw the grave clothes neatly folded, and went home confused. But Mary stayed. Two angels in the tomb. Mary stood outside the tomb weeping. She bent over to look inside. She saw two angels in white, seated where Jesus' body had been. They asked: Woman, why are you crying? She said: They have taken my Lord away, and I do not know where they have put Him. And then she turned around. And there was someone standing in the garden. She thought He was the gardener. She saw someone standing there but did not recognise Him. Through the tears, through the grief, through the shock, she did not know it was Jesus. He asked: Woman, why are you crying? Who is it you are looking for? She thought He was the gardener. She said: Sir, if you have carried Him away, tell me where you have put Him and I will go and get Him. Mary. Jesus said one word: Mary. And she knew. She turned and said: Rabboni - which means Teacher. That is how the resurrection was first announced. Not to a king. Not to a crowd. To a weeping woman in a garden at dawn, by the sound of her own name spoken by the only voice that had ever said it quite that way. He called her by name. And she knew. Go and tell my brothers. Jesus said: Go and tell my brothers I am ascending to my Father and your Father. Mary Magdalene went to the disciples and said: I have seen the Lord! She was the first. The first person to see the risen Jesus was not Peter or John or any of the twelve. It was Mary Magdalene - a woman who loved Him enough to come to the tomb before sunrise and who would not leave it. He called her name first. He calls each of us by name. Jesus rose from the dead and the first thing He did was call someone by name in a garden. He had not moved on to bigger things. He came for Mary first. He knew exactly where she was and exactly what she needed to hear. He called her name. He is still calling names. The same risen Jesus who found Mary in that garden knows your name too. And He comes looking.`,prayer:`Dear Jesus, thank You that You are alive. Thank You that You call each of us by name and find us in our saddest moments. Help me to hear You calling my name today. In Jesus Name. Amen.`},
  {id:73,title:'Breakfast on the Beach',narration:`An empty net all night. After the resurrection, seven disciples went back to what they knew. Peter said: I am going fishing. The others said: We will come too. They fished all night on the Sea of Tiberias. They knew these waters. They knew the nets. But that night they caught nothing. Not one fish. Sometimes the most familiar things do not work. Sometimes a night of empty nets is part of a story that is not yet finished. A voice from the shore. When morning came, Jesus stood on the shore. But the disciples did not recognise Him. He called out: Friends, have you any fish? No, they answered. He said: Throw your net on the right side of the boat and you will find some. They obeyed. And the net filled with fish. So many they could not haul it in. And one disciple said: It is the Lord! Peter jumps in. When Peter heard it is the Lord, he jumped in. He did not wait for the boat. He put his outer garment on and threw himself into the water and swam toward Jesus. Some things cannot wait. The other disciples came by boat, dragging the net full of fish. But Peter swam. Breakfast is already cooking. When they got to shore, they saw a fire of burning coals with fish on it, and some bread. Jesus said: Bring some of the fish you have just caught. He had already started cooking. Before the disciples were even out of the water, He had prepared breakfast. Jesus made them breakfast on a beach. The risen Lord of all creation, who had conquered death, made them breakfast because they were hungry. Come and have breakfast. Jesus said: Come and have breakfast. None of the disciples dared ask who He was. They knew it was the Lord. He took the bread and gave it to them, and did the same with the fish. Love is practical. Care shows up with food and fire and the question: are you hungry? Do you love me?. After breakfast Jesus took Peter aside. Three times He asked: Do you love me? Three times Peter said yes. Three times Jesus said: Feed my sheep. Three questions to match three denials. Jesus was not rubbing it in. He was restoring. For every time Peter said I do not know Him, Jesus said I know you. I still trust you. There is still work for you to do. The man who had failed most publicly became the leader of the church. He restores and recommissions. Peter had denied Jesus three times and then wept bitterly. He went back to fishing because he did not know what else to do. And Jesus came to the beach, made him breakfast, and asked him three times if he loved Him. Not to punish. To restore. The man who had failed most publicly became the leader of the church. Jesus always restores what He loves. Every morning after a dark night, He is already on the shore, cooking breakfast.`,prayer:`Dear Jesus, thank You that You restore people. Thank You that failure is not the end of my story with You. Help me to receive Your restoration and to follow You after every time I have let You down. In Jesus Name. Amen.`},
  {id:74,title:'Paul is Changed on the Road',narration:`The man who hunted Christians. Saul of Tarsus was a zealous persecutor of the early church. He had watched Stephen be stoned and approved it. He went from house to house dragging out men and women and throwing them into prison. And now he was on his way to Damascus with authority to arrest anyone who followed Jesus. He was the most feared man in the early church. And God was coming to meet him on the road. A blinding light. Suddenly a light from heaven flashed around him. He fell to the ground. He heard a voice: Saul, Saul, why do you persecute me? He said: Who are you, Lord? The voice said: I am Jesus, whom you are persecuting. Now get up and go into the city. You will be told what you must do. Saul got up. When he opened his eyes, he could see nothing. He was blind. His companions led him by the hand into Damascus. Three days in the dark. For three days Saul was blind and did not eat or drink. He was praying. The most powerful persecutor of the church sat alone in a room talking to the Jesus he had been trying to destroy. Sometimes the most violent opponents of God become His most committed followers - because they already know how to be completely devoted. They just needed to be turned around. God speaks to Ananias. God spoke to a disciple named Ananias in a vision. Go to the house of Judas on Straight Street and ask for a man from Tarsus named Saul. He is praying. He has seen a vision of you restoring his sight. Ananias said: Lord, I have heard many reports about this man and all the harm he has done. And he has come here with authority to arrest everyone who calls on Your name. This man is my chosen instrument. God said: Go! This man is my chosen instrument to carry my name before the Gentiles and their kings and before the people of Israel. Ananias did not argue further. He went. This is one of the bravest acts in the whole book of Acts - a frightened ordinary disciple walking to the house of the man who had come to arrest him, because God said go. Brother Saul. Ananias placed his hands on Saul and said: Brother Saul, the Lord Jesus has sent me so that you may see again and be filled with the Holy Spirit. Immediately something like scales fell from Saul's eyes and he could see again. He got up and was baptised. He took food and recovered his strength. And the man who had come to Damascus to destroy the church began to preach in its synagogues. God can transform anyone. From Saul to Paul. Saul became Paul. The man who had tried to stamp out the church wrote half of the New Testament. He planted churches across the Roman Empire. He faced shipwrecks and beatings and prison and never stopped. And it all started with a light on a road, three days in the dark, and one frightened disciple named Ananias who called his enemy brother. God can transform anyone. Absolutely anyone.`,prayer:`Dear God, thank You that You can transform anyone. Help me to have the courage of Ananias - to go where You send me and to speak grace to people I find difficult. In Jesus Name. Amen.`},
  {id:75,title:'Lydia Opens Her Heart',narration:`A vision leads Paul to Macedonia. Paul had a vision in the night. A man from Macedonia stood before him saying: Come over and help us. Paul got up immediately and sailed for Macedonia, understanding that God had called them there. This is how the gospel first crossed from Asia into Europe - on the strength of a dream and the obedience of a man who got up immediately when God spoke. A prayer meeting by the river. On the Sabbath Paul went outside the city gate to the river, where he expected to find a place of prayer. He found a group of women gathered there. No synagogue. No crowd. No famous teacher. Just women by a river. Paul sat down and began to speak to them. And one of them was about to become the hinge point of the gospel coming to an entire continent. Lydia the merchant listens. A woman named Lydia was there. She was a dealer in purple cloth - a luxury item bought by the wealthy. Lydia was a businesswoman with influence and means. She was also a woman who worshipped God. She had been seeking. And on this Sabbath by the river, something happened to her that she could not arrange for herself. The Lord opened her heart. The Lord opened her heart to respond to Paul message. She did not just hear the words with her mind. Something opened in her - something that only God can open. She listened. She responded. She believed. She was baptised along with her whole household. One of the most beautiful phrases in Acts: the Lord opened her heart. We can plant seeds. We can speak words. But the opening is something only God does. Come and stay at my house. Lydia said to Paul: If you consider me a believer in the Lord, come and stay at my house. And she persuaded them. She did not just receive the gospel. She immediately opened her home to the people who had brought it. Her faith became practical within the same conversation. The first European Christian became the first host of the church in Europe. A heart opened changes the world. Lydia was already seeking. The Lord opened her heart. She responded. She gave generously. And from her house the gospel flowed to a whole continent. You do not have to be the preacher or the famous leader. Sometimes the most important thing you can do is sit by the river, seek God honestly, and be ready for what He opens your heart to. One open heart can change the world. One open heart. Lydia was already seeking. The Lord opened her heart. She responded. She gave generously. And from her house the gospel flowed to a whole continent. You do not have to be the preacher or the famous leader. Sometimes the most important thing you can do is sit by the river, seek God honestly, and be ready for what He opens your heart to. One open heart can change the world.`,prayer:`Dear God, open my heart the way You opened Lydia heart. Help me to seek You, to hear You, and to respond generously when You speak. In Jesus Name. Amen.`},
  {id:76,title:'The Beatitudes',narration:`Jesus sits on the hillside to teach. One day Jesus went up on a mountainside, sat down, and His disciples came to Him. He began to teach. The word beatitude means blessed - deeply happy. What Jesus said next turned every idea of happiness upside down. He did not describe the happy life the way anyone expected. He described a happiness that comes from God and cannot be taken away. Blessed are the poor in spirit. Blessed are the poor in spirit, Jesus said, for theirs is the kingdom of heaven. The poor in spirit know they need God. They do not think they have everything figured out. They know they need help. And to those people - the kingdom belongs. Not to the proud. To the humble. God fills the empty hands. Blessed are those who mourn. Blessed are those who mourn, Jesus said, for they will be comforted. Blessed when you are sad? When you have lost something? Yes. Because God does not abandon us in our sadness. He comes closer. He is the God of all comfort. When we grieve honestly, He meets us there. And He promises that all mourning will one day end completely. Blessed are the pure in heart. Blessed are the pure in heart, Jesus said, for they will see God. To have a pure heart is to want one thing above all else - God Himself. Not just His gifts. Not just His blessings. Him. The person who loves God simply and completely - that person will see God. What greater promise could there be? Blessed are the peacemakers. Blessed are the peacemakers, Jesus said, for they will be called children of God. Not peacekeepers who just avoid conflict - but peacemakers who actively bring reconciliation, who work to heal broken things, who say let us find a way forward. They look like their Father. He is the great Peacemaker who sent His Son to make peace between us and Himself. Rejoice and be exceedingly glad. Jesus finished the beatitudes with something surprising: if people insult you and persecute you because of me, rejoice and be glad. Your reward in heaven is great. The blessings Jesus describes are not comfortable. They are deeper than comfort. They are the kind of happiness that no one can take away, that grows stronger under pressure, that lasts forever. This is the life Jesus invites us into. This is the life Jesus invites us into. The beatitudes are not a performance checklist. They are a description of what a person looks like when they are genuinely close to God. Humble, merciful, pure-hearted, peace-making, persevering under pressure. This is the portrait of kingdom life. Jesus does not say try harder to be these things. He says come closer to me. The closer we are to Him, the more we naturally become this.`,prayer:`Dear Jesus, thank You for showing me what real happiness looks like. Help me to be poor in spirit, pure in heart, and a peacemaker. Help me to want You more than anything else. In Jesus Name. Amen.`},
  {id:77,title:'The Mountain of Glory',narration:`Up the mountain. Jesus took Peter, James and John and led them up a high mountain by themselves. They did not know what they were going there for. They just followed. That is often how it works with Jesus - He leads, and we discover what He was doing when we arrive. They climbed. The world got quieter below them. And then something began to happen that none of them had any words for. His face shone like the sun. Jesus was transfigured before them. His face shone like the sun. His clothes became dazzling white. This was not something put on Him from outside. This was what He was like inside - and for a moment, the outside matched. The same glory that had been there in heaven before the world began was visible for a moment on a mountain in Galilee. Moses and Elijah appear. Moses and Elijah appeared, talking with Jesus. Moses who had spoken with God face to face. Elijah who had been taken to heaven in a chariot of fire. Two of the greatest figures of the entire Old Testament, standing on a mountain talking with Jesus. Luke tells us they were speaking about His departure - the death and resurrection that was about to happen in Jerusalem. Peter wants to stay in the moment. Peter, not quite knowing what to say, said: Lord, it is good for us to be here! Let me build three shelters. He wanted to stay in the moment. He was still speaking when a bright cloud covered them all and a voice came from the cloud: This is my Son, whom I love. With Him I am well pleased. Listen to Him. The disciples fell face down, terrified. Do not be afraid. When the disciples heard the voice, they fell face down on the ground, terrified. But Jesus came and touched them. Get up, He said. Do not be afraid. And when they looked up, the cloud was gone. Moses and Elijah were gone. They saw no one except Jesus. Just Jesus. Always, in the end, just Jesus. He outshines everything. On the mountain they saw Moses - the Law. They saw Elijah - the Prophets. And Jesus outshone them both. Then the Law and the Prophets were gone and there was Jesus alone. That is the message of the whole Bible. Everything before Jesus pointed to Him. Everything after flows from Him. The more we see who He truly is, the less afraid we need to be of anything else. Just Jesus is enough. On the mountain they saw Moses - the Law. They saw Elijah - the Prophets. And Jesus outshone them both. Then the Law and the Prophets were gone and there was Jesus alone. He is enough. He is everything. And He told them: do not be afraid. Those who have seen who He truly is find there is very little left to fear.`,prayer:`Dear Jesus, thank You that You are glorious and wonderful and more than enough. Help me to know You better every day and to not be afraid of who You truly are. In Jesus Name. Amen.`},
  {id:78,title:'Sitting at Jesus Feet',narration:`Jesus visits their home. Jesus and His disciples came to a village, and a woman named Martha welcomed Him into her home. Martha and her sister Mary and their brother Lazarus were among Jesus closest friends. Their home was a place He loved to visit. It was warm and welcoming. And when Jesus came through the door, the two sisters responded in completely different ways. Mary sits at His feet. Mary sat at Jesus' feet and listened to what He said. In that culture, sitting at a teacher feet was the posture of a student, of someone choosing to receive. Mary chose the place of listening. She was not idle. She was doing the most important thing in the room. She was paying attention to Jesus. Martha is distracted. Martha was distracted by all the preparations that had to be made. She was working hard. She was being generous. But she was distracted. And she was looking at Mary sitting and listening, and the frustration grew. Finally she came to Jesus and said: Lord, do You not care that my sister has left me to do all the work? Tell her to help me! Martha Martha. Jesus said: Martha, Martha. He said her name twice - gently, lovingly. You are worried and upset about many things, He said. But few things are needed - or really only one. Mary has chosen what is better, and it will not be taken away from her. He was not criticising Martha work. He was gently pointing to what she was missing. The one thing needed. The one thing needed. What was it? Being with Jesus. Listening to Him. Choosing the place at His feet even when there were other things to do. Martha was worried about many things. Jesus was offering her one thing that would put all the others in their right place. Not no work. Not no service. Just - Him first. Sit at His feet first. Then serve from that place. Choosing what cannot be taken away. Mary chose what is better, and it will not be taken away from her. That is the promise. Time spent at Jesus' feet - listening, learning, loving Him - is stored up forever. In every busy season, in every stretched day, Jesus is still saying: sit with me first. Everything else will find its right place when we do. The better thing chosen. In every busy season, in every stretched day, Jesus is still saying: sit with me first. Everything else will find its right place. Martha grew. She learned. Later when her brother Lazarus died she made one of the greatest confessions of faith in the Gospels. The rebuke was the kindest thing He could have said to her. Sit with me first.`,prayer:`Dear Jesus, thank You that You welcome me just as I am. Help me to choose the one thing needed - time with You - and let everything else flow from that. In Jesus Name. Amen.`},
  {id:79,title:'Hezekiah and the Shadow',narration:`A king told he is dying. King Hezekiah was one of the good kings of Judah. He trusted God. He had removed the idols. He had prayed. But one day the prophet Isaiah came with hard words: Put your house in order, because you are going to die. Hezekiah turned his face to the wall and he prayed. Praying with tears. Hezekiah prayed: Lord, remember how I have walked before You faithfully and with wholehearted devotion and have done what is good in Your eyes. And Hezekiah wept bitterly. He did not pray proudly. He did not demand. Raw, honest prayer. No performance. Just a man in his room, turned toward God, with tears running down his face. God hears before Isaiah leaves. Isaiah had not even reached the middle of the palace when the word of God came to him. Go back and tell Hezekiah: I have heard your prayer and seen your tears. I will heal you. On the third day you will go up to the temple. I will add fifteen years to your life. Before Isaiah had walked through one courtyard, God had answered the prayer from the room. He heard before the prayer was even finished. A poultice of figs. Isaiah told the servants to prepare a poultice of figs and apply it to the illness. God healed Hezekiah supernaturally - but He also used a natural remedy alongside the miracle. He often works both ways at once. The extraordinary and the ordinary together. The king would recover and on the third day he would go up to the temple. The shadow goes backward. Hezekiah asked for a sign. Isaiah said: The shadow will go backward ten steps on the staircase. And the shadow on the staircase went backward ten steps. The sun moved. Time did something it had never done. God bent the fabric of His own creation to confirm His word to one man who had prayed with tears. He is that kind of God. God bends creation for honest prayer. The shadow went backward. God moved the sun - or the earth, or something in His creation - to give a sign to one man who had prayed honestly in his room with tears. He pays attention to individuals. He bends creation for people who bring their tears to Him. Sometimes He says not yet when we think He has said no. Keep praying. He hears before you have finished. He hears before you finish. Isaiah had not even left the palace when God sent him back with a different answer. Before the prayer was finished, the reply was already coming. Sometimes it seems like God is silent. Sometimes it seems like the answer is no. But He is not absent and He is not indifferent. He hears before you have finished. Keep praying. Turn your face toward Him. He is closer than you know.`,prayer:`Dear God, thank You that You hear my prayers even before I finish praying them. Help me to pray honestly and boldly, to turn my face toward You in every hard situation. In Jesus Name. Amen.`},
  {id:80,title:'Jeremiah - Plans for Hope',narration:`Before you were born I knew you. God spoke to Jeremiah: Before I formed you in the womb I knew you. Before you were born I set you apart. I appointed you as a prophet to the nations. God had been thinking about Jeremiah before Jeremiah existed. He had been chosen before he was born. And now God was telling him about it and calling him to go. I am too young. Jeremiah said: Alas, Sovereign Lord, I do not know how to speak. I am too young! And God said: Do not say you are too young. You must go to everyone I send you to and say whatever I command you. Do not be afraid, for I am with you. Then God touched his mouth: I have put my words in your mouth. The word is already given. Just go. A message nobody wanted to hear. Jeremiah was called to say things people did not want to hear. He warned the nation that their disobedience would bring disaster. He told them to repent. They did not listen. They mocked him. They put him in stocks. They threw him in a pit. And through it all, Jeremiah kept speaking what God had given him to say. There was fire shut up in his bones and he could not stop. The weeping prophet. Jeremiah is called the weeping prophet. He felt everything. He wept over his nation. He cried out to God in anguish. He even said at one point: I am ridiculed all day long. But then he said - His word is in my heart like a fire, a fire shut up in my bones. I am weary of holding it in. I cannot. He could not stop. God had put something in him that would not be silent. Plans for hope and a future. When the people of Judah were taken to Babylon as captives, Jeremiah sent them a letter. In it was one of the most remarkable verses in the whole Old Testament: For I know the plans I have for you, declares the Lord, plans to prosper you and not to harm you, plans to give you hope and a future. God had not forgotten His people in exile. He had plans for them. Good plans. Seek Me and you will find Me. Jeremiah also wrote: You will seek me and find me when you seek me with all your heart. I will be found by you. The words God put in Jeremiah mouth have comforted millions of people across thousands of years. I know the plans I have for you. Plans for hope and a future. Even in the hardest exile, God was already planning the return. He always is. I know the plans I have for you. Jeremiah gave his whole life to saying what God told him, even when no one listened. He wept for his nation. He suffered for his calling. He never stopped. And the words God put in his mouth have comforted millions of people across thousands of years: I know the plans I have for you. Plans for hope and a future. Even in the hardest exile, God was already planning the return. He always is.`,prayer:`Dear God, thank You that You know the plans You have for me - plans for hope and a future. Help me to trust You even in hard seasons and to keep going with what You have put in my heart. In Jesus Name. Amen.`},
  {id:81,title:'The Sheep and the Goats',narration:`The Son of Man on His throne. Jesus described the end of all things, when the Son of Man comes in His glory with all His angels and sits on His glorious throne. All the nations will be gathered before Him. He will separate the people from one another as a shepherd separates the sheep from the goats. He will put the sheep on His right and the goats on His left. Come you who are blessed. The King will say to those on His right: Come, you who are blessed by my Father. Take your inheritance. For I was hungry and you gave me food. I was thirsty and you gave me something to drink. I was a stranger and you invited me in. I needed clothes and you clothed me. I was sick and you looked after me. I was in prison and you came to visit me. When did we see You?. The righteous will answer: Lord, when did we see you hungry and feed you? When did we see you thirsty or a stranger or sick or in prison? They did not know they had been serving the King. They had just been serving people who needed help. They were not doing it to earn something. They were doing it because they cared. Whatever you did for the least. The King will reply: Truly I tell you, whatever you did for one of the least of these brothers and sisters of mine, you did for me. Jesus is hidden in the hungry, the thirsty, the stranger, the sick, the prisoner. When we reach out to the most overlooked person - we are reaching out to Jesus Himself. He takes it personally. He always has. The ones who looked away. To those on His left, the King will say: Depart from me. For I was hungry and you gave me nothing. I was thirsty and you gave me nothing. They will ask the same question. And the King will say: Whatever you did not do for one of the least of these, you did not do for me. They passed by Jesus every day without knowing it. Without stopping. He is in the forgotten ones. Jesus hides in the overlooked and forgotten. The hungry person. The lonely neighbour. The new child at school who does not know anyone. The sick person who feels forgotten. Every act of genuine compassion toward them is an act of love toward Jesus Himself. You never know when you are serving Jesus. He will not announce Himself. Love your neighbour. He may be closer than you think. Love your neighbour. You never know when you are serving Jesus. He will not announce Himself. He comes in the face of the person who needs you right now, today, in the ordinary moment. The way we treat the people around us - especially the ones who cannot give us anything back - is the way we treat Him. That is the surprising secret of the sheep and the goats. Love your neighbour. He may be closer than you think.`,prayer:`Dear Jesus, help me to see You in the people around me - especially the ones who are easy to overlook. Help me to love them as if I am loving You. In Jesus Name. Amen.`},
  {id:82,title:'Elisha and the Small Miracle',narration:`A community of prophets. A group of young prophets were studying under Elisha. They had outgrown their meeting place and decided to go to the Jordan River to cut timber and build a bigger one. They asked Elisha to come. He agreed. They set off together - teacher and students - going to do an ordinary day of work. Nobody expected anything unusual to happen. But something did. The axe head falls in. As one of the young men was cutting down a tree, the iron axe head flew off the handle and fell into the river. He cried out: Oh no, my lord! It was borrowed! This was serious. Iron was expensive. Borrowed tools were a debt of honour. He had no way to pay for it. He went straight to Elisha. Where did it fall?. Elisha asked: Where did it fall? The young man showed him the spot. Elisha cut a stick and threw it into the water at that spot. And the iron axe head rose to the surface. Iron. Floating. What floats on water is not iron. But the laws of what is possible expanded at a word from God man in response to the worry of one student about one borrowed tool. Iron floats. Elisha said: Pick it up. And the man reached out his hand and took it. Iron floated. A borrowed axe head, sunk in a muddy river, came to the surface and the young man who had lost it picked it up and held it in his hand. No fanfare. No large crowd. Just a stick, a prayer, and an impossible thing in a river. God cares about small things. This is one of the smallest miracles in the Bible. No nation was saved. No army was defeated. Just one young man and one borrowed axe head in a river. And God cared. He used His prophet to help. This is important to know about God - He is not only interested in enormous things. He sees the small worries. He notices what is borrowed and lost and worried over. Nothing is too small to bring to God. God is the God of parted seas and falling walls. But He is also the God of floating axe heads. He is not too busy for the small worries. He is not too great for the small needs. He pays attention to the person at the edge of the river looking into the water with a worried face. He always has. He always will. He is near in the small things. God is the God of parted seas and fallen walls. But He is also the God of floating axe heads. He is not too busy for the small worries. He is not too great for the small needs. He pays attention to the person at the edge of the river looking into the water with a worried face. He always has. He always will. Nothing is too small to bring to Him.`,prayer:`Dear God, thank You that You care about every detail of my life, even the small things. Help me to bring everything to You - big and small - knowing that You are interested and near. In Jesus Name. Amen.`},
  {id:83,title:'Born From Above',narration:`A leader who came after dark. Nicodemus was a Pharisee - one of the most respected religious leaders in all of Israel. A member of the Jewish ruling council. He had studied the scriptures his whole life. He had been watching Jesus, seeing the signs He performed. And something in him said: I have to speak with this man. He came at night, secretly, so no one would see. You must be born again. Nicodemus said: Rabbi, we know that you are a teacher who has come from God. But Jesus answered what he was actually coming to ask. Very truly I tell you, Jesus said, no one can see the kingdom of God unless they are born again. Nicodemus was confused. How can someone be born when they are old? Jesus was not talking about something physical. He was talking about something entirely new. Born of the Spirit. Jesus said: The wind blows wherever it pleases. You hear its sound but you cannot tell where it comes from or where it is going. So it is with everyone born of the Spirit. Nicodemus said: How can this be? What Jesus was describing was not a new idea - it was the deepest promise of the prophets - a new heart, a new spirit, born from above. God so loved the world. Jesus said: For God so loved the world that He gave His one and only Son, that whoever believes in Him shall not perish but have eternal life. For God did not send His Son into the world to condemn the world, but to save the world through Him. Nicodemus had studied the scriptures his whole life. But he had never heard it put quite like this. God's loved the world. And He gave His Son for it. He became a disciple. We do not know exactly what Nicodemus decided that night. But we see him twice more in John gospel. He speaks up for Jesus when others want to condemn Him. And after the crucifixion, he comes with a hundred pounds of spices to help bury Jesus' body - a gesture that would have cost him his reputation among the Pharisees. He became a disciple. He was born again. Just believe. Being born again means receiving new life from God - not through effort or knowledge, but through faith in Jesus. You can know all the scriptures and still miss the One they are about. Nicodemus found Him in a room at night. And the man who had been a teacher of Israel became a student of grace. Whoever believes in Him shall not perish but have eternal life. Born again. Nicodemus came at night. He left with the most extraordinary news: eternal life is not earned by knowledge or religious performance. It is received by faith in the Son of God. You can know all the scriptures and still miss the One they are about. Nicodemus found Him in a room at night. And the man who had been a teacher of Israel became a student of grace.`,prayer:`Dear Jesus, thank You that You offer new life to anyone who believes. Help me to truly believe in You - not just know about You, but trust You with my whole heart. In Jesus Name. Amen.`},
  {id:84,title:'The Good Shepherd',narration:`The shepherd knows his sheep. Jesus said: I am the good shepherd. I know my sheep and my sheep know me. He was not talking about woolly animals. He was talking about people. He was saying: I know each of you. Not as a crowd. Not as a category. Individually. The way a shepherd who has tended his flock for years knows each one - their character, their tendencies, their needs, their name. He calls them by name. The sheep listen to his voice. He calls his own sheep by name and leads them out. When he has brought out all his own, he goes ahead of them and his sheep follow him because they know his voice. A stranger they will not follow - they will run away from a stranger because they do not recognise that voice. Jesus is saying: I am the known voice. The familiar one. The safe one. A gate for the sheep. Jesus said: I am the gate for the sheep. All who come in through me will be saved. They will come in and go out and find pasture. I have come that they may have life and have it to the full. He is not just someone who protects from outside. He is the door itself. The entrance. The way in and the way out. Passing through Him means safety. Staying with Him means life to the full. The hired hand runs away. Jesus compared Himself to a hired hand. The hired hand is not the shepherd who owns the sheep. So when he sees a wolf coming, he abandons the sheep and runs away. Then the wolf attacks the flock and scatters it. The hired hand runs because he cares only about himself. But the good shepherd does something different. Something no one would have expected. He lays down His life. I am the good shepherd, Jesus said. The good shepherd lays down his life for the sheep. He said it clearly. He said it deliberately. He knew what was coming. And He chose it. Not because He had to. Because He wanted to. No one takes my life from me, He said. I lay it down of my own accord. He was not a victim. He was the shepherd choosing His flock over Hi
